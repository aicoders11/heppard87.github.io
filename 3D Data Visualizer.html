<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Heppard's 3D Data Visualizer</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --glass-bg: rgba(5, 10, 20, 0.85);
        }

        body { margin: 0; overflow: hidden; background: #010105; font-family: 'Courier New', monospace; color: white; }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        /* Branding Header */
        #header {
            position: absolute; top: 30px; left: 30px; padding: 20px 30px;
            border-left: 5px solid var(--neon-cyan);
        }
        #header h1 { margin: 0; font-size: 20px; letter-spacing: 3px; text-shadow: 0 0 15px var(--neon-cyan); }
        #header p { margin: 5px 0 0 0; font-size: 10px; opacity: 0.7; text-transform: uppercase; }

        /* Data Control Panel */
        #control-panel {
            position: absolute; top: 30px; right: 30px; width: 240px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .control-label { font-size: 10px; color: var(--neon-cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        
        .dataset-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3);
            color: white; padding: 12px; cursor: pointer; font-family: inherit;
            font-size: 11px; text-transform: uppercase; transition: 0.3s;
            text-align: left;
        }
        .dataset-btn:hover, .dataset-btn.active { 
            background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); 
            border-color: var(--neon-cyan);
        }

        /* Value Tooltip */
        #tooltip {
            position: absolute; display: none; padding: 10px 15px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta); font-size: 14px; font-weight: bold;
            pointer-events: none; transform: translate(-50%, -120%);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        /* Legend */
        #legend {
            position: absolute; bottom: 30px; left: 30px; padding: 15px 20px;
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .color-box { width: 12px; height: 12px; background: var(--neon-magenta); border: 1px solid white; }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--neon-cyan); font-size: 18px; letter-spacing: 5px;
        }

        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div id="loading">QUANTIZING NEURAL DATASETS...</div>

    <div id="ui-overlay">
        <div id="header" class="glass-panel">
            <h1>DATA VISUALIZER</h1>
            <p>Analytical Insight Module v2.1</p>
        </div>

        <div id="control-panel" class="glass-panel">
            <div class="control-label">Select Dataset</div>
            <button class="dataset-btn active" onclick="loadDataset(0, this)">Market Growth</button>
            <button class="dataset-btn" onclick="loadDataset(1, this)">User Retention</button>
            <button class="dataset-btn" onclick="loadDataset(2, this)">Neural Latency</button>
            <button class="dataset-btn" onclick="loadDataset(3, this)">Global Energy</button>
        </div>

        <div id="tooltip">VALUE: 0.0</div>

        <div id="legend" class="glass-panel">
            <div class="control-label">Metrics</div>
            <div class="legend-item"><div class="color-box"></div> Target Sector Delta</div>
        </div>
    </div>

    <script>
        const DATASETS = [
            { name: "Market Growth", values: [45, 62, 38, 75, 91, 54, 68, 82, 49, 77] },
            { name: "User Retention", values: [92, 88, 85, 80, 78, 72, 65, 54, 48, 40] },
            { name: "Neural Latency", values: [12, 15, 11, 22, 45, 56, 31, 19, 14, 10] },
            { name: "Global Energy", values: [30, 35, 45, 55, 65, 80, 95, 110, 125, 140] }
        ];

        let scene, camera, renderer, clock;
        let bars = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let hoveredBar = null;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            scene.fog = new THREE.FogExp2(0x010105, 0.003);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 60, 100);
            camera.lookAt(0, 10, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            scene.add(new THREE.AmbientLight(0x404040));
            const pLight = new THREE.PointLight(0xffffff, 1, 200);
            pLight.position.set(0, 100, 50);
            scene.add(pLight);

            // Grid Ground
            const grid = new THREE.GridHelper(200, 20, 0x00ffff, 0x111122);
            grid.position.y = -0.1;
            scene.add(grid);

            createBars();

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);

            document.getElementById('loading').style.display = 'none';
            animate();
        }

        function createBars() {
            const barGeo = new THREE.BoxGeometry(5, 1, 5);
            
            for (let i = 0; i < 10; i++) {
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0xff00ff, 
                    emissive: 0xff00ff, 
                    emissiveIntensity: 0.3,
                    transparent: true,
                    opacity: 0.9
                });
                const bar = new THREE.Mesh(barGeo, mat);
                
                // Position in a row
                bar.position.set((i - 4.5) * 12, 0.5, 0);
                
                bar.userData = { 
                    index: i, 
                    currentValue: 1 
                };
                
                scene.add(bar);
                bars.push(bar);
            }

            // Initial Load
            loadDataset(0);
        }

        function loadDataset(index, btn = null) {
            const data = DATASETS[index];
            
            if (btn) {
                document.querySelectorAll('.dataset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            bars.forEach((bar, i) => {
                const targetHeight = data.values[i];
                
                // Animation of height
                new TWEEN.Tween(bar.scale)
                    .to({ y: targetHeight }, 1000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
                
                // Keep the bottom of the bar on the floor
                new TWEEN.Tween(bar.position)
                    .to({ y: targetHeight / 2 }, 1000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onUpdate(() => {
                        bar.userData.currentValue = targetHeight;
                    })
                    .start();
            });
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const tooltip = document.getElementById('tooltip');
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (hoveredBar !== obj) {
                    if (hoveredBar) hoveredBar.material.emissiveIntensity = 0.3;
                    hoveredBar = obj;
                    hoveredBar.material.emissiveIntensity = 1.5;
                }
                
                tooltip.style.display = 'block';
                tooltip.style.left = event.clientX + 'px';
                tooltip.style.top = event.clientY + 'px';
                tooltip.innerText = `SECTOR ${obj.userData.index + 1}: ${Math.round(obj.scale.y)}`;
            } else {
                if (hoveredBar) {
                    hoveredBar.material.emissiveIntensity = 0.3;
                    hoveredBar = null;
                }
                tooltip.style.display = 'none';
            }
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);

            // Gentle camera sway
            if (camera) {
                camera.position.x = 50 + Math.sin(time * 0.0005) * 5;
                camera.lookAt(0, 10, 0);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
