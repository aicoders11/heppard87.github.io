<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon 3D Pong | CyberSolutionsOhio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .score-board { display: flex; justify-content: center; gap: 50px; padding-top: 20px; font-size: 3rem; font-weight: bold; text-shadow: 0 0 10px currentColor; }
        .player-score { color: #00f5d4; }
        .cpu-score { color: #ff00f5; }
        .controls-hint { text-align: center; color: #666; padding-bottom: 10px; font-size: 0.8rem; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        h1 { color: white; text-shadow: 0 0 10px #00f5d4; font-size: 3rem; margin-bottom: 0.5rem; }
        button { background: transparent; color: #00f5d4; border: 2px solid #00f5d4; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; font-family: inherit; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #00f5d4; color: black; box-shadow: 0 0 20px #00f5d4; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="score-board">
            <div class="player-score" id="score-p1">0</div>
            <div class="cpu-score" id="score-cpu">0</div>
        </div>
        <div class="controls-hint">MOUSE to move • CLICK to serve</div>
    </div>

    <div id="start-screen">
        <h1>NEON PONG 3D</h1>
        <p style="color: #aaa; margin-bottom: 2rem;">First to 5 Wins</p>
        <button onclick="startGame()">INITIATE MATCH</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- CONFIG ---
        let gameActive = false;
        let p1Score = 0, cpuScore = 0;
        const FIELD_WIDTH = 20, FIELD_LENGTH = 30;
        
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambient);
        const light = new THREE.PointLight(0xffffff, 0.8);
        light.position.set(0, 10, 0);
        scene.add(light);

        // --- OBJECTS ---
        // Field
        const fieldGeo = new THREE.PlaneGeometry(FIELD_WIDTH, FIELD_LENGTH);
        const fieldMat = new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide });
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.rotation.x = -Math.PI / 2;
        field.receiveShadow = true;
        scene.add(field);

        // Grid Helper (Cyber look)
        const grid = new THREE.GridHelper(30, 30, 0x00f5d4, 0x222222);
        grid.position.y = 0.01;
        grid.scale.z = 1.5; // Stretch to match field ratio
        scene.add(grid);

        // Paddles
        const paddleGeo = new THREE.BoxGeometry(4, 0.5, 1);
        const p1Mat = new THREE.MeshBasicMaterial({ color: 0x00f5d4 }); // Cyan
        const cpuMat = new THREE.MeshBasicMaterial({ color: 0xff00f5 }); // Magenta
        
        const paddle1 = new THREE.Mesh(paddleGeo, p1Mat);
        paddle1.position.set(0, 0.25, FIELD_LENGTH/2 - 1);
        scene.add(paddle1);

        const paddle2 = new THREE.Mesh(paddleGeo, cpuMat);
        paddle2.position.set(0, 0.25, -FIELD_LENGTH/2 + 1);
        scene.add(paddle2);

        // Ball
        const ballGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const ballMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.4, 0);
        scene.add(ball);

        // --- LOGIC ---
        let ballDir = new THREE.Vector3(0, 0, 0);
        let ballSpeed = 0;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            p1Score = 0; cpuScore = 0;
            updateScore();
            gameActive = true;
            resetBall(1);
        }

        function resetBall(direction) {
            ball.position.set(0, 0.4, 0);
            ballSpeed = 0.2;
            // Random angle
            const angle = (Math.random() - 0.5) * 1.5; 
            ballDir.set(Math.sin(angle), 0, direction * Math.cos(angle)).normalize();
        }

        function updateScore() {
            document.getElementById('score-p1').innerText = p1Score;
            document.getElementById('score-cpu').innerText = cpuScore;
        }

        // Input
        const mouse = new THREE.Vector2();
        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            // Map mouse X to field width
            paddle1.position.x = mouse.x * (FIELD_WIDTH / 2);
            // Clamp
            paddle1.position.x = Math.max(Math.min(paddle1.position.x, 8), -8);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return;

            // Move Ball
            ball.position.add(ballDir.clone().multiplyScalar(ballSpeed));

            // Wall Collisions (Left/Right)
            if (ball.position.x > FIELD_WIDTH/2 - 0.4 || ball.position.x < -FIELD_WIDTH/2 + 0.4) {
                ballDir.x *= -1;
            }

            // Paddle 1 Collision (Player)
            if (ball.position.z > paddle1.position.z - 0.6 && ball.position.z < paddle1.position.z + 0.6) {
                if (Math.abs(ball.position.x - paddle1.position.x) < 2.5) {
                    ballDir.z *= -1;
                    ballSpeed += 0.02; // Speed up
                    // Add "english" based on where it hit the paddle
                    ballDir.x += (ball.position.x - paddle1.position.x) * 0.3;
                    ballDir.normalize();
                }
            }

            // Paddle 2 Collision (CPU)
            if (ball.position.z < paddle2.position.z + 0.6 && ball.position.z > paddle2.position.z - 0.6) {
                if (Math.abs(ball.position.x - paddle2.position.x) < 2.5) {
                    ballDir.z *= -1;
                    ballSpeed += 0.02;
                }
            }

            // CPU AI
            const targetX = ball.position.x;
            // Simple lerp for smooth movement
            paddle2.position.x += (targetX - paddle2.position.x) * 0.08;
            paddle2.position.x = Math.max(Math.min(paddle2.position.x, 8), -8);

            // Scoring
            if (ball.position.z > FIELD_LENGTH/2) {
                cpuScore++;
                updateScore();
                resetBall(-1);
            }
            if (ball.position.z < -FIELD_LENGTH/2) {
                p1Score++;
                updateScore();
                resetBall(1);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
