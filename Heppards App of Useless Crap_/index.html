
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heppards App of Useless Crap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --sentiment-score: 0; /* from -1 to 1 */
        --base-hue-1: 280; /* purple */
        --base-hue-2: 180; /* cyan */
        --base-hue-3: 30; /* orange */

        --hue-1: calc(var(--base-hue-1) + var(--sentiment-score) * 40);
        --hue-2: calc(var(--base-hue-2) + var(--sentiment-score) * -40);
        --hue-3: calc(var(--base-hue-3) + var(--sentiment-score) * 20);
        --saturation: calc(70% + var(--sentiment-score) * 30%);
        --brightness: calc(50% + var(--sentiment-score) * 10%);
      }
      @keyframes gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-gradient {
        background-size: 200% 200%;
        animation: gradient-animation 15s ease infinite;
      }
      body {
        font-family: 'Orbitron', sans-serif;
      }
      @keyframes pop-in {
        0% {
          opacity: 0;
          transform: scale(0.95) translateY(10px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .animate-pop-in {
        animation: pop-in 0.3s ease-out forwards;
      }
      @keyframes wave {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }
      .animate-wave {
        animation: wave 2s linear infinite;
      }
      @keyframes pop-it-in {
        0% { transform: scale(1); }
        50% { transform: scale(0.85); }
        100% { transform: scale(0.9); }
      }
      @keyframes pop-it-out {
        0% { transform: scale(0.9); }
        100% { transform: scale(1); }
      }
      .pop-it-in {
        animation: pop-it-in 0.15s ease-out forwards;
      }
      .pop-it-out {
         animation: pop-it-out 0.2s ease-out forwards;
      }
      @keyframes glitch {
        0% { transform: translate(0); }
        10% { transform: translate(-2px, 2px); }
        20% { transform: translate(2px, -2px); }
        30% { transform: translate(-2px, -2px); }
        40% { transform: translate(2px, 2px); }
        50% { transform: translate(0); }
        100% { transform: translate(0); }
      }
      .animate-glitch {
        animation: glitch 0.3s linear infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
