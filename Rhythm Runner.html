<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Heppard's Rhythm Runner</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --glass-bg: rgba(5, 10, 20, 0.8);
        }

        body { margin: 0; overflow: hidden; background: #010105; font-family: 'Courier New', monospace; color: white; }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        /* Branding Header */
        #header {
            position: absolute; top: 30px; left: 30px; padding: 20px 30px;
            border-left: 5px solid var(--neon-magenta);
        }
        #header h1 { margin: 0; font-size: 22px; letter-spacing: 3px; text-shadow: 0 0 15px var(--neon-magenta); }
        #header p { margin: 5px 0 0 0; font-size: 10px; opacity: 0.7; text-transform: uppercase; }

        /* HUD */
        #hud {
            position: absolute; top: 30px; right: 30px; padding: 15px 25px;
            text-align: right;
        }
        .stat-label { font-size: 10px; color: var(--neon-cyan); letter-spacing: 2px; }
        .stat-value { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px white; }

        /* Start / Game Over Screens */
        #menu-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px; text-align: center; display: block;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px; text-align: center; display: none;
        }
        h2 { color: var(--neon-cyan); font-size: 32px; margin: 0 0 15px 0; text-shadow: 0 0 20px var(--neon-cyan); }
        .btn {
            background: transparent; border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta); padding: 12px 40px; cursor: pointer;
            font-family: inherit; font-weight: bold; margin-top: 20px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn:hover { background: var(--neon-magenta); color: black; box-shadow: 0 0 20px var(--neon-magenta); }

        /* Glitch Animation for death */
        .glitch { animation: shake 0.1s infinite; filter: hue-rotate(90deg) contrast(200%); }
        @keyframes shake { 
            0% { transform: translate(3px, 3px); } 
            25% { transform: translate(-3px, -3px); } 
            50% { transform: translate(3px, -3px); } 
            75% { transform: translate(-3px, 3px); } 
        }

        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body id="main-body">

    <div id="ui-overlay">
        <div id="header" class="glass-panel">
            <h1>RHYTHM RUNNER</h1>
            <p>Heppard Synaptic Engine v3.0</p>
        </div>

        <div id="hud" class="glass-panel">
            <div class="stat-label">SYNC SCORE</div>
            <div id="score-val" class="stat-value">0000</div>
            <div class="stat-label" style="margin-top: 10px; color: var(--neon-magenta);">VELOCITY</div>
            <div id="speed-val" class="stat-value">120</div>
        </div>

        <div id="menu-screen" class="glass-panel">
            <h2>LINK INITIATED</h2>
            <p>Dodge Obstacles to the Pulse.</p>
            <button class="btn" onclick="startGame()">Connect Neural Link</button>
        </div>

        <div id="game-over" class="glass-panel">
            <h2 style="color: var(--neon-magenta); text-shadow: 0 0 20px var(--neon-magenta);">SIGNAL LOST</h2>
            <p id="final-stats">Sync Accuracy: 0%</p>
            <button class="btn" onclick="location.reload()">Re-Sync</button>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const BPM = 128;
        const BEAT_TIME = 60 / BPM;
        const LANE_WIDTH = 12;
        const TUNNEL_LENGTH = 200;

        // --- STATE ---
        let scene, camera, renderer, clock;
        let tunnelSegments = [];
        let obstacles = [];
        let player, playerTargetX = 0;
        let speed = 60, score = 0, beatTimer = 0;
        let isGameRunning = false;
        let currentLane = 0; // -1, 0, 1

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            scene.fog = new THREE.FogExp2(0x010105, 0.015);

            // Wide FOV for speed sensation
            camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            scene.add(new THREE.AmbientLight(0x202020));
            const pLight = new THREE.PointLight(0x00ffff, 2, 50);
            pLight.position.set(0, 5, 5);
            scene.add(pLight);

            createTunnel();
            createPlayer();

            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('resize', onResize);
            
            animate();
        }

        function createTunnel() {
            const geo = new THREE.OctahedronGeometry(25, 1);
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.2 
            });

            for (let i = 0; i < 40; i++) {
                const ring = new THREE.Mesh(geo, mat);
                ring.position.z = -i * 10;
                ring.rotation.z = i * 0.1;
                scene.add(ring);
                tunnelSegments.push(ring);
            }
        }

        function createPlayer() {
            const geo = new THREE.ConeGeometry(1.5, 4, 4);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                wireframe: true, 
                emissive: 0xff00ff, 
                emissiveIntensity: 0.5 
            });
            player = new THREE.Mesh(geo, mat);
            player.rotation.x = -Math.PI / 2;
            player.rotation.y = Math.PI / 4;
            player.position.y = 1;
            scene.add(player);

            // Engine Trail
            const trail = new THREE.PointLight(0xff00ff, 2, 15);
            trail.position.set(0, -2, 0);
            player.add(trail);
        }

        function spawnObstacle() {
            const geo = new THREE.TetrahedronGeometry(3);
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0xff00ff, 
                wireframe: true 
            });
            const obs = new THREE.Mesh(geo, mat);
            const lane = (Math.floor(Math.random() * 3) - 1);
            obs.position.set(lane * LANE_WIDTH, 2, -250);
            obs.userData = { lane };
            scene.add(obs);
            obstacles.push(obs);
        }

        function pulseTunnel() {
            tunnelSegments.forEach(s => {
                s.scale.set(1.2, 1.2, 1.2);
                setTimeout(() => s.scale.set(1, 1, 1), 100);
            });
        }

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            isGameRunning = true;
        }

        function onKeyDown(e) {
            if (!isGameRunning) return;
            if ((e.key === 'a' || e.key === 'ArrowLeft') && currentLane > -1) {
                currentLane--;
            }
            if ((e.key === 'd' || e.key === 'ArrowRight') && currentLane < 1) {
                currentLane++;
            }
            playerTargetX = currentLane * LANE_WIDTH;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (isGameRunning) {
                // Beat Logic
                beatTimer += dt;
                if (beatTimer >= BEAT_TIME) {
                    beatTimer -= BEAT_TIME;
                    pulseTunnel();
                    score += 10;
                    speed += 1.5;
                    document.getElementById('score-val').innerText = score.toString().padStart(4, '0');
                    document.getElementById('speed-val').innerText = Math.floor(speed);
                    
                    // Spawn chance on beat
                    if (Math.random() > 0.4) spawnObstacle();
                }

                // Move Tunnel
                tunnelSegments.forEach(s => {
                    s.position.z += speed * dt;
                    s.rotation.z += dt * 0.5;
                    if (s.position.z > 20) s.position.z = -380;
                });

                // Move Obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += speed * dt;
                    obs.rotation.x += dt * 2;
                    obs.rotation.y += dt;

                    // Collision Check
                    const dist = player.position.distanceTo(obs.position);
                    if (dist < 4) {
                        endGame();
                    }

                    if (obs.position.z > 20) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                    }
                }

                // Player Movement
                player.position.x += (playerTargetX - player.position.x) * 12 * dt;
                player.rotation.z = (player.position.x - playerTargetX) * -0.15;
                player.rotation.y += dt * 5;

                // Dynamic FOV for speed
                camera.fov = 90 + (speed / 10);
                camera.updateProjectionMatrix();
            } else {
                // Idle Rotation
                tunnelSegments.forEach(s => s.rotation.z += dt * 0.1);
            }

            renderer.render(scene, camera);
        }

        function endGame() {
            isGameRunning = false;
            document.getElementById('main-body').classList.add('glitch');
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-stats').innerText = `Sync Accuracy: ${score}%`;
        }
    </script>
</body>
</html>
