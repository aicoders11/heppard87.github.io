<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Heppard's Virtual Room Planner</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --glass-bg: rgba(5, 10, 20, 0.8);
        }

        body { margin: 0; overflow: hidden; background: #010105; font-family: 'Courier New', monospace; color: white; }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        /* Branding Header */
        #header {
            position: absolute; top: 30px; left: 30px; padding: 20px 30px;
            border-left: 5px solid var(--neon-cyan);
        }
        #header h1 { margin: 0; font-size: 20px; letter-spacing: 3px; text-shadow: 0 0 15px var(--neon-cyan); }
        #header p { margin: 5px 0 0 0; font-size: 10px; opacity: 0.7; text-transform: uppercase; }

        /* Furniture Catalog */
        #catalog {
            position: absolute; top: 30px; right: 30px; width: 220px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .catalog-label { font-size: 10px; color: var(--neon-cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        
        .item-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3);
            color: white; padding: 12px; cursor: pointer; font-family: inherit;
            font-size: 11px; text-transform: uppercase; transition: 0.2s;
            text-align: left; display: flex; justify-content: space-between;
        }
        .item-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }
        .item-btn span { opacity: 0.6; font-size: 9px; }

        /* Selection Controls */
        #selection-panel {
            position: absolute; bottom: 30px; right: 30px; width: 220px; padding: 20px;
            display: none; flex-direction: column; gap: 10px;
        }
        .action-btn {
            background: transparent; border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta); padding: 10px; font-size: 11px;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .action-btn:hover { background: var(--neon-magenta); color: white; }

        /* Interaction Hint */
        #status-tip {
            position: absolute; bottom: 30px; left: 30px; padding: 12px 25px;
            font-size: 11px; color: #888; text-transform: uppercase;
        }
        #status-tip span { color: var(--neon-cyan); }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--neon-cyan); font-size: 18px; letter-spacing: 5px;
        }

        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">CONSTRUCTING WIREFRAME ENVIRONMENT...</div>

    <div id="ui-overlay">
        <div id="header" class="glass-panel">
            <h1>ROOM PLANNER</h1>
            <p>Spatial Logic Suite v1.1</p>
        </div>

        <div id="catalog" class="glass-panel">
            <div class="catalog-label">Furniture Catalog</div>
            <button class="item-btn" onclick="spawnItem('bed')">Bed <span>2x3</span></button>
            <button class="item-btn" onclick="spawnItem('sofa')">Sofa <span>3x1</span></button>
            <button class="item-btn" onclick="spawnItem('table')">Table <span>2x2</span></button>
            <button class="item-btn" onclick="spawnItem('desk')">Desk <span>2x1</span></button>
            <button class="item-btn" onclick="spawnItem('chair')">Chair <span>1x1</span></button>
        </div>

        <div id="selection-panel" class="glass-panel">
            <div class="catalog-label">Edit Selection</div>
            <button class="action-btn" onclick="rotateSelected()">Rotate 90°</button>
            <button class="action-btn" style="border-color: #ff4444; color: #ff4444;" onclick="deleteSelected()">De-Materialize</button>
        </div>

        <div id="status-tip" class="glass-panel">
            <span>DRAG</span> TO POSITION &bull; <span>SCROLL</span> TO ZOOM &bull; <span>R-CLICK</span> TO ORBIT
        </div>
    </div>

    <script>
        const GRID_SIZE = 10;
        const GRID_DIVISIONS = 20;
        const CELL_SIZE = GRID_SIZE / GRID_DIVISIONS; // 0.5 units

        const FURNITURE = {
            bed: { w: 4, h: 2, d: 6, color: 0x00ffff },
            sofa: { w: 6, h: 2, d: 2, color: 0xff00ff },
            table: { w: 4, h: 1.5, d: 4, color: 0xffff00 },
            desk: { w: 4, h: 2, d: 2, color: 0x00ff00 },
            chair: { w: 2, h: 2, d: 2, color: 0xffffff }
        };

        let scene, camera, renderer, raycaster, mouse;
        let floor, grid, roomObjects = [];
        let selectedObject = null;
        let isDragging = false;
        let dragOffset = new THREE.Vector3();

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(20, 20, 20);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lights
            scene.add(new THREE.AmbientLight(0x404040, 0.5));
            const pLight = new THREE.PointLight(0xffffff, 1, 100);
            pLight.position.set(10, 20, 10);
            scene.add(pLight);

            // Grid & Floor
            grid = new THREE.GridHelper(20, 20, 0x00ffff, 0x111122);
            scene.add(grid);

            const floorGeo = new THREE.PlaneGeometry(20, 20);
            const floorMat = new THREE.MeshBasicMaterial({ visible: false });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Room Walls (Wireframe)
            const roomBox = new THREE.BoxGeometry(20, 10, 20);
            const roomEdges = new THREE.EdgesGeometry(roomBox);
            const roomMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1 });
            const roomFrame = new THREE.LineSegments(roomEdges, roomMat);
            roomFrame.position.y = 5;
            scene.add(roomFrame);

            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onResize);

            document.getElementById('loading').style.display = 'none';
            animate();
        }

        function spawnItem(type) {
            const data = FURNITURE[type];
            const geo = new THREE.BoxGeometry(data.w, data.h, data.d);
            const mat = new THREE.MeshStandardMaterial({ 
                color: data.color, 
                wireframe: true, 
                emissive: data.color, 
                emissiveIntensity: 0.3 
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Add a solid core for easier selection
            const coreGeo = new THREE.BoxGeometry(data.w * 0.95, data.h * 0.95, data.d * 0.95);
            const coreMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.1 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            mesh.add(core);

            mesh.position.set(0, data.h / 2, 0);
            mesh.userData = { type: 'furniture', itemType: type, height: data.h };
            
            scene.add(mesh);
            roomObjects.push(mesh);
            selectObject(mesh);
        }

        function onMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(roomObjects);

            if (intersects.length > 0) {
                // Clicked an object
                if (event.button === 0) {
                    selectObject(intersects[0].object.userData.type ? intersects[0].object : intersects[0].object.parent);
                    isDragging = true;
                    
                    const floorIntersect = raycaster.intersectObject(floor);
                    if (floorIntersect.length > 0) {
                        dragOffset.copy(floorIntersect[0].point).sub(selectedObject.position);
                    }
                }
            } else {
                // Clicked empty space
                if (event.button === 0) deselectObject();
            }
        }

        function onMouseMove(event) {
            if (!isDragging || !selectedObject) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(floor);

            if (intersects.length > 0) {
                const target = intersects[0].point.sub(dragOffset);
                
                // Grid Snapping (snap to 1 unit increments)
                selectedObject.position.x = Math.round(target.x);
                selectedObject.position.z = Math.round(target.z);
                selectedObject.position.y = selectedObject.userData.height / 2;

                // Bounds
                selectedObject.position.x = Math.max(-10, Math.min(10, selectedObject.position.x));
                selectedObject.position.z = Math.max(-10, Math.min(10, selectedObject.position.z));
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function selectObject(obj) {
            deselectObject();
            selectedObject = obj;
            selectedObject.material.emissiveIntensity = 1.0;
            document.getElementById('selection-panel').style.display = 'flex';
        }

        function deselectObject() {
            if (selectedObject) {
                selectedObject.material.emissiveIntensity = 0.3;
            }
            selectedObject = null;
            document.getElementById('selection-panel').style.display = 'none';
        }

        function rotateSelected() {
            if (selectedObject) {
                selectedObject.rotation.y += Math.PI / 2;
            }
        }

        function deleteSelected() {
            if (selectedObject) {
                scene.remove(selectedObject);
                roomObjects = roomObjects.filter(o => o !== selectedObject);
                deselectObject();
            }
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
