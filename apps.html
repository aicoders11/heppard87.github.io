    <script>
        function checkStrength() {
            const pwd = document.getElementById('pwdInput').value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            let score = 0;
            
            if (pwd.length > 8) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            
            const colors = ['#ff0055', '#ffaa00', '#00f5d4', '#00ff00'];
            const levels = ['UNSAFE', 'WEAK', 'SECURE', 'OVERKILL'];
            
            if (pwd.length === 0) {
                bar.style.width = '0%';
                text.innerHTML = 'Clearance Level: <span style="color: grey">Unknown</span>';
            } else {
                bar.style.width = (score + 1) * 25 + '%';
                bar.style.background = colors[score] || colors[0];
                text.innerHTML = 'Clearance Level: <span style="color:' + (colors[score] || colors[0]) + '">' + (levels[score] || levels[0]) + '</span>';
            }
        }
    </script>
