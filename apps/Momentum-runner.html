<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Shadows: Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');

        :root {
            --c-cyan: #00f3ff;
            --c-pink: #ff00ff;
            --c-yellow: #faff00;
            --c-bg: #050510;
        }

        body {
            margin: 0; overflow: hidden; background: var(--c-bg);
            font-family: 'Share Tech Mono', monospace;
            touch-action: none; user-select: none;
        }

        .font-header { font-family: 'Orbitron', sans-serif; }
        .neon-text { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
        
        /* CRT Scanline Overlay */
        .scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .hidden { display: none !important; }
        
        .panel {
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
        .shake { animation: glitch 0.2s cubic-bezier(.25, .46, .45, .94) both infinite; }
    </style>
</head>
<body class="h-full w-full text-white">

    <div class="absolute inset-0 scanlines"></div>
    <canvas id="game-canvas" class="block w-full h-full bg-[#050510]"></canvas>

    <!-- UI Layer -->
    <div id="ui-layer" class="absolute inset-0 z-40 pointer-events-none flex flex-col justify-between p-4 md:p-8">
        
        <!-- BOOT SCREEN -->
        <div id="screen-boot" class="absolute inset-0 bg-[#050510] z-50 flex flex-col items-center justify-center pointer-events-auto">
            <h1 class="font-header text-6xl md:text-9xl text-cyan-400 neon-text mb-2 italic tracking-tighter">NEON SHADOWS</h1>
            <p class="text-pink-500 tracking-[0.5em] text-xs font-bold mb-12">ULTIMATE EDITION</p>
            <button id="btn-boot" class="px-16 py-5 border border-cyan-400 text-cyan-400 font-header text-xl hover:bg-cyan-400 hover:text-black transition-all shadow-[0_0_30px_rgba(0,243,255,0.2)]">
                Initialize System
            </button>
            <div class="absolute bottom-8 text-center w-full">
                <p class="text-slate-600 font-mono text-[10px] tracking-widest uppercase">Developed by Chris Heppard</p>
            </div>
        </div>

        <!-- MAIN MENU -->
        <div id="screen-menu" class="absolute inset-0 bg-[#050510]/80 z-40 flex flex-col items-center justify-center hidden pointer-events-auto backdrop-blur-sm">
            <div class="mb-10 text-center">
                <h2 class="font-header text-4xl text-white mb-2">SELECT PROTOCOL</h2>
                <p class="text-slate-400 text-xs font-mono">HIGH SCORE: <span id="menu-highscore" class="text-yellow-400">00000</span></p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl px-4">
                <button id="btn-mode-adv" class="group relative panel p-8 text-left hover:border-cyan-400 transition-all hover:scale-[1.02]">
                    <div class="absolute top-0 left-0 w-1 h-full bg-cyan-400 group-hover:shadow-[0_0_15px_#00f3ff]"></div>
                    <h2 class="font-header text-2xl text-white mb-1 group-hover:text-cyan-400">STORY_RUN</h2>
                    <p class="text-slate-500 text-xs uppercase tracking-wider">4 Districts • Reach the Core</p>
                </button>
                
                <button id="btn-mode-endless" class="group relative panel p-8 text-left hover:border-pink-500 transition-all hover:scale-[1.02]">
                    <div class="absolute top-0 left-0 w-1 h-full bg-pink-500 group-hover:shadow-[0_0_15px_#ff00ff]"></div>
                    <h2 class="font-header text-2xl text-white mb-1 group-hover:text-pink-500">INFINITE_LOOP</h2>
                    <p class="text-slate-500 text-xs uppercase tracking-wider">Procedural • Leaderboard</p>
                </button>
            </div>
            
            <div class="mt-16 text-center">
                <p class="text-[10px] text-slate-600 font-mono uppercase tracking-widest mb-2">Controls</p>
                <div class="flex gap-4 justify-center text-xs text-slate-400 font-mono">
                    <span class="bg-white/5 px-2 py-1 rounded">WASD / Arrows</span>
                    <span class="bg-white/5 px-2 py-1 rounded">SPACE Jump</span>
                    <span class="bg-white/5 px-2 py-1 rounded">SHIFT Dash</span>
                </div>
            </div>
        </div>

        <!-- HUD -->
        <div id="ui-hud" class="hidden w-full flex justify-between items-start transition-opacity duration-500">
            <div class="flex flex-col gap-2">
                <div id="hud-hp" class="flex gap-1 text-2xl h-6"></div>
                <div class="panel px-4 py-2 border-l-2 border-cyan-400 mt-2">
                    <div class="text-[9px] text-cyan-400 font-bold tracking-widest mb-1">DATA_FRAGMENTS</div>
                    <div class="flex items-baseline gap-2">
                        <span id="hud-score" class="font-header text-2xl">00000</span>
                        <span id="hud-combo" class="text-yellow-400 text-xs font-bold opacity-0 transition-opacity">x1.0</span>
                    </div>
                </div>
                <!-- Powerup Status -->
                <div id="hud-powerup" class="hidden flex items-center gap-2 mt-1">
                    <div class="w-2 h-2 rounded-full bg-white animate-pulse"></div>
                    <span id="hud-powerup-text" class="text-[10px] font-bold uppercase"></span>
                </div>
            </div>

            <div class="flex flex-col items-end gap-2">
                <div class="panel px-4 py-1 border-r-2 border-pink-500">
                    <span class="text-[9px] text-pink-500 font-bold mr-2">SECTOR_ID</span>
                    <span id="hud-district" class="font-header text-lg">SLUMS</span>
                </div>
            </div>

            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-48 text-center">
                <div class="flex justify-between text-[9px] text-cyan-400 mb-1 font-bold tracking-widest opacity-70">
                    <span>CAPACITOR</span>
                    <span id="hud-dash-status">READY</span>
                </div>
                <div class="h-1 bg-slate-800 w-full overflow-hidden">
                    <div id="hud-dash-bar" class="h-full bg-cyan-400 shadow-[0_0_10px_#00f3ff] w-full transition-all duration-75"></div>
                </div>
            </div>
        </div>

        <!-- RESULTS -->
        <div id="screen-result" class="absolute inset-0 bg-[#050510]/95 z-50 flex flex-col items-center justify-center hidden pointer-events-auto">
            <h1 id="res-title" class="font-header text-6xl text-white mb-2 italic neon-text text-pink-500">SIGNAL_LOST</h1>
            <p class="text-xs text-slate-500 tracking-widest mb-8 uppercase font-bold">Connection Terminated</p>
            
            <div class="grid grid-cols-2 gap-8 text-center mb-12">
                <div>
                    <div class="text-[10px] text-slate-500">SCORE</div>
                    <div id="res-score" class="font-header text-3xl text-cyan-400">0</div>
                </div>
                <div>
                    <div class="text-[10px] text-slate-500">BEST</div>
                    <div id="res-best" class="font-header text-3xl text-yellow-400">0</div>
                </div>
            </div>

            <div class="flex gap-4">
                <button id="btn-reboot" class="px-8 py-3 border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black font-header transition-all">REBOOT</button>
                <button onclick="location.reload()" class="px-8 py-3 bg-slate-800 text-slate-400 hover:text-white font-header transition-all">ABORT</button>
            </div>
        </div>

        <!-- MOBILE -->
        <div id="touch-controls" class="absolute bottom-6 left-6 right-6 flex justify-between hidden pointer-events-auto touch-none select-none">
            <div class="flex gap-4">
                <button id="btn-left" class="w-20 h-20 bg-white/5 border border-white/20 rounded-lg flex items-center justify-center text-3xl active:bg-cyan-400/20">←</button>
                <button id="btn-right" class="w-20 h-20 bg-white/5 border border-white/20 rounded-lg flex items-center justify-center text-3xl active:bg-cyan-400/20">→</button>
            </div>
            <div class="flex gap-4 items-end">
                <button id="btn-dash" class="w-16 h-16 bg-pink-500/10 border border-pink-500/30 rounded-full flex items-center justify-center font-bold text-xs active:bg-pink-500/40">DASH</button>
                <button id="btn-jump" class="w-24 h-24 bg-cyan-400/10 border border-cyan-400/30 rounded-full flex items-center justify-center text-4xl active:bg-cyan-400/40">⬆</button>
            </div>
        </div>
    </div>

<script>
/**
 * NEON SHADOWS ENGINE v7.0 (ULTIMATE)
 * Features: Parallax City, Powerups, Music Engine, Storage
 */

const CFG = {
    g: 0.65, fric: 0.82, speed: 0.85, maxSpd: 11,
    jump: -15, wallJump: {x:10, y:-14},
    dash: 24, dashTime: 12, dashCool: 50,
    colors: { c: '#00f3ff', p: '#ff00ff', y: '#faff00', w: '#fff' }
};

const DISTRICTS = [
    { id: 'SLUMS', color: '#00f3ff', bg: '#050510' },
    { id: 'INDUSTRY', color: '#ff00ff', bg: '#0a050a' },
    { id: 'CORE', color: '#faff00', bg: '#0a0a00' },
    { id: 'VOID', color: '#ffffff', bg: '#000000' }
];

// --- AUDIO ENGINE (SYNTHWAVE GENERATOR) ---
const SFX = {
    ctx: null,
    nextNote: 0,
    beat: 0,
    bassLine: [110, 110, 110, 110, 87, 87, 98, 98], // A2 -> F2 -> G2
    init() { try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} },
    play(freq, type, dur, vol, slide=false) {
        if(!this.ctx) return;
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if(slide) o.frequency.exponentialRampToValueAtTime(freq/2, this.ctx.currentTime+dur);
        g.gain.setValueAtTime(vol, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime+dur);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime+dur);
    },
    tick(time) { // Music Sequencer
        if(!this.ctx || this.ctx.state !== 'running') return;
        if(time > this.nextNote) {
            const freq = this.bassLine[this.beat % 8];
            this.play(freq, 'sawtooth', 0.15, 0.03); // Bass
            if(this.beat % 4 === 2) this.play(100, 'square', 0.05, 0.02); // Snare-ish
            this.nextNote = time + 0.25; // 120 BPM roughly
            this.beat++;
        }
    },
    jump() { this.play(300, 'square', 0.1, 0.1, true); },
    dash() { this.play(600, 'sawtooth', 0.25, 0.05, true); },
    coin() { this.play(1200, 'sine', 0.1, 0.05); },
    powerup() { this.play(800, 'square', 0.4, 0.1, true); },
    hurt() { this.play(100, 'sawtooth', 0.3, 0.2, true); }
};

class Game {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.keys = {}; this.state = 'BOOT';
        this.bgTime = 0;
        
        // High Score
        this.highScore = parseInt(localStorage.getItem('neon_high') || '0');
        document.getElementById('menu-highscore').innerText = this.highScore.toString().padStart(5,'0');

        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.bindInput();

        // Button Bindings
        document.getElementById('btn-boot').onclick = () => {
            SFX.init();
            document.getElementById('screen-boot').classList.add('hidden');
            document.getElementById('screen-menu').classList.remove('hidden');
            this.state = 'MENU';
        };
        document.getElementById('btn-mode-adv').onclick = () => this.start('adventure');
        document.getElementById('btn-mode-endless').onclick = () => this.start('endless');
        document.getElementById('btn-reboot').onclick = () => this.start(this.mode || 'adventure');

        this.loop();
    }

    bindInput() {
        window.addEventListener('keydown', e => { this.keys[e.code] = true; if(e.code=='Space')e.preventDefault(); });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        const touch = (id, key) => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('touchstart', e => { e.preventDefault(); this.keys[key]=true; }, {passive:false});
                el.addEventListener('touchend', e => { e.preventDefault(); this.keys[key]=false; }, {passive:false});
            }
        };
        touch('btn-left', 'ArrowLeft'); touch('btn-right', 'ArrowRight');
        touch('btn-jump', 'Space'); touch('btn-dash', 'ShiftLeft');
    }

    resize() {
        this.width = this.canvas.width = window.innerWidth;
        this.height = this.canvas.height = window.innerHeight;
    }

    start(mode) {
        this.mode = mode;
        this.state = 'PLAYING';
        this.score = 0;
        this.combo = 1;
        this.comboTimer = 0;
        
        this.p = { 
            x: 100, y: 300, w: 28, h: 44, vx: 0, vy: 0, 
            hp: 3, dash: 0, dashCd: 0, wall: 0, invuln: 0, flip: false,
            power: null, powerTimer: 0 // New Powerup State
        };
        
        this.cam = { x: 0, y: 0, shake: 0 };
        this.genLevel();
        this.parts = []; 
        
        // UI Reset
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('ui-hud').classList.remove('hidden');
        if('ontouchstart' in window) document.getElementById('touch-controls').classList.remove('hidden');
    }

    genLevel() {
        this.level = { plats:[], coins:[], hazards:[], powerups:[], texts:[], finish:null };
        const L = this.level;
        
        // Start Floor
        L.plats.push({x:0, y:500, w:800, h:500, c:CFG.colors.c});
        
        // Tutorial Text
        L.texts.push({x:300, y:300, t:"MOVE >>", c:"#fff"});
        L.texts.push({x:600, y:250, t:"JUMP [SPACE]", c:"#0ff"});
        L.texts.push({x:1200, y:200, t:"DASH [SHIFT]", c:"#f0f"});

        let cx = 800;
        const len = this.mode === 'endless' ? 10000 : 150;
        
        for(let i=0; i<len; i++) {
            cx += 150 + Math.random() * 200;
            const cy = 300 + Math.random() * 300;
            const w = 150 + Math.random() * 300;
            const distIdx = Math.floor(cx / 4000) % 3;
            const c = DISTRICTS[distIdx].color;

            L.plats.push({x:cx, y:cy, w, h:40, c});

            // Coins
            if(Math.random() > 0.4) L.coins.push({x:cx+w/2-10, y:cy-40, w:20, h:20});

            // Powerups (New)
            if(i > 10 && Math.random() > 0.95) {
                const type = Math.random()>0.5 ? 'shield' : 'magnet';
                L.powerups.push({x:cx+w/2, y:cy-80, type});
            }

            // Hazards
            if(i > 5 && Math.random() > 0.6) {
                if(Math.random() > 0.5) L.hazards.push({x:cx+w/2, y:cy-20, r:25, type:'saw', a:0});
                else L.hazards.push({x:cx+w/2, y:cy-100, w:10, h:100, type:'laser', on:true, t:0});
            }
        }
        if(this.mode=='adventure') L.finish = cx+200;
    }

    update() {
        if(this.state !== 'PLAYING') return;
        
        // Music Tick
        if(SFX.ctx) SFX.tick(SFX.ctx.currentTime);

        const p = this.p;
        const k = this.keys;
        const dt = (p.dash > 0) ? 0.4 : 1.0;

        // Magnet Powerup Logic
        if(p.power === 'magnet') {
            this.level.coins.forEach(c => {
                if(!c.taken && Math.abs(c.x - p.x) < 300) {
                    c.x += (p.x - c.x) * 0.1;
                    c.y += (p.y - c.y) * 0.1;
                }
            });
            p.powerTimer--;
            if(p.powerTimer <= 0) p.power = null;
        }
        
        // Shield Timer
        if(p.power === 'shield') {
            p.powerTimer--;
            if(p.powerTimer <= 0) p.power = null;
        }

        // --- PHYSICS ---
        if(p.dash > 0) {
            p.dash -= 1; p.vy = 0;
            if(p.dash % 3 == 0) this.spawnPart(p.x, p.y, p.flip?CFG.colors.p:CFG.colors.c, 0);
        } else {
            if(k.ArrowRight || k.KeyD) { p.vx += CFG.speed * dt; p.flip = false; }
            else if(k.ArrowLeft || k.KeyA) { p.vx -= CFG.speed * dt; p.flip = true; }
            else { p.vx *= CFG.fric; }
            p.vx = Math.max(-CFG.maxSpd, Math.min(CFG.maxSpd, p.vx));
            p.vy += CFG.g * dt;

            // Jump
            if((k.Space || k.ArrowUp) && p.grounded) {
                p.vy = CFG.jump; p.grounded = false; SFX.jump();
                this.spawnPart(p.x+p.w/2, p.y+p.h, '#fff', 5);
            }
            
            // Wall Jump
            if(p.wall && !p.grounded) {
                p.vy = Math.min(p.vy, 2); 
                if((k.Space || k.ArrowUp) && !p.wjLock) {
                    p.vy = CFG.wallJump.y; p.vx = -p.wall * CFG.wallJump.x;
                    p.wall = 0; p.wjLock = 10; SFX.jump();
                }
            }
            if(p.wjLock > 0) p.wjLock--;

            // Dash
            if(p.dashCd > 0) p.dashCd -= dt;
            if((k.ShiftLeft || k.KeyK) && p.dashCd <= 0) {
                p.dash = CFG.dashTime; p.dashCd = CFG.dashCool;
                p.vx = p.flip ? -CFG.dash : CFG.dash;
                this.cam.shake = 10; SFX.dash();
            }
        }

        p.x += p.vx * dt;
        p.y += p.vy * dt;
        if(p.invuln > 0) p.invuln--;

        // --- COLLISIONS ---
        p.grounded = false; p.wall = 0;
        for(let pl of this.level.plats) {
            if(pl.x > p.x + 800 || pl.x + pl.w < p.x - 800) continue;
            if(this.collide(p, pl)) {
                if(p.vy > 0 && p.y + p.h - p.vy*dt <= pl.y + 15) {
                    p.y = pl.y - p.h; p.vy = 0; p.grounded = true;
                } else if(p.vy < 0 && p.y - p.vy*dt >= pl.y + pl.h) {
                    p.y = pl.y + pl.h; p.vy = 0;
                } else {
                    if(p.vx > 0) { p.x = pl.x - p.w; p.wall = 1; }
                    else if (p.vx < 0) { p.x = pl.x + pl.w; p.wall = -1; }
                    p.vx = 0;
                }
            }
        }

        // --- ENTITIES ---
        this.level.coins.forEach(c => {
            if(!c.taken && this.collide(p, c)) {
                c.taken = true; SFX.coin();
                this.score += 100 * this.combo;
                this.combo = Math.min(4, this.combo + 0.5);
                this.comboTimer = 180;
                document.getElementById('hud-combo').style.opacity = '1';
            }
        });

        // Powerups
        this.level.powerups = this.level.powerups.filter(pu => {
            if(this.collide(p, {x:pu.x, y:pu.y, w:20, h:20})) {
                p.power = pu.type;
                p.powerTimer = 600; // 10 seconds
                SFX.powerup();
                this.updatePowerupUI();
                return false;
            }
            return true;
        });

        // Hazards
        for(let h of this.level.hazards) {
            if(h.x > p.x + 800 || h.x < p.x - 800) continue;
            let hit = false;
            if(h.type === 'saw') {
                h.a += 0.2;
                const dx = (p.x+p.w/2) - h.x, dy = (p.y+p.h/2) - h.y;
                if(Math.sqrt(dx*dx + dy*dy) < h.r + p.w/2) hit = true;
            } else if(h.type === 'laser') {
                h.t++;
                if(h.t % 120 > 60) h.on = true; else h.on = false;
                if(h.on && this.collide(p, h)) hit = true;
            }
            if(hit && p.invuln <= 0) this.damage();
        }

        if(this.comboTimer > 0) {
            this.comboTimer--;
            if(this.comboTimer <= 0) {
                this.combo = 1;
                document.getElementById('hud-combo').style.opacity = '0';
            }
        }

        if(p.y > this.height + 200) this.gameOver();
        if(this.level.finish && p.x > this.level.finish) this.victory();

        const tx = p.x - this.width / 3;
        const ty = p.y - this.height / 2;
        this.cam.x += (tx - this.cam.x) * 0.1;
        this.cam.y += (ty - this.cam.y) * 0.1;
        
        if(this.cam.shake > 0) {
            this.cam.x += (Math.random()-0.5)*this.cam.shake;
            this.cam.y += (Math.random()-0.5)*this.cam.shake;
            this.cam.shake *= 0.9;
        }

        this.updateHUD();
    }

    damage() {
        // Shield Protection
        if(this.p.power === 'shield') {
            this.p.power = null;
            this.p.invuln = 60;
            this.updatePowerupUI();
            this.spawnPart(this.p.x, this.p.y, '#00f3ff', 10);
            return;
        }

        this.p.hp--;
        this.p.invuln = 60;
        this.p.vy = -10;
        this.p.vx = -this.p.vx;
        this.cam.shake = 20;
        SFX.hurt();
        document.body.classList.add('shake'); // Add CSS shake
        setTimeout(()=>document.body.classList.remove('shake'), 200);
        if(this.p.hp <= 0) this.gameOver();
    }

    draw() {
        const ctx = this.ctx;
        this.bgTime += 1;
        let cx, cy;
        
        if(this.state === 'PLAYING') {
            cx = Math.floor(this.cam.x); cy = Math.floor(this.cam.y);
        } else {
            cx = this.bgTime * 2; cy = 0;
        }
        
        // Background
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, this.width, this.height);
        
        // City Parallax
        const distId = Math.floor((this.p ? this.p.x : cx) / 4000) % 4;
        const theme = DISTRICTS[distId] || DISTRICTS[0];
        this.drawParallax(ctx, cx, cy, theme.color);

        if(this.state !== 'PLAYING') return;

        // Tutorial Text
        ctx.font = '20px Orbitron';
        this.level.texts.forEach(t => {
            if(t.x > cx && t.x < cx + this.width) {
                ctx.fillStyle = t.c;
                ctx.fillText(t.t, t.x - cx, t.y - cy);
            }
        });

        // Platforms
        this.level.plats.forEach(pl => {
            if(pl.x+pl.w < cx || pl.x > cx + this.width) return;
            ctx.shadowBlur = 10; ctx.shadowColor = pl.c;
            ctx.fillStyle = pl.c; 
            ctx.fillRect(pl.x-cx, pl.y-cy, pl.w, 4); 
            ctx.shadowBlur = 0;
            ctx.fillStyle = pl.c + '22';
            ctx.fillRect(pl.x-cx, pl.y-cy+4, pl.w, pl.h-4);
            ctx.strokeStyle = pl.c;
            ctx.strokeRect(pl.x-cx, pl.y-cy, pl.w, pl.h);
        });

        // Powerups
        this.level.powerups.forEach(pu => {
            if(pu.x < cx || pu.x > cx + this.width) return;
            ctx.save();
            ctx.translate(pu.x - cx, pu.y - cy + Math.sin(Date.now()*0.005)*5);
            ctx.rotate(Date.now()*0.002);
            ctx.fillStyle = pu.type === 'shield' ? '#00f3ff' : '#9d00ff';
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(-10,-10,20,20);
            ctx.restore();
        });

        // Items & Hazards
        this.level.coins.forEach(c => {
            if(c.taken || c.x+c.w < cx || c.x > cx + this.width) return;
            const bob = Math.sin(Date.now()*0.005)*5;
            ctx.fillStyle = '#faff00';
            ctx.shadowBlur = 15; ctx.shadowColor = '#faff00';
            ctx.beginPath(); ctx.arc(c.x-cx+10, c.y-cy+10+bob, 6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        this.level.hazards.forEach(h => {
            if(h.x < cx-100 || h.x > cx+this.width+100) return;
            if(h.type === 'saw') {
                ctx.save(); ctx.translate(h.x-cx, h.y-cy); ctx.rotate(h.a);
                ctx.fillStyle = '#ff00ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ff';
                ctx.beginPath();
                for(let i=0; i<8; i++) {
                    const r = (i%2==0) ? h.r : h.r/2;
                    const a = (i/8) * Math.PI*2;
                    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                }
                ctx.fill(); ctx.restore(); ctx.shadowBlur = 0;
            } else if (h.type === 'laser') {
                if(h.on) {
                    ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 15; ctx.shadowColor = '#f00';
                    ctx.fillRect(h.x-cx, h.y-cy, h.w, h.h); ctx.shadowBlur = 0;
                } else {
                    ctx.strokeStyle = '#ff000044'; ctx.strokeRect(h.x-cx, h.y-cy, h.w, h.h);
                }
            }
        });

        // Player
        const p = this.p;
        if(!(p.invuln>0 && Math.floor(Date.now()/50)%2)) {
            const px = p.x - cx; const py = p.y - cy;
            ctx.save(); ctx.translate(px + p.w/2, py + p.h/2);
            if(p.flip) ctx.scale(-1, 1);
            if(Math.abs(p.vx)>8) ctx.transform(1.2, 0, 0, 0.8, 0, 0); 

            // Powerup Aura
            if(p.power === 'shield') {
                ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
            }

            if(p.dash > 0) { ctx.fillStyle = '#00f3ff55'; ctx.fillRect(-p.w/2-10, -p.h/2, p.w, p.h); }
            ctx.fillStyle = '#fff'; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.fillStyle = theme.color; ctx.shadowBlur = 10; ctx.shadowColor = theme.color;
            ctx.fillRect(-p.w/2+4, -p.h/2+8, 20, 6); // Visor
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        
        // Particles
        this.parts.forEach(pt => {
            ctx.fillStyle = pt.c; ctx.globalAlpha = pt.life;
            ctx.fillRect(pt.x-cx, pt.y-cy, pt.s, pt.s);
        });
        ctx.globalAlpha = 1;
    }

    drawParallax(ctx, cx, cy, color) {
        // Layer 1 (Far Buildings)
        ctx.fillStyle = '#0a0a20';
        for(let i=0; i<20; i++) {
            const x = ((i*150) - cx * 0.1) % (this.width + 150);
            const h = 100 + Math.sin(i)*50;
            ctx.fillRect(x, this.height - h, 80, h);
        }
        // Layer 2 (Mid Grid)
        ctx.strokeStyle = color + '33'; ctx.lineWidth = 1;
        const gx = -cx % 100; const gy = -cy % 100;
        ctx.beginPath();
        for(let i=gx; i<this.width; i+=100) { ctx.moveTo(i, 0); ctx.lineTo(i, this.height); }
        for(let i=gy; i<this.height; i+=100) { ctx.moveTo(0, i); ctx.lineTo(this.width, i); }
        ctx.stroke();
    }

    spawnPart(x, y, c, n=1) {
        for(let i=0; i<n; i++) {
            this.parts.push({
                x, y, c, life: 1.0, s: Math.random()*4+2,
                vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8
            });
        }
    }
    
    collide(a, b) { return a.x < b.x + (b.w||b.r*2) && a.x + a.w > b.x && a.y < b.y + (b.h||b.r*2) && a.y + a.h > b.y; }

    updateHUD() {
        document.getElementById('hud-score').innerText = this.score.toString().padStart(5,'0');
        document.getElementById('hud-combo').innerText = 'x'+this.combo.toFixed(1);
        
        const hpEl = document.getElementById('hud-hp');
        hpEl.innerHTML = '';
        for(let i=0; i<3; i++) {
            const d = document.createElement('div');
            d.className = `w-4 h-4 rotate-45 border border-cyan-400 ${i<this.p.hp?'bg-cyan-400':''}`;
            hpEl.appendChild(d);
        }

        const pct = (1 - this.p.dashCd / CFG.dashCool) * 100;
        document.getElementById('hud-dash-bar').style.width = Math.min(100, Math.max(0, pct)) + '%';
        
        const distId = Math.floor(this.p.x / 4000) % 4;
        document.getElementById('hud-district').innerText = DISTRICTS[distId].id;
    }

    updatePowerupUI() {
        const el = document.getElementById('hud-powerup');
        const txt = document.getElementById('hud-powerup-text');
        if(this.p.power) {
            el.classList.remove('hidden');
            txt.innerText = this.p.power;
            txt.style.color = this.p.power === 'shield' ? '#00f3ff' : '#9d00ff';
        } else {
            el.classList.add('hidden');
        }
    }

    gameOver() {
        this.state = 'GAMEOVER'; SFX.hurt();
        if(this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('neon_high', this.highScore);
        }
        document.getElementById('res-title').innerText = "SIGNAL_LOST";
        document.getElementById('res-score').innerText = this.score;
        document.getElementById('res-best').innerText = this.highScore;
        document.getElementById('screen-result').classList.remove('hidden');
    }

    victory() {
        this.state = 'GAMEOVER'; SFX.coin();
        document.getElementById('res-title').innerText = "UPLOAD_COMPLETE";
        document.getElementById('res-score').innerText = this.score + 5000;
        document.getElementById('screen-result').classList.remove('hidden');
    }

    loop() {
        if(this.state === 'PLAYING') this.update();
        this.parts = (this.parts || []).filter(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; return p.life > 0; });
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

// Global hook
window.game = new Game();
</script>
