<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Heppard's 3D Asteroid Field | CyberSolutionsOhio</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; }
        canvas { display: block; }
        
        #score-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f5d4; /* Cyan */
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 245, 212, 0.5);
            z-index: 10;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            z-index: 20;
        }

        h1 { color: #ff00f5; font-size: 3rem; margin-bottom: 1rem; text-shadow: 0 0 10px #ff00f5; }
        p { font-size: 1.5rem; margin-bottom: 2rem; }
        
        .cta-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: #00f5d4;
            border: 2px solid #00f5d4;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .cta-button:hover {
            background: #00f5d4;
            color: #000;
            box-shadow: 0 0 20px #00f5d4;
        }
    </style>
</head>
<body>
    <div id="score-container">
        Score: <span id="score">0</span><br>
        High Score: <span id="high-score">0</span>
    </div>

    <div id="game-over-screen">
        <h1>SYSTEM FAILURE</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-button" class="cta-button">Reboot System</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="js/theme.js"></script>

    <script>
        (function() {
            // --- 1. SETTINGS & HELPERS ---
            let gameSpeed = 0.5;
            let spawnRate = 0.05;
            let score = 0;
            let gameIsOver = false;

            function getHighScore(k) { return parseInt(localStorage.getItem(k) || '0'); }
            function saveHighScore(k, s) { if(s > getHighScore(k)) localStorage.setItem(k, s); }

            // --- 2. SCENE SETUP ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508); // Deep space blue
            scene.fog = new THREE.FogExp2(0x050508, 0.02); // Add fog for depth

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;
            // Tilt camera slightly for better view
            camera.position.y = 2;
            camera.rotation.x = -0.2;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Starfield Background
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<5000; i++) {
                starCoords.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*400);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x888888, size: 0.1}));
            scene.add(stars);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pLight = new THREE.PointLight(0x00f5d4, 1, 100); // Cyan light
            pLight.position.set(0, 5, 10);
            scene.add(pLight);

            // Player Ship
            const spaceship = new THREE.Group();
            
            // Ship Body
            const bodyGeo = new THREE.ConeGeometry(0.5, 2, 4);
            const bodyMat = new THREE.MeshPhongMaterial({color: 0x00f5d4, emissive: 0x004444, flatShading: true});
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2;
            body.rotation.y = Math.PI / 4;
            spaceship.add(body);
            
            // Engine Glow
            const engineGeo = new THREE.ConeGeometry(0.3, 0.5, 8);
            const engineMat = new THREE.MeshBasicMaterial({color: 0xff00f5});
            const engine = new THREE.Mesh(engineGeo, engineMat);
            engine.position.z = 1.2;
            engine.rotation.x = -Math.PI / 2;
            spaceship.add(engine);

            scene.add(spaceship);

            // Arrays
            const lasers = [];
            const asteroids = [];
            const particles = [];

            // UI Elements
            const elScore = document.getElementById('score');
            const elHigh = document.getElementById('high-score');
            const elOver = document.getElementById('game-over-screen');
            const elFinal = document.getElementById('final-score');
            const btnRestart = document.getElementById('restart-button');

            if(elHigh) elHigh.textContent = getHighScore('asteroid-field');
            if(btnRestart) btnRestart.addEventListener('click', resetGame);

            // Input
            const mouse = new THREE.Vector2();
            document.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            document.addEventListener('click', () => {
                if(gameIsOver) return;
                const l = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.05, 1), 
                    new THREE.MeshBasicMaterial({color: 0xff00f5}) // Magenta Laser
                );
                l.position.copy(spaceship.position);
                l.position.z -= 1.0; // Start slightly in front
                l.rotation.x = Math.PI / 2;
                lasers.push(l);
                scene.add(l);
            });

            // --- 3. HELPER FUNCTIONS ---
            
            // Basic Explosion Effect (In case external script is missing)
            function createExplosion(position) {
                const particleCount = 10;
                const geometry = new THREE.BufferGeometry();
                const particlePositions = [];
                const particleVelocities = [];

                for (let i = 0; i < particleCount; i++) {
                    const x = position.x + (Math.random() - 0.5) * 0.5;
                    const y = position.y + (Math.random() - 0.5) * 0.5;
                    const z = position.z + (Math.random() - 0.5) * 0.5;
                    particlePositions.push(x, y, z);
                    
                    particleVelocities.push({
                        x: (Math.random() - 0.5) * 0.2,
                        y: (Math.random() - 0.5) * 0.2,
                        z: (Math.random() - 0.5) * 0.2
                    });
                }
                
                // Simple yellow/orange particles
                const pMaterial = new THREE.PointsMaterial({ color: 0xffaa00, size: 0.2 });
                const pSystem = new THREE.Points(geometry, pMaterial);
                
                // Hacky way to store velocities on the object for this simple script
                pSystem.userData = { velocities: particleVelocities, life: 30 };
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
                
                scene.add(pSystem);
                particles.push(pSystem);
            }

            // --- 4. CORE LOGIC ---
            function createAsteroid() {
                const size = Math.random() * 1.5 + 0.5;
                const geometry = new THREE.IcosahedronGeometry(size, 0);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x333333, 
                    roughness: 0.8,
                    wireframe: false
                });
                
                const a = new THREE.Mesh(geometry, material);
                
                // Add wireframe overlay for "Cyber" look
                const wireframe = new THREE.LineSegments(
                    new THREE.WireframeGeometry(geometry),
                    new THREE.LineBasicMaterial({ color: 0x00f5d4, transparent: true, opacity: 0.3 })
                );
                a.add(wireframe);

                a.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*40, -150);
                
                // Random rotation speed
                a.userData = { 
                    rot: new THREE.Vector3(Math.random()*0.02, Math.random()*0.02, Math.random()*0.02) 
                };
                
                asteroids.push(a);
                scene.add(a);
            }

            function resetGame() {
                score = 0; gameSpeed = 0.5; spawnRate = 0.05; gameIsOver = false;
                if(elScore) elScore.textContent = '0';
                if(elOver) elOver.style.display = 'none';
                
                asteroids.forEach(a => scene.remove(a)); asteroids.length = 0;
                lasers.forEach(l => scene.remove(l)); lasers.length = 0;
                particles.forEach(p => scene.remove(p)); particles.length = 0;
                
                spaceship.position.set(0,0,0);
                animate();
            }

            function animate() {
                if(gameIsOver) return;
                requestAnimationFrame(animate);

                // Move Ship
                spaceship.position.x += (mouse.x * 12 - spaceship.position.x) * 0.1;
                spaceship.position.y += (mouse.y * 12 - spaceship.position.y) * 0.1;
                spaceship.rotation.z = -mouse.x * 0.5; // Visual tilt
                spaceship.rotation.x = (Math.PI / 2) - (mouse.y * 0.5); // Tilt up/down

                // Difficulty Curve
                gameSpeed += 0.0001; 
                spawnRate = Math.min(0.2, 0.05 + (score / 2000));

                // Background movement
                stars.rotation.z += 0.001;

                // Spawn
                if(Math.random() < spawnRate) createAsteroid();

                // Update Particles (Explosions)
                for(let i=particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.userData.life--;
                    
                    const positions = p.geometry.attributes.position.array;
                    for(let j=0; j<p.userData.velocities.length; j++) {
                        positions[j*3] += p.userData.velocities[j].x;
                        positions[j*3+1] += p.userData.velocities[j].y;
                        positions[j*3+2] += p.userData.velocities[j].z;
                    }
                    p.geometry.attributes.position.needsUpdate = true;
                    
                    if(p.userData.life <= 0) {
                        scene.remove(p);
                        particles.splice(i,1);
                    }
                }

                // Lasers
                for(let i=lasers.length-1; i>=0; i--) {
                    lasers[i].position.z -= 1.5;
                    if(lasers[i].position.z < -150) { scene.remove(lasers[i]); lasers.splice(i,1); }
                }

                // Asteroids
                for(let i=asteroids.length-1; i>=0; i--) {
                    const a = asteroids[i];
                    a.position.z += gameSpeed;
                    a.rotation.x += a.userData.rot.x;
                    a.rotation.y += a.userData.rot.y;

                    // Laser Hit
                    for(let j=lasers.length-1; j>=0; j--) {
                        if(lasers[j].position.distanceTo(a.position) < 2.5) {
                            createExplosion(a.position);
                            scene.remove(a); asteroids.splice(i,1);
                            scene.remove(lasers[j]); lasers.splice(j,1);
                            score += 10;
                            if(elScore) elScore.textContent = score;
                            break;
                        }
                    }

                    // Player Collision
                    if(a && a.position.distanceTo(spaceship.position) < 1.2) {
                        createExplosion(spaceship.position);
                        gameIsOver = true;
                        saveHighScore('asteroid-field', score);
                        if(elFinal) elFinal.textContent = score;
                        if(elHigh) elHigh.textContent = getHighScore('asteroid-field');
                        if(elOver) elOver.style.display = 'flex';
                    }

                    if(a && a.position.z > 20) { scene.remove(a); asteroids.splice(i,1); }
                }

                renderer.render(scene, camera);
            }

            // --- 5. START ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        })();
    </script>
</body>
</html>
