<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Heppard's City Builder</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        
        /* Game UI Overlay */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        
        .hud-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            pointer-events: auto;
            font-family: 'Courier New', monospace;
        }

        button {
            background: var(--magenta);
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        button:hover { background: #ff4488; }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            text-shadow: 0 0 5px black;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-panel">
            <h3>CITY BUILDER V1.0</h3>
            <p>Buildings: <span id="count">0</span></p>
            <button onclick="clearCity()">CLEAR ALL</button>
        </div>
        <a href="../../apps.html" class="hud-panel" style="display:block; text-decoration:none; text-align:center;">
            ← EXIT TO DASHBOARD
        </a>
    </div>

    <div id="instructions">
        [LEFT CLICK] Place Building &nbsp;|&nbsp; [RIGHT CLICK] Rotate Camera &nbsp;|&nbsp; [SCROLL] Zoom
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="js/builder.js"></script>

</body>
</html>
