<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Chimera: Titan Breach</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.5s; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; z-index: 100; color: #0ff; pointer-events: none; display: flex; justify-content: space-between; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        .btn { margin-top: 20px; padding: 15px 40px; border: 2px solid #0ff; color: #0ff; background: transparent; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .btn:hover { background: #0ff; color: #000; }
        #loading-screen { position: absolute; inset: 0; background: #000; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h2>CALIBRATING NEURAL LINK...</h2>
        <div id="load-status">Initializing Systems...</div>
    </div>

    <div id="hud">
        <div>SYNC_RATE: <span id="score">0</span>%<br>HULL: <span id="shield-val">NOMINAL</span></div>
        <div style="text-align: center;">SECTOR: <span id="mission-name">THE RIM</span></div>
        <div style="text-align: right;">THREATS: <span id="kill-val">0</span><br>DIST: <span id="dist-val">5000</span>m</div>
    </div>

    <div id="overlay" style="display:none">
        <h1>PROJECT CHIMERA</h1>
        <button class="btn" onclick="startGame()">INITIATE BREACH</button>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let scene, player, gameActive = false;
        let score = 0;

        const createScene = async () => {
            scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);

            const camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 50, -200), scene);
            camera.setTarget(BABYLON.Vector3.Zero());

            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.8;

            const manager = new BABYLON.AssetsManager(scene);

            // Loading your uploaded assets
            const playerTask = manager.addMeshTask("playerTask", "", "./", "Spaceship_RaeTheRedPanda.gltf");
            const enemyTask = manager.addMeshTask("enemyTask", "", "./", "Spaceship_BarbaraTheBee.gltf");
            const planetTask = manager.addMeshTask("planetTask", "", "./", "Planet_1.gltf");

            playerTask.onSuccess = (task) => {
                player = task.loadedMeshes[0];
                player.scaling = new BABYLON.Vector3(10, 10, 10);
                document.getElementById("load-status").innerText = "Pilot Link Established...";
            };

            enemyTask.onSuccess = (task) => {
                task.loadedMeshes.forEach(m => m.setEnabled(false)); // Hide master copy
            };

            manager.onFinish = () => {
                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("overlay").style.display = "flex";
            };

            manager.load();
            return scene;
        };

        window.startGame = () => {
            document.getElementById("overlay").style.display = "none";
            gameActive = true;
        };

        createScene().then(() => {
            engine.runRenderLoop(() => {
                if (gameActive && scene) {
                    score += 0.1;
                    document.getElementById("score").innerText = Math.floor(score);
                }
                scene.render();
            });
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
