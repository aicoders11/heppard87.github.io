<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Chimera: Titan Breach</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; z-index: 100; color: #0ff; pointer-events: none; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; }
        .btn { margin-top: 20px; padding: 15px 50px; border: 2px solid #0ff; color: #0ff; background: transparent; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .btn:hover { background: #0ff; color: #000; }
        #boss-ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 60%; height: 10px; border: 1px solid #f00; display: none; }
        #boss-hp { width: 100%; height: 100%; background: #f00; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="hud">
        <div>SYNC: <span id="score-val">0</span>%</div>
        <div style="text-align: center;"><span id="mission-name">SECTOR 1: THE RIM</span></div>
        <div>THREATS: <span id="kill-val">0</span></div>
    </div>

    <div id="overlay">
        <h1>PROJECT CHIMERA</h1>
        <p>MODERN GALAGA PROTOCOL ENABLED</p>
        <button class="btn" onclick="startGame()">INITIATE BREACH</button>
    </div>

    <div id="boss-ui"><div id="boss-hp"></div></div>
    <canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);
let scene, player, camera, gameActive = false;
let score = 0, kills = 0, sector = 1, distance = 5000;
let inputMap = {}, enemyPool = [], laserPool = [];
let canFire = true, isBossActive = false, bossHP = 100, bossMesh;

const createScene = async () => {
    scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0, 0, 0.05, 1);
    
    camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 50, -200), scene);
    camera.setTarget(BABYLON.Vector3.Zero());

    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
    light.intensity = 0.7;

    // --- Modern Visuals: Bloom ---
    const pipeline = new BABYLON.DefaultRenderingPipeline("default", true, scene, [camera]);
    pipeline.bloomEnabled = true;
    pipeline.bloomThreshold = 0.7;
    pipeline.bloomWeight = 0.6;

    // --- Inputs ---
    scene.actionManager = new BABYLON.ActionManager(scene);
    scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
        inputMap[evt.sourceEvent.key.toLowerCase()] = true;
        if (evt.sourceEvent.code === "Space") fireLaser();
    }));
    scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
        inputMap[evt.sourceEvent.key.toLowerCase()] = false;
    }));

    // --- Asset Loading ---
    const manager = new BABYLON.AssetsManager(scene);
    
    // Replace these URLs with your actual model paths
    const pTask = manager.addMeshTask("p", "", "https://models.babylonjs.com/", "ExplodingBarrel.glb"); // Placeholder
    pTask.onSuccess = (t) => {
        player = t.loadedMeshes[0];
        player.scaling.setAll(10);
    };

    const eTask = manager.addMeshTask("e", "", "https://models.babylonjs.com/", "alien.glb");
    eTask.onSuccess = (t) => {
        t.loadedMeshes[0].setEnabled(false);
        for (let i = 0; i < 30; i++) {
            const e = t.loadedMeshes[0].clone("e"+i);
            e.setEnabled(false);
            enemyPool.push({ mesh: e, active: false });
        }
        bossMesh = t.loadedMeshes[0].clone("boss");
        bossMesh.scaling.setAll(60);
        bossMesh.setEnabled(false);
    };

    // Laser Material
    const lMat = new BABYLON.StandardMaterial("lm", scene);
    lMat.emissiveColor = new BABYLON.Color3(0, 1, 1);
    const lBox = BABYLON.MeshBuilder.CreateBox("lb", {width:1, height:1, depth:10}, scene);
    lBox.material = lMat;
    lBox.setEnabled(false);
    for(let i=0; i<40; i++) {
        const l = lBox.createInstance("l"+i);
        l.setEnabled(false);
        laserPool.push({ mesh: l, active: false });
    }

    manager.load();
    return scene;
};

const fireLaser = () => {
    if (!gameActive || !canFire) return;
    const l = laserPool.find(lp => !lp.active);
    if (l) {
        l.active = true;
        l.mesh.setEnabled(true);
        l.mesh.position.copyFrom(player.position);
        canFire = false;
        setTimeout(() => canFire = true, 150);
    }
};

const spawnFormation = (type) => {
    if (isBossActive) return;
    const count = 5;
    const centerX = (Math.random() - 0.5) * 400;
    const spawnZ = player.position.z + 2500;

    for (let i = 0; i < count; i++) {
        const e = enemyPool.find(ep => !ep.active);
        if (!e) break;
        e.active = true;
        e.mesh.setEnabled(true);
        e.mesh.scaling.setAll(0.1); // Start small for warp effect

        if (type === "V") {
            e.mesh.position.set(centerX + (i - 2) * 60, Math.abs(i - 2) * 40, spawnZ + Math.abs(i - 2) * 50);
        } else {
            const angle = (i / count) * Math.PI * 2;
            e.mesh.position.set(centerX + Math.cos(angle) * 80, Math.sin(angle) * 80, spawnZ);
        }
    }
};

const flashMesh = (mesh) => {
    const children = mesh.getChildMeshes();
    children.forEach(m => {
        if (m.material) {
            const oldColor = m.material.emissiveColor || new BABYLON.Color3(0,0,0);
            m.material.emissiveColor = new BABYLON.Color3(1, 1, 1);
            setTimeout(() => m.material.emissiveColor = oldColor, 60);
        }
    });
};

window.startGame = () => {
    document.getElementById("overlay").style.display = "none";
    gameActive = true;
    setInterval(() => {
        if(gameActive) spawnFormation(Math.random() > 0.5 ? "V" : "O");
    }, 2500);
};

createScene().then(() => {
    engine.runRenderLoop(() => {
        if (gameActive && player) {
            const dt = engine.getDeltaTime() / 1000;
            player.position.z += 400 * dt;
            distance -= 400 * dt;

            // Camera follow
            camera.position.set(player.position.x * 0.4, player.position.y + 50, player.position.z - 180);
            camera.setTarget(new BABYLON.Vector3(player.position.x, player.position.y, player.position.z + 400));

            // Controls & Lean
            let targetRotZ = 0;
            const moveSpeed = 450 * dt;
            if (inputMap["w"]) player.position.y += moveSpeed;
            if (inputMap["s"]) player.position.y -= moveSpeed;
            if (inputMap["a"]) { player.position.x -= moveSpeed; targetRotZ = 0.5; }
            if (inputMap["d"]) { player.position.x += moveSpeed; targetRotZ = -0.5; }
            player.rotation.z = BABYLON.Scalar.Lerp(player.rotation.z, targetRotZ, 0.1);

            // Boss Trigger
            if (distance <= 0 && !isBossActive) {
                isBossActive = true;
                bossMesh.setEnabled(true);
                document.getElementById("boss-ui").style.display = "block";
            }

            if (isBossActive) {
                bossMesh.position.set(Math.sin(player.position.z * 0.01) * 200, 100, player.position.z + 800);
            }

            // Laser Logic
            laserPool.forEach(l => {
                if (l.active) {
                    l.mesh.position.z += 2000 * dt;
                    if (isBossActive && l.mesh.intersectsMesh(bossMesh, false)) {
                        bossHP -= 1;
                        l.active = false; l.mesh.setEnabled(false);
                        flashMesh(bossMesh);
                        document.getElementById("boss-hp").style.width = bossHP + "%";
                    }
                    if (l.mesh.position.z > player.position.z + 3000) { l.active = false; l.mesh.setEnabled(false); }
                }
            });

            // Enemy Logic
            enemyPool.forEach(e => {
                if (e.active) {
                    // Warp-in scale effect
                    if (e.mesh.scaling.x < 12) e.mesh.scaling.addInPlaceFromFloats(0.5, 0.5, 0.5);
                    
                    // Collision with lasers
                    laserPool.forEach(l => {
                        if (l.active && l.mesh.intersectsMesh(e.mesh, false)) {
                            e.active = false; e.mesh.setEnabled(false);
                            l.active = false; l.mesh.setEnabled(false);
                            kills++;
                            document.getElementById("kill-val").innerText = kills;
                        }
                    });

                    if (e.mesh.position.z < player.position.z - 100) { e.active = false; e.mesh.setEnabled(false); }
                }
            });

            score += dt * 2;
            document.getElementById("score-val").innerText = Math.floor(score);
        }
        scene.render();
    });
});

window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
