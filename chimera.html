<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Chimera: Titan Breach</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron'; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #hud { position: absolute; top: 20px; width: 100%; color: #0ff; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; font-family: 'JetBrains Mono'; text-shadow: 0 0 10px #0ff; }
        #comms { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 450px; background: rgba(0, 15, 30, 0.9); border: 1px solid #0ff; padding: 15px; color: #0ff; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div id="hud">
        <div>SYNC: <span id="score-val">0</span>%</div>
        <div id="weapon-name" style="color:#fff">SYSTEM: PULSE_CANNON</div>
        <div>WARP: <span id="warp-val">1.0</span>x</div>
    </div>
    <div id="comms"><b>WINGMAN:</b> <span id="comms-text">...</span></div>
    <canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

// --- Game Constants ---
const CONFIG = {
    starCount: 200,
    enemyCount: 20,
    laserCount: 30,
    baseWarp: 1500,
    playerSpeed: 450
};

let scene, player, wingman, stars = [];
let enemyPool = [], laserPool = [];
let inputMap = {}, score = 0, currentWarp = CONFIG.baseWarp, weapon = 1;

// --- Sound Engine (Fixed) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const playSfx = (freq, duration, type = 'square') => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
};

const setupScene = () => {
    scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0, 0, 0.02, 1);

    const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0, 60, -220), scene);
    camera.setTarget(BABYLON.Vector3.Zero());

    // --- Warp Stars (Line streaks) ---
    const starMat = new BABYLON.StandardMaterial("sm", scene);
    starMat.emissiveColor = new BABYLON.Color3(0.4, 0.7, 1);
    for(let i=0; i < CONFIG.starCount; i++) {
        const s = BABYLON.MeshBuilder.CreateBox("s", {width:0.5, height:0.5, depth:60}, scene);
        s.position.set((Math.random()-0.5)*1200, (Math.random()-0.5)*800, Math.random()*5000);
        s.material = starMat;
        stars.push(s);
    }

    // --- Player & Wingman ---
    player = BABYLON.MeshBuilder.CreateBox("p", {size: 15}, scene);
    player.material = new BABYLON.StandardMaterial("pm", scene);
    player.material.emissiveColor = new BABYLON.Color3(0, 1, 1);

    wingman = BABYLON.MeshBuilder.CreateBox("w", {size: 8}, scene);
    wingman.material = new BABYLON.StandardMaterial("wm", scene);
    wingman.material.emissiveColor = new BABYLON.Color3(1, 0.5, 0);

    // --- Pools ---
    const enemyMat = new BABYLON.StandardMaterial("em", scene);
    enemyMat.emissiveColor = new BABYLON.Color3(1, 0, 0.2);
    for(let i=0; i < CONFIG.enemyCount; i++) {
        const e = BABYLON.MeshBuilder.CreateSphere("e", {diameter: 12, segments: 4}, scene);
        e.material = enemyMat;
        e.setEnabled(false);
        enemyPool.push({ mesh: e, active: false, state: 'idle' });
    }

    const laserMat = new BABYLON.StandardMaterial("lm", scene);
    laserMat.emissiveColor = new BABYLON.Color3(1, 1, 0);
    for(let i=0; i < CONFIG.laserCount; i++) {
        const l = BABYLON.MeshBuilder.CreateBox("l", {width:1, height:1, depth:25}, scene);
        l.material = laserMat;
        l.setEnabled(false);
        laserPool.push({ mesh: l, active: false, vx: 0 });
    }

    return scene;
};

const fire = () => {
    const shoot = (vx, offX) => {
        const l = laserPool.find(lp => !lp.active);
        if(!l) return;
        l.active = true;
        l.mesh.setEnabled(true);
        l.mesh.position.set(player.position.x + offX, player.position.y, player.position.z + 20);
        l.vx = vx;
        playSfx(weapon === 3 ? 800 : 400, 0.1);
    };

    if(weapon === 1) shoot(0, 0);
    if(weapon === 2) { shoot(-15, -10); shoot(0, 0); shoot(15, 10); }
    if(weapon === 3) shoot(0, 0);
};

const showComms = (msg) => {
    const el = document.getElementById("comms");
    document.getElementById("comms-text").innerText = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 4000);
};

// Input handling
window.addEventListener("keydown", (e) => {
    inputMap[e.key.toLowerCase()] = true;
    if(e.code === "Space") fire();
    if(["1","2","3"].includes(e.key)) {
        weapon = parseInt(e.key);
        const names = ["", "PULSE_CANNON", "SPREAD_WAVE", "SINGULARITY_RAIL"];
        document.getElementById("weapon-name").innerText = "SYSTEM: " + names[weapon];
    }
});
window.addEventListener("keyup", (e) => inputMap[e.key.toLowerCase()] = false);

setupScene();
engine.runRenderLoop(() => {
    const dt = engine.getDeltaTime() / 1000;
    if(!scene) return;

    // 1. Warp Background
    stars.forEach(s => {
        s.position.z -= currentWarp * dt;
        if(s.position.z < -200) s.position.z = 5000;
    });

    // 2. Movement & Wingman AI
    if(inputMap["a"]) player.position.x -= CONFIG.playerSpeed * dt;
    if(inputMap["d"]) player.position.x += CONFIG.playerSpeed * dt;
    if(inputMap["w"]) player.position.y += CONFIG.playerSpeed * dt;
    if(inputMap["s"]) player.position.y -= CONFIG.playerSpeed * dt;
    
    wingman.position.set(
        player.position.x - 50 + Math.sin(Date.now()*0.002)*10,
        player.position.y + Math.cos(Date.now()*0.002)*10,
        player.position.z + 30
    );

    // 3. Lasers
    laserPool.forEach(l => {
        if(l.active) {
            l.mesh.position.z += (weapon === 3 ? 5000 : 2200) * dt;
            l.mesh.position.x += l.vx * dt * 20;
            if(l.mesh.position.z > 2500) { l.active = false; l.mesh.setEnabled(false); }
        }
    });

    // 4. Enemies
    if(Math.random() < 0.03) {
        const e = enemyPool.find(ep => !ep.active);
        if(e) {
            e.active = true; e.mesh.setEnabled(true);
            e.mesh.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*500, 3000);
        }
    }

    enemyPool.forEach(e => {
        if(e.active) {
            e.mesh.position.z -= 900 * dt;
            // Collision
            laserPool.forEach(l => {
                if(l.active && l.mesh.intersectsMesh(e.mesh)) {
                    e.active = false; e.mesh.setEnabled(false);
                    l.active = false; l.mesh.setEnabled(false);
                    score += 1;
                    playSfx(100, 0.2, 'sawtooth');
                    
                    // Narrative Trigger
                    if
