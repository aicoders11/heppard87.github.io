<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Chimera: Titan Breach</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.5s; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; z-index: 100; color: #0ff; pointer-events: none; display: flex; justify-content: space-between; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        .btn { margin-top: 20px; padding: 15px 40px; border: 2px solid #0ff; color: #0ff; background: transparent; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .btn:hover { background: #0ff; color: #000; }
        #loading-screen { position: absolute; inset: 0; background: #000; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h2>CALIBRATING NEURAL LINK...</h2>
        <div id="load-status">Initializing Systems...</div>
    </div>

    <div id="hud">
        <div>SYNC_RATE: <span id="score">0</span>%<br>HULL: <span id="shield-val">NOMINAL</span></div>
        <div style="text-align: center;">SECTOR: <span id="mission-name">THE RIM</span></div>
        <div style="text-align: right;">THREATS: <span id="kill-val">0</span><br>DIST: <span id="dist-val">5000</span>m</div>
    </div>

    <div id="overlay" style="display:none">
        <h1>PROJECT CHIMERA</h1>
        <p id="game-msg">Neural Link Ready</p>
        <button class="btn" onclick="startGame()">INITIATE BREACH</button>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let scene, player, camera, gameActive = false;
        let score = 0, distance = 5000, kills = 0, sector = 1;

        let inputMap = {};
        let enemyPool = [];
        let laserPool = [];
        let stars = [];
        let canFire = true;

        const createScene = async () => {
            scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);

            camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 60, -250), scene);
            camera.setTarget(BABYLON.Vector3.Zero());
            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.8;

            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                inputMap[evt.sourceEvent.code.toLowerCase()] = true;
                if (evt.sourceEvent.code === "Space") fireLaser();
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
                inputMap[evt.sourceEvent.code.toLowerCase()] = false;
            }));

            // --- Starfield ---
            for (let i = 0; i < 400; i++) {
                const star = BABYLON.MeshBuilder.CreateBox("star", { size: 2 }, scene);
                star.position.set((Math.random()-0.5)*4000, (Math.random()-0.5)*3000, Math.random()*8000);
                const sm = new BABYLON.StandardMaterial("sm", scene);
                sm.emissiveColor = new BABYLON.Color3(1, 1, 1);
                star.material = sm;
                star.freezeWorldMatrix();
                stars.push(star);
            }

            const manager = new BABYLON.AssetsManager(scene);

            const playerTask = manager.addMeshTask("playerTask", "", "./", "Spaceship_RaeTheRedPanda.gltf");
            playerTask.onSuccess = (task) => {
                player = task.loadedMeshes[0];
                player.scaling = new BABYLON.Vector3(12, 12, 12);
            };

            const enemyTask = manager.addMeshTask("enemyTask", "", "./", "Spaceship_BarbaraTheBee.gltf");
            enemyTask.onSuccess = (task) => {
                const masterEnemy = task.loadedMeshes[0];
                masterEnemy.setEnabled(false);
                for (let i = 0; i < 15; i++) {
                    const enemy = masterEnemy.clone("enemy_" + i);
                    enemy.setEnabled(false);
                    enemy.scaling = new BABYLON.Vector3(10, 10, 10);
                    enemyPool.push({ mesh: enemy, active: false });
                }
            };

            // Laser Setup
            const laserMat = new BABYLON.StandardMaterial("lMat", scene);
            laserMat.emissiveColor = new BABYLON.Color3(1, 0, 1);
            const laserModel = BABYLON.MeshBuilder.CreateBox("l", {width: 2, height: 2, depth: 40}, scene);
            laserModel.material = laserMat;
            laserModel.setEnabled(false);
            for(let i=0; i<20; i++) {
                const l = laserModel.createInstance("l"+i);
                l.setEnabled(false);
                laserPool.push({ mesh: l, active: false });
            }

            manager.onFinish = () => {
                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("overlay").style.display = "flex";
            };

            manager.load();
            return scene;
        };

        const fireLaser = () => {
            if (!gameActive || !canFire) return;
            const l = laserPool.find(lp => !lp.active);
            if (l) {
                l.active = true;
                l.mesh.setEnabled(true);
                l.mesh.position.copyFrom(player.position);
                canFire = false;
                setTimeout(() => canFire = true, 150);
            }
        };

        const spawnEnemy = () => {
            const enemyObj = enemyPool.find(e => !e.active);
            if (enemyObj) {
                enemyObj.active = true;
                enemyObj.mesh.setEnabled(true);
                enemyObj.mesh.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*500, player.position.z + 2500);
            }
        };

        window.startGame = () => {
            document.getElementById("overlay").style.display = "none";
            gameActive = true;
            setInterval(() => { if(gameActive) spawnEnemy(); }, 1000 / sector);
        };

        createScene().then(() => {
            engine.runRenderLoop(() => {
                if (gameActive && scene && player) {
                    const dt = engine.getDeltaTime() / 1000;
                    const steerSpeed = 450 * dt;

                    player.position.z += 350 * dt;
                    camera.position.z = player.position.z - 250;
                    camera.position.x = player.position.x * 0.4;

                    if (inputMap["w"] || inputMap["arrowup"]) player.position.y += steerSpeed;
                    if (inputMap["s"] || inputMap["arrowdown"]) player.position.y -= steerSpeed;
                    if (inputMap["a"] || inputMap["arrowleft"]) player.position.x -= steerSpeed;
                    if (inputMap["d"] || inputMap["arrowright"]) player.position.x += steerSpeed;

                    // Lasers & Combat
                    laserPool.forEach(l => {
                        if (l.active) {
                            l.mesh.position.z += 1200 * dt;
                            enemyPool.forEach(e => {
                                if (e.active && BABYLON.Vector3.Distance(l.mesh.position, e.mesh.position) < 50) {
                                    e.active = false; e.mesh.setEnabled(false);
                                    l.active = false; l.mesh.setEnabled(false);
                                    kills++; document.getElementById("kill-val").innerText = kills;
                                }
                            });
                            if (l.mesh.position.z > player.position.z + 2000) { l.active = false; l.mesh.setEnabled(false); }
                        }
                    });

                    // Enemies & Sectors
                    enemyPool.forEach(e => {
                        if (e.active) {
                            if (BABYLON.Vector3.Distance(player.position, e.mesh.position) < 40) {
                                gameActive = false;
                                document.getElementById("game-msg").innerText = "HULL BREACHED";
                                document.getElementById("overlay").style.display = "flex";
                                setTimeout(() => location.reload(), 2000);
                            }
                            if (e.mesh.position.z < player.position.z - 200) { e.active = false; e.mesh.setEnabled(false); }
                        }
                    });

                    stars.forEach(s => { if (s.position.z < player.position.z - 500) s.position.z += 8000; });

                    score += dt * 10;
                    distance -= 350 * dt;
                    if (distance < 3000 && sector === 1) { sector = 2; document.getElementById("mission-name").innerText = "DATA SPIRE"; }
                    if (distance < 1000 && sector === 2) { sector = 3; document.getElementById("mission-name").innerText = "SINGULARITY"; }

                    document.getElementById("score").innerText = Math.floor(score);
                    document.getElementById("dist-val").innerText = Math.max(0, Math.floor(distance));
                }
                scene.render();
            });
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
