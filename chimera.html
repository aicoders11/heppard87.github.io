<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Chimera: Titan Breach</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron'; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        
        /* Narrative UI */
        #comms-window {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 500px; background: rgba(0, 20, 40, 0.85); border: 2px solid #0ff;
            padding: 15px; display: none; color: #0ff; font-family: 'JetBrains Mono';
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); z-index: 50;
        }
        #comms-portrait { float: left; width: 60px; height: 60px; background: #044; border: 1px solid #0ff; margin-right: 15px; }
        
        #hud { position: absolute; top: 20px; width: 100%; color: #0ff; display: flex; justify-content: space-around; font-family: 'JetBrains Mono'; }
        #weapon-ui { position: absolute; top: 100px; right: 20px; color: #0f0; text-align: right; font-size: 0.8rem; }
        .active-w { color: #fff; text-shadow: 0 0 10px #0f0; font-weight: bold; }
    </style>
</head>
<body>
    <div id="hud">
        <div>CORE_SYNC: <span id="score-val">0</span>%</div>
        <div id="mission-status" style="color:#f0f;">STATUS: INFILTRATING</div>
        <div>WARP_DRIVE: <span id="warp-val">1.0</span>x</div>
    </div>

    <div id="comms-window">
        <div id="comms-portrait"></div>
        <div style="font-size: 0.7rem; color: #aaa;">INCOMING TRANSMISSION: WINGMAN_01</div>
        <div id="comms-text" style="margin-top: 5px;">STAY IN FORMATION, CHIMERA. WE'RE HITTING THE CORE.</div>
    </div>

    <div id="weapon-ui">
        SELECT_SYSTEM [1-3]<br><br>
        <div id="w1" class="active-w">PULSE_CANNON</div>
        <div id="w2">SPREAD_WAVE</div>
        <div id="w3">SINGULARITY_RAIL</div>
    </div>

    <canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);
let scene, player, wingman, warpStars = [], weaponType = 1;
let score = 0, gameActive = false, warpSpeed = 1500;
let enemyPool = [], laserPool = [], inputMap = {};

// Synthetic Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(f, type='square') {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = type; o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.05, audioCtx.currentTime);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
}

const createScene = () => {
    scene = new BABYLON.Scene(engine);
    const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0, 50, -200), scene);
    camera.setTarget(BABYLON.Vector3.Zero());

    // --- Warp Stars ---
    for(let i=0; i<300; i++) {
        const s = BABYLON.MeshBuilder.CreateBox("s", {width:0.4, height:0.4, depth:80}, scene);
        s.position.set((Math.random()-0.5)*1200, (Math.random()-0.5)*1000, Math.random()*5000);
        const m = new BABYLON.StandardMaterial("sm", scene);
        m.emissiveColor = new BABYLON.Color3(0.4, 0.6, 1);
        s.material = m;
        warpStars.push(s);
    }

    // Player & Wingman
    player = BABYLON.MeshBuilder.CreateBox("p", {size:12}, scene);
    player.material = new BABYLON.StandardMaterial("pm", scene);
    player.material.emissiveColor = new BABYLON.Color3(0, 1, 1);

    wingman = BABYLON.MeshBuilder.CreateBox("w", {size:8}, scene);
    wingman.position.set(-60, 0, 50);
    wingman.material = new BABYLON.StandardMaterial("wm", scene);
    wingman.material.emissiveColor = new BABYLON.Color3(1, 0.5, 0);

    // Enemy & Laser Pooling
    for(let i=0; i<30; i++) {
        const e = BABYLON.MeshBuilder.CreatePolyhedron("e", {type:1, size:10}, scene);
        e.setEnabled(false);
        enemyPool.push({ mesh: e, active: false });
    }
    for(let i=0; i<50; i++) {
        const l = BABYLON.MeshBuilder.CreateBox("l", {width:1, height:1, depth:30}, scene);
        l.setEnabled(false);
        l.material = new BABYLON.StandardMaterial("lm", scene);
        l.material.emissiveColor = new BABYLON.Color3(1, 1, 0);
        laserPool.push({ mesh: l, active: false, vx: 0 });
    }

    return scene;
};

const showComms = (text, duration = 3000) => {
    const box = document.getElementById("comms-window");
    document.getElementById("comms-text").innerText = text;
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", duration);
};

window.addEventListener("keydown", (e) => {
    inputMap[e.key.toLowerCase()] = true;
    if(e.code === "Space") {
        const l = laserPool.find(lp => !lp.active);
        if(l) {
            l.active = true; l.mesh.setEnabled(true);
            l.mesh.position.copyFrom(player.position);
            l.vx = weaponType === 2 ? (Math.random()-0.5)*10 : 0;
            playSFX(weaponType === 3 ? 800 : 400);
        }
    }
    if(["1","2","3"].includes(e.key)) {
        weaponType = parseInt(e.key);
        document.querySelectorAll("#weapon-ui div").forEach((el, i) => el.className = (i+1 === weaponType ? "active-w" : ""));
    }
});
window.addEventListener("keyup", (e) => inputMap[e.key.toLowerCase()] = false);

createScene().then(() => {
    showComms("SYSTEM_CHECK... ENEMY SQUADRONS DETECTED. ENGAGE.");
    
    engine.runRenderLoop(() => {
        const dt = engine.getDeltaTime() / 1000;

        // Warp Animation
        warpStars.forEach(s => {
            s.position.z -= warpSpeed * dt;
            if(s.position.z < -200) s.position.z = 5000;
        });

        // Wingman "Floating" AI
        wingman.position.x = player.position.x - 60 + Math.sin(Date.now() * 0.002) * 10;
        wingman.position.y = player.position.y + Math.cos(Date.now() * 0.002) * 10;

        // Movement
        if(inputMap["a"]) player.position.x -= 500 * dt;
        if(inputMap["d"]) player.position.x += 500 * dt;

        // Lasers
        laserPool.forEach(l => {
            if(l.active) {
                l.mesh.position.z += (weaponType === 3 ? 5000 : 2000) * dt;
                l.mesh.position.x += l.vx;
                if(l.mesh.position.z > 3000) { l.active = false; l.mesh.setEnabled(false); }
            }
        });

        // Story Triggers
        score += dt * 5;
        if(Math.floor(score) === 50) { showComms("THEY'RE JAMMING OUR RADAR! SWITCH TO SPREAD WAVE (2)"); warpSpeed = 3000; }
        if(Math.floor(score) === 150) { showComms("TITAN BREACH IMMINENT. GO TO MAX WARP!"); warpSpeed = 6000; }

        // Enemy Logic
        enemyPool.forEach(e => {
            if(!e.active && Math.random() < 0.03) {
                e.active = true; e.mesh.setEnabled(true);
                e.mesh.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*500, 3000);
            }
            if(e.active) {
                e.mesh.position.z -= 800 * dt;
                laserPool.forEach(l => {
                    if(l.active && l.mesh.intersectsMesh(e.mesh)) {
                        e.active = false; e.mesh.setEnabled(false);
                        l.active = false; l.mesh.setEnabled(false);
                        playSFX(100, 'sawtooth');
                    }
                });
                if(e.mesh.position.z < -200) { e.active = false; e.mesh.setEnabled(false); }
            }
        });

        document.getElementById("score-val").innerText = Math.floor(score);
        document.getElementById("warp-val").innerText = (warpSpeed/1500).toFixed(1);
        scene.render();
    });
});
</script>
</body>
</html>
