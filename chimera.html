<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Project Chimera: Titan Breach</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron'; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #hud { position: absolute; top: 20px; width: 100%; color: #0ff; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; font-family: 'JetBrains Mono'; }
        #mission-log { position: absolute; bottom: 20px; left: 20px; color: #f0f; width: 300px; font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 10px; border-left: 3px solid #f0f; }
        #weapon-ui { position: absolute; bottom: 20px; right: 20px; color: #0f0; text-align: right; }
        .active-weapon { text-decoration: underline; font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div id="hud">
        <div>SCORE: <span id="score-val">0</span></div>
        <div style="color:#fff">MISSION: <span id="mission-name">INITIALIZING...</span></div>
        <div>WARP: <span id="warp-val">1.0</span>x</div>
    </div>
    <div id="mission-log">>> SYSTEM: Neural link established. <br>>> OBJECTIVE: Breach the Sector 1 defensive grid.</div>
    <div id="weapon-ui">
        WEAPON TYPE [1-3]<br>
        <span id="w1" class="active-weapon">1: PULSE CANNON</span><br>
        <span id="w2">2: SPREAD WAVE</span><br>
        <span id="w3">3: SINGULARITY RAIL</span>
    </div>
    <canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);
let scene, player, warpStars = [], weaponType = 1;
let score = 0, missionStep = 1, gameActive = false;
let enemyPool = [], laserPool = [], inputMap = {};

// Audio (Laser and Explosions)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function sfx(freq, type = 'square', duration = 0.1) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

const createScene = () => {
    scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0, 0, 0.05, 1);
    const camera = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0, 60, -200), scene);
    camera.setTarget(BABYLON.Vector3.Zero());

    // --- WARP BACKGROUND ---
    for(let i=0; i<200; i++) {
        const star = BABYLON.MeshBuilder.CreateBox("s", {height: 0.5, width: 0.5, depth: 50}, scene);
        star.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*800, Math.random()*5000);
        const mat = new BABYLON.StandardMaterial("sm", scene);
        mat.emissiveColor = new BABYLON.Color3(0.5, 0.8, 1);
        star.material = mat;
        warpStars.push(star);
    }

    // Player
    player = BABYLON.MeshBuilder.CreateBox("p", {size: 15}, scene);
    player.material = new BABYLON.StandardMaterial("pm", scene);
    player.material.emissiveColor = new BABYLON.Color3(0, 1, 1);

    // Enemy Pool with Logic States
    for(let i=0; i<20; i++) {
        const e = BABYLON.MeshBuilder.CreateSphere("e", {diameter: 12, segments: 4}, scene);
        e.setEnabled(false);
        enemyPool.push({ 
            mesh: e, 
            active: false, 
            state: 'DIVE', // DIVE, CIRCLE, or ATTACK
            health: 2
        });
    }

    // Laser Pool
    for(let i=0; i<40; i++) {
        const l = BABYLON.MeshBuilder.CreateBox("l", {width:1, height:1, depth:20}, scene);
        l.setEnabled(false);
        l.material = new BABYLON.StandardMaterial("lm", scene);
        l.material.emissiveColor = new BABYLON.Color3(1, 1, 0);
        laserPool.push({ mesh: l, active: false, vx: 0 });
    }

    return scene;
};

const fire = () => {
    const spawn = (vx, offX=0) => {
        const l = laserPool.find(lp => !lp.active);
        if(l) {
            l.active = true; l.mesh.setEnabled(true);
            l.mesh.position.set(player.position.x + offX, player.position.y, player.position.z + 20);
            l.vx = vx;
            sfx(weaponType === 3 ? 800 : 400);
        }
    };

    if(weaponType === 1) spawn(0);
    if(weaponType === 2) { spawn(-10, -5); spawn(0, 0); spawn(10, 5); }
    if(weaponType === 3) spawn(0); // Rail is handled by speed in loop
};

const updateMissions = () => {
    if(score > 500 && missionStep === 1) {
        missionStep = 2;
        document.getElementById("mission-name").innerText = "SECTOR 2: DATA SPIRE";
        document.getElementById("mission-log").innerHTML = ">> URGENT: Spire detected. <br>>> Logic: Avoid circular formations.";
    }
};

window.addEventListener("keydown", (e) => {
    inputMap[e.key.toLowerCase()] = true;
    if(e.code === "Space") fire();
    if(e.key === "1") { weaponType = 1; updateWeaponUI(); }
    if(e.key === "2") { weaponType = 2; updateWeaponUI(); }
    if(e.key === "3") { weaponType = 3; updateWeaponUI(); }
});
window.addEventListener("keyup", (e) => inputMap[e.key.toLowerCase()] = false);

function updateWeaponUI() {
    [1,2,3].forEach(n => document.getElementById("w"+n).className = (weaponType === n ? "active-weapon" : ""));
}

createScene().then(() => {
    engine.runRenderLoop(() => {
        const dt = engine.getDeltaTime() / 1000;
        
        // Warp Speed Logic
        warpStars.forEach(s => {
            s.position.z -= 1500 * dt;
            if(s.position.z < -200) s.position.z = 5000;
        });

        // Movement
        const speed = 400 * dt;
        if(inputMap["a"]) player.position.x -= speed;
        if(inputMap["d"]) player.position.x += speed;
        if(inputMap["w"]) player.position.y += speed;
        if(inputMap["s"]) player.position.y -= speed;

        // Laser Movement
        laserPool.forEach(l => {
            if(l.active) {
                l.mesh.position.z += (weaponType === 3 ? 4000 : 1500) * dt;
                l.mesh.position.x += l.vx * dt * 20;
                if(l.mesh.position.z > 2000) { l.active = false; l.mesh.setEnabled(false); }
            }
        });

        // Enemy Logic (Formation AI)
        enemyPool.forEach(e => {
            if(!e.active && Math.random() < 0.02) {
                e.active = true; e.mesh.setEnabled(true);
                e.mesh.position.set((Math.random()-0.5)*600, (Math.random()-0.5)*400, 2000);
                e.state = missionStep === 2 ? 'CIRCLE' : 'DIVE';
            }

            if(e.active) {
                if(e.state === 'DIVE') e.mesh.position.z -= 600 * dt;
                if(e.state === 'CIRCLE') {
                    e.mesh.position.z -= 300 * dt;
                    e.mesh.position.x += Math.sin(Date.now() * 0.005) * 5;
                }

                // Hit Detection
                laserPool.forEach(l => {
                    if(l.active && l.mesh.intersectsMesh(e.mesh)) {
                        e.active = false; e.mesh.setEnabled(false);
                        l.active = false; l.mesh.setEnabled(false);
                        score += 100;
                        sfx(100, 'sawtooth', 0.2);
                        updateMissions();
                    }
                });

                if(e.mesh.position.z < -200) { e.active = false; e.mesh.setEnabled(false); }
            }
        });

        document.getElementById("score-val").innerText = score;
        scene.render();
    });
});
</script>
</body>
</html>
