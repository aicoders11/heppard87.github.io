<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum Runner – Flirty Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    body { box-sizing: border-box; margin:0; padding:0; overflow:hidden; }
    .game-font { font-family: 'Fredoka One', system-ui, sans-serif; }
    @keyframes float   { 0%,100% { transform:translateY(0)   } 50% { transform:translateY(-10px) } }
    @keyframes pulse   { 0%,100% { opacity:1; transform:scale(1)   } 50% { opacity:0.7; transform:scale(1.1) } }
    @keyframes bounce  { 0%,100% { transform:translateY(0)   } 50% { transform:translateY(-20px) } }
    .floating  { animation:float  3s ease-in-out infinite; }
    .pulsing   { animation:pulse  1.5s ease-in-out infinite; }
    .bouncing  { animation:bounce 0.5s ease-in-out infinite; }
  </style>
</head>
<body class="h-screen bg-gradient-to-b from-sky-400 via-emerald-300 to-teal-400">

<div id="game-container" class="relative w-full h-full">

  <!-- Title Screen -->
  <div id="title" class="absolute inset-0 bg-gradient-to-br from-purple-600 via-pink-600 to-rose-500 flex flex-col items-center justify-center z-50">
    <h1 class="game-font text-6xl md:text-8xl text-white mb-8 drop-shadow-lg celebrating">MOMENTUM RUNNER</h1>
    <button id="start" class="game-font text-3xl bg-gradient-to-r from-pink-400 to-rose-500 text-white px-12 py-6 rounded-full shadow-2xl hover:scale-110 transition-transform bouncing">START</button>
  </div>

  <!-- Mode select -->
  <div id="modes" class="hidden absolute inset-0 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 flex flex-col items-center justify-center z-50">
    <h2 class="game-font text-5xl text-white mb-12">Choose Mode</h2>
    <div class="flex flex-col gap-6">
      <button data-mode="adventure" class="mode-btn game-font text-2xl bg-gradient-to-r from-green-400 to-emerald-500 px-10 py-5 rounded-full hover:scale-105 transition">Adventure</button>
      <button data-mode="endless"   class="mode-btn game-font text-2xl bg-gradient-to-r from-orange-400 to-rose-500 px-10 py-5 rounded-full hover:scale-105 transition">Endless</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden absolute inset-0 pointer-events-none z-40 p-4 md:p-6">
    <div class="flex justify-between">
      <div id="health" class="flex gap-2"></div>
      <div class="game-font text-3xl text-white drop-shadow-lg">Momentum Runner</div>
      <div class="text-right">
        <div id="tokens" class="game-font text-2xl text-yellow-300">0 / 0</div>
        <div id="speed"  class="game-font text-xl text-cyan-200">SPD: 0</div>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="c" class="w-full h-full"></canvas>

  <!-- Touch controls -->
  <div id="touch" class="hidden absolute bottom-6 left-0 right-0 flex justify-between px-6 z-30 pointer-events-auto md:hidden">
    <div class="flex gap-4">
      <button id="left"  class="w-20 h-20 rounded-full bg-white/30 backdrop-blur border-4 border-white/50 text-4xl active:scale-90">◀</button>
      <button id="right" class="w-20 h-20 rounded-full bg-white/30 backdrop-blur border-4 border-white/50 text-4xl active:scale-90">▶</button>
    </div>
    <div class="flex gap-4">
      <button id="run"  class="w-20 h-20 rounded-full bg-orange-500/60 backdrop-blur border-4 border-orange-300 text-3xl active:scale-90">🏃</button>
      <button id="jump" class="w-24 h-24 rounded-full bg-green-500/60 backdrop-blur border-4 border-green-300 text-4xl active:scale-90">⬆</button>
    </div>
  </div>

  <!-- Game Over / Victory -->
  <div id="end" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="text-center text-white">
      <h2 class="game-font text-6xl mb-6" id="end-title">GAME OVER</h2>
      <p class="text-3xl mb-8">Tokens: <span id="end-tokens">0</span></p>
      <button id="restart" class="game-font text-2xl bg-gradient-to-r from-pink-500 to-rose-600 px-10 py-5 rounded-full hover:scale-110">PLAY AGAIN</button>
    </div>
  </div>

</div>

<script>
// ────────────────────────────────────────────────────────────────────────────────
//  CONSTANTS
// ────────────────────────────────────────────────────────────────────────────────
const TS = 40;
const GRAV = 0.8;
const FRIC = 0.86;
const JUMP = -17;
const RUN_MULT = 2.3;
const ACCEL = 0.65;
const MAX_FALL = 14;
const CAM_LERP = 0.12;

const HOT_DASH_DUR = 7.5;
const HOT_DASH_MULT = 2.75;
const TRAIL_RATE = 0.07;

// ────────────────────────────────────────────────────────────────────────────────
//  STATE
// ────────────────────────────────────────────────────────────────────────────────
let canvas, ctx;
let mode = 'adventure';
let camera = { x: 0 };
let tokens = 0;
let totalTokens = 0;
let timer = 0;
let running = false;
let lastTime = 0;

const player = {
  x: 120, y: 400, w: 32, h: 48,
  vx: 0, vy: 0,
  onGround: false,
  facingRight: true,
  hotDashTimer: 0,
  lastTrail: 0,
  health: 3
};

const input = { left:false, right:false, jump:false, run:false };

// ────────────────────────────────────────────────────────────────────────────────
//  LEVEL DATA
// ────────────────────────────────────────────────────────────────────────────────
let platforms = [];
let collectibles = [];
let enemies = [];
let npcs = [];
let springs = [];
let finishLine = null;

// ────────────────────────────────────────────────────────────────────────────────
//  AUDIO
// ────────────────────────────────────────────────────────────────────────────────
const audio = {
  ctx: null,
  masterVol: 0.28,
  bgmVol: 0.14,
  bgmGain: null,
  bgmPlaying: false,
  bgmNodes: [],
  duckTimer: 0,
  duckTarget: 1.0,

  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.bgmGain = this.ctx.createGain();
    this.bgmGain.gain.value = this.bgmVol;
    this.bgmGain.connect(this.ctx.destination);
    document.addEventListener('click',  () => this.ctx.resume(), {once:true});
    document.addEventListener('keydown', () => this.ctx.resume(), {once:true});
  },

  duck(duration = 0.35) {
    this.duckTimer = duration;
    this.duckTarget = 0.18;
    this.bgmGain.gain.linearRampToValueAtTime(
      this.bgmVol * this.duckTarget,
      this.ctx.currentTime + 0.04
    );
  },

  unduck() {
    this.duckTarget = 1.0;
    this.bgmGain.gain.linearRampToValueAtTime(
      this.bgmVol,
      this.ctx.currentTime + 0.32
    );
  },

  update(dt) {
    if (this.duckTimer > 0) {
      this.duckTimer -= dt;
      if (this.duckTimer <= 0) this.unduck();
    }
  },

  giggle(pitch = 820, type = 'fox') {
    this.duck(0.45);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const lfo = this.ctx.createOscillator();
    const lfoG = this.ctx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(pitch, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(pitch*1.35, this.ctx.currentTime+0.08);
    osc.frequency.exponentialRampToValueAtTime(pitch*0.75, this.ctx.currentTime+0.4);

    gain.gain.setValueAtTime(0, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(this.masterVol*0.55, this.ctx.currentTime+0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.85);

    lfo.type = 'sine';
    lfo.frequency.value = type==='cat'?14:9;
    lfoG.gain.value = 18;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);

    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); lfo.start();
    osc.stop(this.ctx.currentTime+0.9); lfo.stop(this.ctx.currentTime+0.9);
  },

  ooh(pitch = 620) {
    this.duck(0.65);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = pitch;
    gain.gain.setValueAtTime(0, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(this.masterVol*0.35, this.ctx.currentTime+0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+1.3);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime+1.4);
  },

  heartThump() {
    this.duck(0.18);
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 220;
    gain.gain.setValueAtTime(0, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(this.masterVol*0.25, this.ctx.currentTime+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.16);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime+0.18);
  },

  playBGM(isEndless = false) {
    if (this.bgmPlaying) this.stopBGM();
    this.bgmPlaying = true;

    const bpm = isEndless ? 158 : 142;
    const beat = 60 / bpm / 4;
    const notes = isEndless ? [261,293,329,349,392,440,494,523,523,494,440,392,349,293,261,196]
                            : [523,587,659,698,784,880,988,1047,1047,988,880,784,698,587,523,392];

    const melOsc = this.ctx.createOscillator(); melOsc.type = 'square';
    const melGain = this.ctx.createGain(); melGain.gain.value = this.bgmVol*0.38;
    melOsc.connect(melGain); melGain.connect(this.bgmGain);

    const bassOsc = this.ctx.createOscillator(); bassOsc.type = 'sawtooth';
    const bassGain = this.ctx.createGain(); bassGain.gain.value = this.bgmVol*0.28;
    bassOsc.connect(bassGain); bassGain.connect(this.bgmGain);

    const noiseOsc = this.ctx.createOscillator(); noiseOsc.type = 'white';
    const kickG = this.ctx.createGain();
    const snareG = this.ctx.createGain();
    noiseOsc.connect(kickG); kickG.connect(this.bgmGain);
    noiseOsc.connect(snareG); snareG.connect(this.bgmGain);

    this.bgmNodes = [melOsc, bassOsc, noiseOsc, melGain, bassGain, kickG, snareG];

    let step = 0;
    const loop = () => {
      if (!this.bgmPlaying) return;

      // Melody
      melOsc.frequency.setValueAtTime(notes[step % notes.length]*0.5, this.ctx.currentTime);
      melGain.gain.setValueAtTime(0, this.ctx.currentTime);
      melGain.gain.linearRampToValueAtTime(this.bgmVol*0.38, this.ctx.currentTime+0.02);
      melGain.gain.exponentialRampToValueAtTime(0.005, this.ctx.currentTime+beat*0.75);

      // Bass
      bassOsc.frequency.setValueAtTime(notes[step % 8]/4, this.ctx.currentTime);
      bassGain.gain.setValueAtTime(this.bgmVol*0.28, this.ctx.currentTime);
      bassGain.gain.exponentialRampToValueAtTime(0.005, this.ctx.currentTime+beat*0.6);

      // Drums
      if (step % 4 === 0 || step % 4 === 2) {
        kickG.gain.setValueAtTime(this.bgmVol*0.75, this.ctx.currentTime);
        kickG.gain.exponentialRampToValueAtTime(0.005, this.ctx.currentTime+0.09);
      }
      if (step % 4 === 1 || step % 4 === 3) {
        const p = 220 - step*8;
        noiseOsc.frequency.setValueAtTime(p, this.ctx.currentTime);
        snareG.gain.setValueAtTime(this.bgmVol*0.45, this.ctx.currentTime);
        snareG.gain.exponentialRampToValueAtTime(0.005, this.ctx.currentTime+0.14);
      }

      step++;
      setTimeout(loop, beat*1000);
    };

    melOsc.start(); bassOsc.start(); noiseOsc.start();
    loop();
  },

  stopBGM() {
    this.bgmPlaying = false;
    this.bgmNodes.forEach(n => { if (n.stop) n.stop(); if (n.gain) n.gain.value = 0; });
    this.bgmNodes = [];
  }
};

// ────────────────────────────────────────────────────────────────────────────────
//  INPUT
// ────────────────────────────────────────────────────────────────────────────────
function bindInput() {
  const kdown = e => {
    if (e.code==='KeyA'||e.code==='ArrowLeft')  input.left = true;
    if (e.code==='KeyD'||e.code==='ArrowRight') input.right = true;
    if (e.code==='Space'||e.code==='ArrowUp')   input.jump = true;
    if (e.code==='ShiftLeft'||e.code==='ShiftRight') input.run = true;
  };
  const kup = e => {
    if (e.code==='KeyA'||e.code==='ArrowLeft')  input.left = false;
    if (e.code==='KeyD'||e.code==='ArrowRight') input.right = false;
    if (e.code==='Space'||e.code==='ArrowUp')   input.jump = false;
    if (e.code==='ShiftLeft'||e.code==='ShiftRight') input.run = false;
  };
  window.addEventListener('keydown', kdown);
  window.addEventListener('keyup',   kup);

  // Touch
  ['left','right','jump','run'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.ontouchstart = e => { e.preventDefault(); input[id] = true; };
    el.ontouchend   = e => { e.preventDefault(); input[id] = false; };
  });
}

// ────────────────────────────────────────────────────────────────────────────────
//  LEVEL GENERATION
// ────────────────────────────────────────────────────────────────────────────────
function generateLevel() {
  platforms = [];
  collectibles = [];
  enemies = [];
  npcs = [];
  springs = [];
  tokens = 0; totalTokens = 0;

  // Floor
  for (let i = 0; i < 220; i++) {
    platforms.push({x:i*TS, y:520, w:TS, h:TS*2, type:'ground'});
  }

  // Platforms
  for (let i = 4; i < 60; i += 5) {
    platforms.push({
      x: i*120 + Math.random()*60,
      y: 520 - 140 - Math.sin(i*0.7)*60,
      w: 100 + Math.random()*60,
      h: 24,
      type: 'float'
    });
  }

  // Tokens
  for (let i = 0; i < 45; i++) {
    collectibles.push({x:180+i*140, y:420-Math.sin(i)*80, collected:false, type:'star'});
    totalTokens++;
  }

  // Hot & Heavy Dash items
  collectibles.push({x:380,  y:380, collected:false, type:'dash'});
  collectibles.push({x:1450, y:320, collected:false, type:'dash'});
  collectibles.push({x:2600, y:280, collected:false, type:'dash'});

  // Enemies
  for (let i = 8; i < 50; i += 9) {
    enemies.push({
      x: i*160,
      y: 520-40,
      w:32, h:32,
      vx: (Math.random()>0.5?1:-1)*2.2,
      startX: i*160,
      range: 110,
      dead: false
    });
  }

  // Flirty NPCs
  npcs = [
    {x:520, y:520-70, w:36, h:54, name:"Mika", lines:[
      "Ooh you're fast… my heart's racing already~ 💕",
      "Hey cutie, slow down and flirt with me a little? 😉",
      "That dash is making me all hot and bothered…"
    ], lastTalk:-999},
    {x:1380, y:520-200, w:36, h:54, name:"Luna", lines:[
      "Eeeep! You almost landed on me… I wouldn't mind though ♡",
      "Those jumps… bet you could sweep me off my feet~",
      "Keep bouncing like that and I might join you…"
    ], lastTalk:-999},
    {x:2480, y:520-140, w:36, h:54, name:"Roxy", lines:[
      "Purrr… look at you go. Got me feeling frisky 😼",
      "Run any faster and I'll have to chase you myself~",
      "Mmm you're trouble… come closer next time?"
    ], lastTalk:-999}
  ];

  // Finish
  finishLine = {x: 8200};
}

// ────────────────────────────────────────────────────────────────────────────────
//  GAME LOOP
// ────────────────────────────────────────────────────────────────────────────────
function update(dt) {
  if (!running) return;

  // Input → acceleration
  let target = 0;
  if (input.left)  { target = -ACCEL * (input.run ? RUN_MULT : 1); player.facingRight = false; }
  if (input.right) { target =  ACCEL * (input.run ? RUN_MULT : 1); player.facingRight = true; }
  if (player.hotDashTimer > 0) target *= HOT_DASH_MULT;

  player.vx += (target - player.vx) * (1 - FRIC);

  // Gravity & jump
  player.vy += GRAV;
  player.vy = Math.min(player.vy, MAX_FALL);
  if (input.jump && player.onGround) {
    player.vy = JUMP;
    player.onGround = false;
  }

  player.x += player.vx;
  player.y += player.vy;

  player.hotDashTimer = Math.max(0, player.hotDashTimer - dt);

  // Collision – platforms
  player.onGround = false;
  platforms.forEach(p => {
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h > p.y && player.y < p.y + p.h) {
      if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  });

  // Collectibles
  collectibles.forEach(c => {
    if (c.collected) return;
    if (Math.abs(player.x + player.w/2 - c.x) < 36 &&
        Math.abs(player.y + player.h/2 - c.y) < 36) {
      c.collected = true;
      if (c.type === 'star') {
        tokens++;
        particles(c.x, c.y, 'collect');
      } else if (c.type === 'dash') {
        player.hotDashTimer = HOT_DASH_DUR;
        particles(c.x, c.y, 'dash');
        showText(c.x, c.y-50, "HOT & HEAVY DASH!", '#ff69b4');
      }
    }
  });

  // Enemies
  enemies.forEach(e => {
    if (e.dead) return;
    e.x += e.vx;
    if (Math.abs(e.x - e.startX) > e.range) e.vx *= -1;

    if (player.x + player.w > e.x && player.x < e.x + e.w &&
        player.y + player.h > e.y && player.y < e.y + e.h) {
      if (player.vy > 0 && player.y + player.h - player.vy <= e.y) {
        e.dead = true;
        player.vy = JUMP * 0.65;
        particles(e.x + e.w/2, e.y, 'death');
      }
    }
  });

  // NPCs – flirt + voice
  const now = performance.now()/1000;
  npcs.forEach(n => {
    const dx = player.x + player.w/2 - n.x - n.w/2;
    const dy = player.y + player.h/2 - n.y - n.h/2;
    const d = Math.hypot(dx, dy);

    if (d < 90 && now - n.lastTalk > 7) {
      const line = n.lines[Math.floor(Math.random()*n.lines.length)];
      speechBubble(line, n.x + n.w/2, n.y - 80);
      n.lastTalk = now;

      if (n.name === 'Mika') audio.giggle(820, 'fox');
      else if (n.name === 'Luna') audio.giggle(580, 'bunny');
      else audio.giggle(680, 'cat');
      audio.ooh( n.name === 'Roxy' ? 580 : 640 );
      particles(n.x + n.w/2, n.y - 30, 'heart', 2);
    }
  });

  // Hot & Heavy trail + hearts
  if (player.hotDashTimer > 0) {
    const t = performance.now()/1000;
    if (t - player.lastTrail > TRAIL_RATE) {
      player.lastTrail = t;
      const heartChance = Math.random() < 0.35;
      particles(
        player.x + (player.facingRight ? player.w - 8 : 8),
        player.y + player.h * 0.62,
        heartChance ? 'heart' : 'trail'
      );
      if (Math.random() < 0.12) audio.heartThump();
    }
  }

  // Camera
  camera.x += (player.x - camera.x - canvas.width/3) * CAM_LERP;

  // Win / lose
  if (mode === 'adventure' && player.x > finishLine.x) {
    running = false;
    document.getElementById('end-title').textContent = "VICTORY!";
    document.getElementById('end-tokens').textContent = tokens;
    document.getElementById('end').classList.remove('hidden');
    audio.stopBGM();
  }
  if (player.y > 900) {
    running = false;
    document.getElementById('end').classList.remove('hidden');
    audio.stopBGM();
  }

  timer += dt;
  audio.update(dt);
}

function render() {
  ctx.fillStyle = '#7dd3fc';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2 - camera.x;

  // Platforms
  platforms.forEach(p => {
    ctx.fillStyle = p.type==='ground' ? '#65a30d' : '#854d0e';
    ctx.fillRect(p.x + cx, p.y, p.w, p.h);
  });

  // Collectibles
  collectibles.forEach(c => {
    if (c.collected) return;
    ctx.save();
    ctx.translate(c.x + cx, c.y);
    const s = Math.sin(Date.now()*0.006)*0.15 + 0.9;
    ctx.scale(s,s);
    if (c.type === 'dash') {
      ctx.fillStyle = '#ec4899';
      drawHeart(ctx, 0,0,18);
    } else {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => {
    if (e.dead) return;
    ctx.fillStyle = '#b91c1c';
    ctx.fillRect(e.x + cx -16, e.y-16, 32,32);
  });

  // NPCs
  npcs.forEach(n => {
    ctx.fillStyle = n.name==='Mika'?'#f97316':n.name==='Luna'?'#fbcfe8':'#7e22ce';
    ctx.fillRect(n.x + cx -18, n.y-27, 36,54);
    ctx.fillStyle = '#111827';
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(n.name, n.x + cx, n.y-40);
  });

  // Player
  ctx.save();
  ctx.translate(player.x + cx, player.y);
  ctx.scale(player.facingRight?1:-1,1);
  ctx.fillStyle = '#f43f5e';
  ctx.fillRect(-16,-24,32,48);
  ctx.fillStyle = '#eab308';
  ctx.fillRect(-12,-30,24,12);
  ctx.restore();

  // Particles & speech
  drawParticles();
  drawSpeech();

  // Finish line
  if (finishLine) {
    ctx.fillStyle = 'rgba(250,204,21,0.4)';
    ctx.fillRect(finishLine.x + cx -60, 300, 120, 300);
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('FINISH', finishLine.x + cx, 380);
  }
}

// ────────────────────────────────────────────────────────────────────────────────
//  HELPERS
// ────────────────────────────────────────────────────────────────────────────────
function particles(x,y,type,count=12) {
  for (let i=0;i<count;i++) {
    particlesList.push({
      x,y,
      vx: (Math.random()-0.5)*(type==='heart'?1.8:5),
      vy: type==='heart' ? -1+Math.random()*0.6 : (Math.random()-0.5)*6,
      life: type==='heart'?0.9:0.6,
      color: type==='collect'?'#fbbf24':type==='death'?'#f87171':type==='dash'?'#ec4899':type==='trail'?'#ff69b4':'#d946ef',
      shape: type==='heart'?'heart':'dot',
      rot: Math.random()*Math.PI*2,
      rotSpd: (Math.random()-0.5)*0.3
    });
  }
}

let particlesList = [];
function drawParticles() {
  particlesList = particlesList.filter(p=>p.life>0);
  particlesList.forEach(p=>{
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.translate(p.x - camera.x + canvas.width/2, p.y);
    ctx.rotate(p.rot);
    if (p.shape==='heart') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.bezierCurveTo( 4, -10, 10, -4, 0, 6);
      ctx.bezierCurveTo(-10,-4, -4,-10, 0,-6);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(-2.5,-2.5,5,5);
    }
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.rot += p.rotSpd; p.life -= 0.018; p.vy += 0.06;
  });
}

let speech = null;
function speechBubble(text, x, y) {
  speech = {text, x, y: y-20, born: performance.now()};
}

function drawSpeech() {
  if (!speech) return;
  const age = (performance.now() - speech.born)/1000;
  if (age > 4.2) { speech = null; return; }

  const alpha = Math.min(1, age<0.3 ? age/0.3 : age>3.2 ? (4.2-age)/1 : 1);
  const sx = speech.x - camera.x + canvas.width/2;
  const sy = speech.y;

  ctx.globalAlpha = alpha*0.92;
  ctx.fillStyle = 'rgba(255,240,245,0.96)';
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.roundRect(sx-150, sy-50, 300, 70, 24);
  ctx.fill(); ctx.stroke();

  // tail
  ctx.beginPath();
  ctx.moveTo(sx-18, sy+18);
  ctx.lineTo(sx,   sy+38);
  ctx.lineTo(sx+18, sy+18);
  ctx.fill(); ctx.stroke();

  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#1f2937';
  ctx.font = 'bold 19px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(speech.text, sx, sy-12);

  ctx.font = '22px Arial';
  ctx.fillText('💕', sx-125, sy-12);
  ctx.fillText('💕', sx+125, sy-12);
  ctx.globalAlpha = 1;
}

function showText(x,y,txt,color) {
  // simple floating text – could be expanded
  speechBubble(txt, x, y); // reuse bubble for now
}

function drawHeart(ctx,x,y,size=1) {
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(size,size);
  ctx.fillStyle = '#ec4899';
  ctx.beginPath();
  ctx.moveTo(0,-8);
  ctx.bezierCurveTo(6,-14,14,-6,0,8);
  ctx.bezierCurveTo(-14,-6,-6,-14,0,-8);
  ctx.fill();
  ctx.restore();
}

// ────────────────────────────────────────────────────────────────────────────────
//  MAIN LOOP
// ────────────────────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime)/1000, 0.033);
  lastTime = ts;

  update(dt);
  render();

  if (running) requestAnimationFrame(loop);
}

// ────────────────────────────────────────────────────────────────────────────────
//  INIT
// ────────────────────────────────────────────────────────────────────────────────
window.onload = () => {
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');

  const resize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  };
  resize();
  window.addEventListener('resize', resize);

  audio.init();
  bindInput();

  document.getElementById('start').onclick = () => {
    document.getElementById('title').classList.add('hidden');
    document.getElementById('modes').classList.remove('hidden');
  };

  document.querySelectorAll('.mode-btn').forEach(b => {
    b.onclick = () => {
      mode = b.dataset.mode;
      document.getElementById('modes').classList.add('hidden');
      document.getElementById('hud').classList.remove('hidden');
      document.getElementById('touch').classList.toggle('hidden', window.innerWidth > 768);
      generateLevel();
      running = true;
      audio.playBGM(mode === 'endless');
      requestAnimationFrame(loop);
    };
  });

  document.getElementById('restart').onclick = () => {
    document.getElementById('end').classList.add('hidden');
    player.x = 120; player.y = 400; player.vx = player.vy = 0; player.hotDashTimer = 0;
    tokens = 0;
    running = true;
    audio.playBGM(mode === 'endless');
    requestAnimationFrame(loop);
  };
};
</script>
