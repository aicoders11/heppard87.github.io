<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber City Builder | CyberSolutionsOhio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        
        #ui-overlay {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none;
            color: #00f5d4;
        }
        
        .controls-info {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00f5d4;
            padding: 15px;
            border-radius: 4px;
        }
        
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; text-transform: uppercase; text-shadow: 0 0 10px #00f5d4; }
        p { margin: 5px 0; color: #ccc; font-size: 0.9rem; }
        .highlight { color: #ff00f5; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="controls-info">
            <h1>Neon Metropolis</h1>
            <p>Left Click: <span class="highlight">Construct Building</span></p>
            <p>Right Click + Drag: <span class="highlight">Rotate Camera</span></p>
            <p>Scroll: <span class="highlight">Zoom</span></p>
            <p>Population: <span id="pop-counter" class="highlight">0</span></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- SCENE SETUP ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.02);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 15, 20);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- LIGHTING ---
            const ambientLight = new THREE.AmbientLight(0x404040, 2); 
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7.5);
            scene.add(dirLight);

            // Neon Point Lights for Atmosphere
            const pLight1 = new THREE.PointLight(0x00f5d4, 1, 50);
            pLight1.position.set(0, 10, 0);
            scene.add(pLight1);
            
            const pLight2 = new THREE.PointLight(0xff00f5, 1, 50);
            pLight2.position.set(20, 10, 20);
            scene.add(pLight2);

            // --- GRID & GROUND ---
            const gridSize = 100;
            const gridHelper = new THREE.GridHelper(gridSize, 50, 0x00f5d4, 0x222222);
            scene.add(gridHelper);

            // Invisible plane for clicking
            const planeGeo = new THREE.PlaneGeometry(gridSize, gridSize);
            planeGeo.rotateX(-Math.PI / 2);
            const planeMat = new THREE.MeshBasicMaterial({ visible: false });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            scene.add(plane);

            // --- INTERACTION ---
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const buildings = [];
            let population = 0;
            const popDisplay = document.getElementById('pop-counter');

            // Controls
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1;

            window.addEventListener('click', onMouseClick, false);
            window.addEventListener('resize', onResize, false);

            function onMouseClick(event) {
                // Calculate mouse position in normalized device coordinates
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(plane);

                if (intersects.length > 0) {
                    const intersectPoint = intersects[0].point;
                    // Snap to grid (grid size is 2 units per cell approx since 100 size / 50 divisions = 2)
                    const x = Math.round(intersectPoint.x / 2) * 2;
                    const z = Math.round(intersectPoint.z / 2) * 2;

                    // Check if occupied
                    const key = `${x},${z}`;
                    if(buildings.includes(key)) return;

                    addBuilding(x, z);
                    buildings.push(key);
                    
                    population += Math.floor(Math.random() * 50 + 10);
                    popDisplay.innerText = population;
                }
            }

            function addBuilding(x, z) {
                const height = Math.random() * 8 + 2; 
                const geometry = new THREE.BoxGeometry(1.8, height, 1.8);
                
                // Random Neon Color
                const colors = [0x00f5d4, 0xff00f5, 0x0055ff, 0xffffff];
                const color = colors[Math.floor(Math.random() * colors.length)];

                const material = new THREE.MeshStandardMaterial({
                    color: 0x111111,
                    emissive: color,
                    emissiveIntensity: 0.6,
                    roughness: 0.2,
                    metalness: 0.8
                });

                const building = new THREE.Mesh(geometry, material);
                building.position.set(x, height / 2, z);
                
                // Animate entry (Scale Up)
                building.scale.y = 0.1;
                const targetScale = 1;
                
                // Simple animation loop for this specific building
                let scale = 0.1;
                function grow() {
                    if(scale < 1) {
                        scale += 0.1;
                        building.scale.y = scale;
                        building.position.y = (height * scale) / 2;
                        requestAnimationFrame(grow);
                    }
                }
                grow();

                scene.add(building);
            }

            function onResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }

            animate();
        });
    </script>
</body>
</html>
