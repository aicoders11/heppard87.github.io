<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-bg"></div>
    <div class="particles"></div>

    <nav class="cyber-nav">
        <a href="index.html" class="cyber-logo">CYBERCHRIS</a>
        <div class="cyber-nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main style="position: relative; z-index: 2; padding-top: 120px; max-width: 600px; margin: 0 auto; padding-inline: 20px;">
        <div class="glass-panel" style="text-align: center; padding: 50px;">
            <h1 class="glitch font-orbitron" data-text="SIGNAL BROADCAST" style="color: var(--neon-magenta); margin-bottom: 30px;">SIGNAL BROADCAST</h1>
            <p class="font-mono" style="margin-bottom: 30px;">ESTABLISHING ENCRYPTED UPLINK...</p>
            
            <div style="margin-bottom: 20px;">
                <p class="font-orbitron" style="font-size: 0.8rem; color: var(--neon-cyan);">GITHUB</p>

            <div style="margin-top: 40px;">
                <a href="mailto:your-email@example.com" class="cyber-btn">Send Transmission</a>
            </div>
        </div>
    </main>

    <script>
        function createParticles() {
            const container = document.querySelector('.particles');
            for(let i=0; i<30; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        window.onload = createParticles;
    </script>
</body>
