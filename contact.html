<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | CyberSolutionsOhio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-form { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .contact-form input, .contact-form textarea {
            background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 15px; color: white; font-family: inherit; font-size: 1rem;
        }
        .contact-form input:focus, .contact-form textarea:focus { border-color: var(--cyan); outline: none; }
        .submit-btn {
            background: var(--cyan); color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .submit-btn:hover { background: white; box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">CyberSolutionsOhio</a>
            <form class="search-form" action="https://www.google.com/search" method="get" target="_blank">
                <input type="text" name="q" placeholder="Search...">
                <button type="submit">Search</button>
            </form>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="converter.html">Converter</a></li>
                <li><a href="apps.html">Apps</a></li>
                <li><a href="contact.html">Contact</a></li>
                <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&components=YOUR_COMPONENTS"></script>
                <li class="theme-menu-container">
                    <button id="theme-menu-trigger" class="nav-theme-btn">THEMES</button>
                    <div id="theme-options" class="theme-popup">
                        <button onclick="setTheme('default')">Cyberpunk</button>
                        <button onclick="setTheme('matrix')">Matrix</button>
                        <button onclick="setTheme('sunset')">Sunset</button>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="content-section">
            <div class="page-header">
                <h2>Establish Connection</h2>
            </div>
            <div style="text-align: center; margin-bottom: 40px; color: #aaa;">
                <p>Send a secure transmission to our team.</p>
            </div>
            
            <form class="contact-form">
                <input type="text" name="name" placeholder="User Identifier (Name)" required>
                <input type="email" name="email" placeholder="Return Address (Email)" required>
                <textarea name="message" rows="6" placeholder="Message Payload..." required></textarea>
                <button type="submit" class="submit-btn">TRANSMIT DATA</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 CyberSolutionsOhio. All Systems Nominal.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // Theme Menu Logic
        const themeBtn = document.getElementById('theme-menu-trigger');
        const themePopup = document.getElementById('theme-options');

        if (themeBtn && themePopup) {
            themeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = (themePopup.style.display === 'none' || themePopup.style.display === '');
                themePopup.style.display = isHidden ? 'flex' : 'none';
            });
            document.addEventListener('click', (e) => {
                if (!themeBtn.contains(e.target) && !themePopup.contains(e.target)) {
                    themePopup.style.display = 'none';
                }
            });
        }

        function setTheme(theme) {
            const root = document.documentElement;
            if (theme === 'matrix') {
                root.style.setProperty('--cyan', '#00ff00');
                root.style.setProperty('--magenta', '#003300');
            } else if (theme === 'sunset') {
                root.style.setProperty('--cyan', '#ffcc00');
                root.style.setProperty('--magenta', '#ff5500');
            } else {
                root.style.setProperty('--cyan', '#00f5d4');
                root.style.setProperty('--magenta', '#ff00f5');
            }
            if(themePopup) themePopup.style.display = 'none';
        }
    </script>
</body>
</html>
