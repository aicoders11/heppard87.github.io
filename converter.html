<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSolutionsOhio | Unit Converter</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .converter-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .input-group {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        select, input {
            padding: 12px;
            background: rgba(13, 2, 33, 0.8);
            border: 1px solid var(--cyan);
            color: var(--white);
            border-radius: 5px;
            font-family: var(--font-mono);
        }
        #result-display {
            font-size: 24px;
            color: var(--magenta);
            text-shadow: 0 0 10px var(--magenta);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">CyberSolutionsOhio</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="converter.html" class="active">Converter</a></li>
                <li><a href="apps.html">Apps</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="content-card converter-container">
            <h1>Unit Converter</h1>
            <div class="input-group">
                <label>Input Value</label>
                <input type="number" id="inputValue" placeholder="Enter number...">
            </div>
            <div class="input-group">
                <label>From</label>
                <select id="fromUnit">
                    <option value="meters">Meters (m)</option>
                    <option value="feet">Feet (ft)</option>
                    <option value="kg">Kilograms (kg)</option>
                    <option value="lbs">Pounds (lbs)</option>
                </select>
            </div>
            <div class="input-group">
                <label>To</label>
                <select id="toUnit">
                    <option value="feet">Feet (ft)</option>
                    <option value="meters">Meters (m)</option>
                    <option value="lbs">Pounds (lbs)</option>
                    <option value="kg">Kilograms (kg)</option>
                </select>
            </div>
            <button class="cta-button" onclick="convert()">Calculate</button>
            <div id="result-display">Result: --</div>
        </div>
    </main>

    <script>
        function convert() {
            const val = parseFloat(document.getElementById('inputValue').value);
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;
            const display = document.getElementById('result-display');

            if (isNaN(val)) {
                display.innerText = "Please enter a number";
                return;
            }

            // Logic for common cybersecurity/hardware units
            let result;
            if (from === "meters" && to === "feet") result = val * 3.28084;
            else if (from === "feet" && to === "meters") result = val * 0.3048;
            else if (from === "kg" && to === "lbs") result = val * 2.20462;
            else if (from === "lbs" && to === "kg") result = val * 0.453592;
            else result = val; // Same units

            display.innerText = `Result: ${result.toFixed(2)} ${to}`;
        }
    </script>
</body>
</html>
