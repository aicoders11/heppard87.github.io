<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Data Visualizer | Cyberpunk Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5d4;
            --neon-magenta: #ff00f5;
            --neon-amber: #ffaa00;
            --neon-lime: #ccff00;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(10, 10, 15, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'Share Tech Mono', monospace; }
        
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .nav-link {
            position: relative;
            transition: all 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            transition: width 0.3s;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.1);
        }
        
        .neon-btn {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .neon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 212, 0.5);
        }
        
        .dataset-btn {
            border: 1px solid rgba(0, 245, 212, 0.3);
            background: rgba(0, 245, 212, 0.1);
            color: var(--neon-cyan);
            transition: all 0.3s;
        }
        .dataset-btn:hover, .dataset-btn.active {
            background: rgba(0, 245, 212, 0.3);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.3);
        }
        
        #canvas-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            height: calc(100vh - 80px);
            z-index: 5;
        }
        
        .ui-overlay {
            position: fixed;
            top: 100px;
            left: 20px;
            z-index: 10;
            max-width: 280px;
        }
        
        .tooltip {
            position: absolute;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid var(--neon-cyan);
            padding: 10px 15px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            display: none;
        }
    
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00f5d4;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px; left: 0; width: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 245, 212, 0.3);
            backdrop-filter: blur(15px);
            z-index: 999;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #888;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            transition: all 0.3s;
        }
        .mobile-menu a:hover {
            color: #00f5d4;
            padding-left: 10px;
        }
        @media (max-width: 1024px) {
            .cyber-nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }

        /* Footer */
        .cyber-footer {
            border-top: 1px solid rgba(0, 245, 212, 0.3);
            text-align: center;
        }
        .cyber-footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .cyber-footer-links a {
            color: #666;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .cyber-footer-links a:hover { color: #00f5d4; }
        .cyber-footer-text {
            font-family: 'Share Tech Mono', monospace;
            color: #555;
        }

    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>
    
    <nav class="fixed top-0 left-0 w-full z-50 glass-panel border-b border-cyan-500/30">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="index.html" class="font-orbitron text-2xl font-bold bg-gradient-to-r from-cyan-400 to-fuchsia-500 bg-clip-text text-transparent">
                    CYBER<span class="text-cyan-400">MATRIX</span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="nav-link text-gray-300 font-mono text-sm">[HOME]</a>
                    <a href="portfolio.html" class="nav-link text-gray-300 font-mono text-sm">[ARSENAL]</a>
                    <a href="dataviz.html" class="nav-link text-cyan-400 font-mono text-sm">[DATA_VIZ]</a>
                    <a href="dna.html" class="nav-link text-gray-300 font-mono text-sm">[DNA]</a>
                    <a href="molecule.html" class="nav-link text-gray-300 font-mono text-sm">[MOLECULE]</a>
                    <a href="chess3d.html" class="nav-link text-gray-300 font-mono text-sm">[3D_CHESS]</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-cyan-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden glass-panel border-t border-cyan-500/30">
            <div class="px-4 py-2 space-y-2">
                <a href="index.html" class="block py-2 text-gray-300 font-mono text-sm">[HOME]</a>
                <a href="portfolio.html" class="block py-2 text-gray-300 font-mono text-sm">[ARSENAL]</a>
                <a href="dataviz.html" class="block py-2 text-cyan-400 font-mono text-sm">[DATA_VIZ]</a>
                <a href="dna.html" class="block py-2 text-gray-300 font-mono text-sm">[DNA]</a>
                <a href="molecule.html" class="block py-2 text-gray-300 font-mono text-sm">[MOLECULE]</a>
            </div>
        </div>
    </nav>
    
    <div class="ui-overlay glass-panel rounded-lg p-4">
        <h2 class="font-orbitron text-xl text-cyan-400 mb-2">3D DATA VIZ</h2>
        <p class="text-gray-400 text-xs mb-4 font-mono">Interactive Bar Chart Visualization</p>
        
        <div class="space-y-2 mb-4">
            <p class="text-gray-400 text-xs font-mono">SELECT DATASET</p>
            <button class="dataset-btn w-full py-2 rounded text-sm font-mono active" data-set="0">MARKET GROWTH</button>
            <button class="dataset-btn w-full py-2 rounded text-sm font-mono" data-set="1">USER RETENTION</button>
            <button class="dataset-btn w-full py-2 rounded text-sm font-mono" data-set="2">NEURAL LATENCY</button>
            <button class="dataset-btn w-full py-2 rounded text-sm font-mono" data-set="3">GLOBAL ENERGY</button>
        </div>
        
        <div class="text-xs text-gray-500 font-mono">
            <p>Hover bars for details</p>
            <p>Drag to rotate view</p>
            <p>Scroll to zoom</p>
        </div>
    </div>
    
    <div id="tooltip" class="tooltip"></div>
    <div id="canvas-container"></div>

    <script>
        // Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particlesContainer.appendChild(particle);
        }
        
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });
        
        // THREE.JS 3D Data Visualizer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 15, 50);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 80), 0.1, 1000);
        camera.position.set(8, 8, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight - 80);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const cyanLight = new THREE.PointLight(0x00f5d4, 0.5, 20);
        cyanLight.position.set(-5, 5, -5);
        scene.add(cyanLight);
        
        const magentaLight = new THREE.PointLight(0xff00f5, 0.5, 20);
        magentaLight.position.set(5, 5, 5);
        scene.add(magentaLight);
        
        // Ground plane
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a0f,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid helper
        const gridHelper = new THREE.GridHelper(30, 30, 0x00f5d4, 0x1a1a2e);
        gridHelper.position.y = -0.05;
        scene.add(gridHelper);
        
        // Datasets
        const datasets = [
            {
                name: 'Market Growth',
                labels: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6'],
                values: [45, 62, 78, 95, 110, 135],
                color: 0x00f5d4,
                unit: '%'
            },
            {
                name: 'User Retention',
                labels: ['Day 1', 'Day 7', 'Day 14', 'Day 30', 'Day 60', 'Day 90'],
                values: [85, 72, 65, 58, 48, 42],
                color: 0xff00f5,
                unit: '%'
            },
            {
                name: 'Neural Latency',
                labels: ['Layer 1', 'Layer 2', 'Layer 3', 'Layer 4', 'Layer 5', 'Layer 6'],
                values: [12, 18, 25, 32, 41, 55],
                color: 0xffaa00,
                unit: 'ms'
            },
            {
                name: 'Global Energy',
                labels: ['Solar', 'Wind', 'Hydro', 'Nuclear', 'Gas', 'Coal'],
                values: [320, 280, 450, 380, 520, 680],
                color: 0xccff00,
                unit: 'TWh'
            }
        ];
        
        let currentDataset = 0;
        let bars = [];
        let labels = [];
        
        function createBar(value, index, total, dataset) {
            const barWidth = 1.2;
            const barDepth = 1.2;
            const spacing = 2;
            const maxValue = Math.max(...dataset.values);
            const height = (value / maxValue) * 6;
            
            const geometry = new THREE.BoxGeometry(barWidth, height, barDepth);
            const material = new THREE.MeshStandardMaterial({
                color: dataset.color,
                emissive: dataset.color,
                emissiveIntensity: 0.3,
                roughness: 0.3,
                metalness: 0.7
            });
            
            const bar = new THREE.Mesh(geometry, material);
            bar.position.set((index - total/2 + 0.5) * spacing, height/2, 0);
            bar.castShadow = true;
            bar.receiveShadow = true;
            bar.userData = { value, label: dataset.labels[index], unit: dataset.unit };
            
            return bar;
        }
        
        function createLabel(text, x, z) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 128;
            canvas.height = 64;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 20px monospace';
            ctx.fillStyle = '#00f5d4';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width/2, canvas.height/2 + 7);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            sprite.position.set(x, 0.5, z + 1.5);
            sprite.scale.set(2, 1, 1);
            
            return sprite;
        }
        
        function loadDataset(index) {
            // Remove old bars and labels
            bars.forEach(bar => scene.remove(bar));
            labels.forEach(label => scene.remove(label));
            bars = [];
            labels = [];
            
            const dataset = datasets[index];
            
            dataset.values.forEach((value, i) => {
                const bar = createBar(value, i, dataset.values.length, dataset);
                scene.add(bar);
                bars.push(bar);
                
                const label = createLabel(dataset.labels[i], bar.position.x, 0);
                scene.add(label);
                labels.push(label);
            });
            
            // Animate bars
            bars.forEach((bar, i) => {
                const targetScale = bar.scale.y;
                bar.scale.y = 0.01;
                new TWEEN.Tween(bar.scale)
                    .to({ y: targetScale }, 800)
                    .delay(i * 100)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .start();
            });
        }
        
        loadDataset(0);
        
        // Dataset buttons
        document.querySelectorAll('.dataset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.dataset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDataset = parseInt(btn.dataset.set);
                loadDataset(currentDataset);
            });
        });
        
        // Mouse interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        let hoveredBar = null;
        
        renderer.domElement.addEventListener('mousemove', (event) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);
            
            if (intersects.length > 0) {
                const bar = intersects[0].object;
                if (hoveredBar !== bar) {
                    if (hoveredBar) hoveredBar.material.emissiveIntensity = 0.3;
                    hoveredBar = bar;
                    bar.material.emissiveIntensity = 0.6;
                    
                    tooltip.style.display = 'block';
                    tooltip.innerHTML = `
                        <span style="color: #00f5d4">${bar.userData.label}</span><br>
                        <span style="color: #fff; font-size: 16px">${bar.userData.value}${bar.userData.unit}</span>
                    `;
                }
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
            } else {
                if (hoveredBar) {
                    hoveredBar.material.emissiveIntensity = 0.3;
                    hoveredBar = null;
                }
                tooltip.style.display = 'none';
            }
        });
        
        // Camera controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraAngle = 0;
        let cameraHeight = 8;
        let cameraRadius = 12;
        
        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        
        renderer.domElement.addEventListener('mouseup', () => isDragging = false);
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                cameraAngle -= deltaX * 0.01;
                cameraHeight = Math.max(3, Math.min(15, cameraHeight + deltaY * 0.05));
                
                camera.position.x = Math.sin(cameraAngle) * cameraRadius;
                camera.position.z = Math.cos(cameraAngle) * cameraRadius;
                camera.position.y = cameraHeight;
                camera.lookAt(0, 2, 0);
                
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });
        
        renderer.domElement.addEventListener('wheel', (e) => {
            cameraRadius = Math.max(5, Math.min(25, cameraRadius + e.deltaY * 0.01));
            camera.position.x = Math.sin(cameraAngle) * cameraRadius;
            camera.position.z = Math.cos(cameraAngle) * cameraRadius;
        });
        
        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            
            // Subtle bar animation
            bars.forEach((bar, i) => {
                bar.position.y = (bar.geometry.parameters.height / 2) + Math.sin(time * 0.002 + i) * 0.05;
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight - 80);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 80);
        });
    
        // Mobile Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.querySelector('.mobile-menu-btn');
            if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

    </script>
</body>
</html>
