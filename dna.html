<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D DNA Visualizer | Cyberpunk Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5d4;
            --neon-magenta: #ff00f5;
            --neon-amber: #ffaa00;
            --neon-lime: #ccff00;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(10, 10, 15, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'Share Tech Mono', monospace; }
        
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .nav-link {
            position: relative;
            transition: all 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            transition: width 0.3s;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.1);
        }
        
        .neon-btn {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .neon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 212, 0.5);
        }
        
        #canvas-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            height: calc(100vh - 80px);
            z-index: 5;
        }
        
        .ui-overlay {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 10;
            max-width: 280px;
        }
        
        .base-pair-info {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid;
        }
        .base-a { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .base-t { border-color: #facc15; background: rgba(250, 204, 21, 0.1); }
        .base-c { border-color: #00f5d4; background: rgba(0, 245, 212, 0.1); }
        .base-g { border-color: #ff00f5; background: rgba(255, 0, 245, 0.1); }
    
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00f5d4;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px; left: 0; width: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 245, 212, 0.3);
            backdrop-filter: blur(15px);
            z-index: 999;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #888;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            transition: all 0.3s;
        }
        .mobile-menu a:hover {
            color: #00f5d4;
            padding-left: 10px;
        }
        @media (max-width: 1024px) {
            .cyber-nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }

        /* Footer */
        .cyber-footer {
            border-top: 1px solid rgba(0, 245, 212, 0.3);
            text-align: center;
        }
        .cyber-footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .cyber-footer-links a {
            color: #666;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .cyber-footer-links a:hover { color: #00f5d4; }
        .cyber-footer-text {
            font-family: 'Share Tech Mono', monospace;
            color: #555;
        }

    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>
    
    <nav class="fixed top-0 left-0 w-full z-50 glass-panel border-b border-cyan-500/30">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="index.html" class="font-orbitron text-2xl font-bold bg-gradient-to-r from-cyan-400 to-fuchsia-500 bg-clip-text text-transparent">
                    CYBER<span class="text-cyan-400">MATRIX</span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="nav-link text-gray-300 font-mono text-sm">[HOME]</a>
                    <a href="portfolio.html" class="nav-link text-gray-300 font-mono text-sm">[ARSENAL]</a>
                    <a href="dataviz.html" class="nav-link text-gray-300 font-mono text-sm">[DATA_VIZ]</a>
                    <a href="dna.html" class="nav-link text-cyan-400 font-mono text-sm">[DNA]</a>
                    <a href="molecule.html" class="nav-link text-gray-300 font-mono text-sm">[MOLECULE]</a>
                    <a href="chess3d.html" class="nav-link text-gray-300 font-mono text-sm">[3D_CHESS]</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-cyan-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden glass-panel border-t border-cyan-500/30">
            <div class="px-4 py-2 space-y-2">
                <a href="index.html" class="block py-2 text-gray-300 font-mono text-sm">[HOME]</a>
                <a href="portfolio.html" class="block py-2 text-gray-300 font-mono text-sm">[ARSENAL]</a>
                <a href="dataviz.html" class="block py-2 text-gray-300 font-mono text-sm">[DATA_VIZ]</a>
                <a href="dna.html" class="block py-2 text-cyan-400 font-mono text-sm">[DNA]</a>
                <a href="molecule.html" class="block py-2 text-gray-300 font-mono text-sm">[MOLECULE]</a>
            </div>
        </div>
    </nav>
    
    <div class="ui-overlay glass-panel rounded-lg p-4">
        <h2 class="font-orbitron text-xl text-cyan-400 mb-2">DNA HELIX</h2>
        <p class="text-gray-400 text-xs mb-4 font-mono">Double Helix Visualization</p>
        
        <div class="space-y-2 mb-4">
            <p class="text-gray-400 text-xs font-mono">BASE PAIRS</p>
            <div class="base-pair-info base-a">
                <span class="text-green-400 font-mono font-bold">A</span>
                <span class="text-gray-400 text-xs"> - Adenine</span>
            </div>
            <div class="base-pair-info base-t">
                <span class="text-yellow-400 font-mono font-bold">T</span>
                <span class="text-gray-400 text-xs"> - Thymine</span>
            </div>
            <div class="base-pair-info base-c">
                <span class="text-cyan-400 font-mono font-bold">C</span>
                <span class="text-gray-400 text-xs"> - Cytosine</span>
            </div>
            <div class="base-pair-info base-g">
                <span class="text-fuchsia-400 font-mono font-bold">G</span>
                <span class="text-gray-400 text-xs"> - Guanine</span>
            </div>
        </div>
        
        <div class="space-y-2">
            <button id="toggleRotation" class="neon-btn w-full py-2 rounded text-sm font-mono">PAUSE ROTATION</button>
            <button id="resetView" class="w-full py-2 rounded text-sm font-mono border border-cyan-500/50 text-cyan-400 hover:bg-cyan-500/20 transition-all">RESET VIEW</button>
        </div>
        
        <div class="mt-4 text-xs text-gray-500 font-mono">
            <p>Drag to rotate</p>
            <p>Scroll to zoom</p>
            <p>Hover bases for info</p>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <script>
        // Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particlesContainer.appendChild(particle);
        }
        
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });
        
        // THREE.JS DNA Visualizer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 10, 40);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 80), 0.1, 1000);
        camera.position.set(0, 0, 18);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight - 80);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 5, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const cyanLight = new THREE.PointLight(0x00f5d4, 0.6, 25);
        cyanLight.position.set(-8, 5, 0);
        scene.add(cyanLight);
        
        const magentaLight = new THREE.PointLight(0xff00f5, 0.6, 25);
        magentaLight.position.set(8, -5, 0);
        scene.add(magentaLight);
        
        // DNA parameters
        const helixRadius = 3;
        const helixHeight = 16;
        const basePairsCount = 24;
        const rotationPerBase = Math.PI / 6;
        
        const baseColors = {
            A: 0x4ade80,  // Green
            T: 0xfacc15,  // Yellow
            C: 0x00f5d4,  // Cyan
            G: 0xff00f5   // Magenta
        };
        
        const basePairs = ['AT', 'TA', 'CG', 'GC', 'AT', 'TA', 'CG', 'GC', 'AT', 'TA', 'CG', 'GC',
                          'AT', 'TA', 'CG', 'GC', 'AT', 'TA', 'CG', 'GC', 'AT', 'TA', 'CG', 'GC'];
        
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);
        
        const backboneMaterial1 = new THREE.MeshStandardMaterial({
            color: 0x00f5d4,
            emissive: 0x00f5d4,
            emissiveIntensity: 0.4,
            roughness: 0.2,
            metalness: 0.8
        });
        
        const backboneMaterial2 = new THREE.MeshStandardMaterial({
            color: 0xff00f5,
            emissive: 0xff00f5,
            emissiveIntensity: 0.4,
            roughness: 0.2,
            metalness: 0.8
        });
        
        // Create DNA helix
        const sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);
        const cylinderGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
        
        const baseMeshes = [];
        
        for (let i = 0; i < basePairsCount; i++) {
            const y = (i / (basePairsCount - 1)) * helixHeight - helixHeight / 2;
            const angle = i * rotationPerBase;
            
            // Strand 1 backbone
            const x1 = Math.cos(angle) * helixRadius;
            const z1 = Math.sin(angle) * helixRadius;
            const backbone1 = new THREE.Mesh(sphereGeo, backboneMaterial1);
            backbone1.position.set(x1, y, z1);
            backbone1.castShadow = true;
            dnaGroup.add(backbone1);
            
            // Strand 2 backbone
            const x2 = Math.cos(angle + Math.PI) * helixRadius;
            const z2 = Math.sin(angle + Math.PI) * helixRadius;
            const backbone2 = new THREE.Mesh(sphereGeo, backboneMaterial2);
            backbone2.position.set(x2, y, z2);
            backbone2.castShadow = true;
            dnaGroup.add(backbone2);
            
            // Base pair
            const pair = basePairs[i];
            const base1 = pair[0];
            const base2 = pair[1];
            
            // Base 1
            const baseMat1 = new THREE.MeshStandardMaterial({
                color: baseColors[base1],
                emissive: baseColors[base1],
                emissiveIntensity: 0.3,
                roughness: 0.3,
                metalness: 0.6
            });
            const baseMesh1 = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), baseMat1);
            const midX = (x1 + x2) / 2;
            const midZ = (z1 + z2) / 2;
            baseMesh1.position.set((x1 + midX) / 2, y, (z1 + midZ) / 2);
            baseMesh1.userData = { base: base1, pair: base2 };
            baseMesh1.castShadow = true;
            dnaGroup.add(baseMesh1);
            baseMeshes.push(baseMesh1);
            
            // Base 2
            const baseMat2 = new THREE.MeshStandardMaterial({
                color: baseColors[base2],
                emissive: baseColors[base2],
                emissiveIntensity: 0.3,
                roughness: 0.3,
                metalness: 0.6
            });
            const baseMesh2 = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), baseMat2);
            baseMesh2.position.set((x2 + midX) / 2, y, (z2 + midZ) / 2);
            baseMesh2.userData = { base: base2, pair: base1 };
            baseMesh2.castShadow = true;
            dnaGroup.add(baseMesh2);
            baseMeshes.push(baseMesh2);
            
            // Connection (hydrogen bond)
            const connectionGeo = new THREE.CylinderGeometry(0.05, 0.05, Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(z2-z1, 2)) - 1.4, 8);
            const connectionMat = new THREE.MeshStandardMaterial({
                color: 0x888888,
                transparent: true,
                opacity: 0.5
            });
            const connection = new THREE.Mesh(connectionGeo, connectionMat);
            connection.position.set(midX, y, midZ);
            connection.lookAt(x2, y, z2);
            connection.rotateX(Math.PI / 2);
            dnaGroup.add(connection);
            
            // Backbone connections
            if (i > 0) {
                const prevAngle = (i - 1) * rotationPerBase;
                const prevY = ((i - 1) / (basePairsCount - 1)) * helixHeight - helixHeight / 2;
                
                // Strand 1 connection
                const prevX1 = Math.cos(prevAngle) * helixRadius;
                const prevZ1 = Math.sin(prevAngle) * helixRadius;
                const conn1Geo = new THREE.CylinderGeometry(0.08, 0.08, Math.sqrt(Math.pow(x1-prevX1, 2) + Math.pow(y-prevY, 2) + Math.pow(z1-prevZ1, 2)), 8);
                const conn1 = new THREE.Mesh(conn1Geo, backboneMaterial1);
                conn1.position.set((x1 + prevX1) / 2, (y + prevY) / 2, (z1 + prevZ1) / 2);
                conn1.lookAt(x1, y, z1);
                conn1.rotateX(Math.PI / 2);
                dnaGroup.add(conn1);
                
                // Strand 2 connection
                const prevX2 = Math.cos(prevAngle + Math.PI) * helixRadius;
                const prevZ2 = Math.sin(prevAngle + Math.PI) * helixRadius;
                const conn2Geo = new THREE.CylinderGeometry(0.08, 0.08, Math.sqrt(Math.pow(x2-prevX2, 2) + Math.pow(y-prevY, 2) + Math.pow(z2-prevZ2, 2)), 8);
                const conn2 = new THREE.Mesh(conn2Geo, backboneMaterial2);
                conn2.position.set((x2 + prevX2) / 2, (y + prevY) / 2, (z2 + prevZ2) / 2);
                conn2.lookAt(x2, y, z2);
                conn2.rotateX(Math.PI / 2);
                dnaGroup.add(conn2);
            }
        }
        
        // Mouse interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredBase = null;
        let isRotating = true;
        
        renderer.domElement.addEventListener('mousemove', (event) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(baseMeshes);
            
            if (intersects.length > 0) {
                const base = intersects[0].object;
                if (hoveredBase !== base) {
                    if (hoveredBase) hoveredBase.material.emissiveIntensity = 0.3;
                    hoveredBase = base;
                    base.material.emissiveIntensity = 0.8;
                }
            } else {
                if (hoveredBase) {
                    hoveredBase.material.emissiveIntensity = 0.3;
                    hoveredBase = null;
                }
            }
        });
        
        // Camera controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        
        renderer.domElement.addEventListener('mouseup', () => isDragging = false);
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                dnaGroup.rotation.y += deltaX * 0.01;
                dnaGroup.rotation.x += deltaY * 0.01;
                
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });
        
        renderer.domElement.addEventListener('wheel', (e) => {
            camera.position.z = Math.max(8, Math.min(30, camera.position.z + e.deltaY * 0.01));
        });
        
        // Button handlers
        document.getElementById('toggleRotation').addEventListener('click', function() {
            isRotating = !isRotating;
            this.textContent = isRotating ? 'PAUSE ROTATION' : 'RESUME ROTATION';
        });
        
        document.getElementById('resetView').addEventListener('click', () => {
            camera.position.set(0, 0, 18);
            dnaGroup.rotation.set(0, 0, 0);
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (isRotating) {
                dnaGroup.rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight - 80);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 80);
        });
    
        // Mobile Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.querySelector('.mobile-menu-btn');
            if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

    </script>
</body>
</html>
