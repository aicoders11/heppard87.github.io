<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hollow: Hybrid Mobile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vt323&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #dcdcdc;
            font-family: 'Vt323', monospace;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: #000;
        }

        canvas {
            image-rendering: pixelated;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 10px; box-sizing: border-box;
            z-index: 10;
        }

        .hud { color: #0ff; font-size: 20px; text-shadow: 1px 1px #000; }

        #debug-log {
            position: absolute; top: 40px; left: 10px;
            font-size: 12px; color: #0f0; background: rgba(0,0,0,0.7);
            padding: 5px; max-height: 200px; overflow: hidden;
            pointer-events: none; z-index: 100; white-space: pre-wrap;
        }

        /* TOUCH CONTROLS */
        #controls {
            display: none; /* Enabled via JS */
            width: 100%; height: 100%; pointer-events: auto;
            position: absolute; top: 0; left: 0; z-index: 20;
        }

        .btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 10px;
            backdrop-filter: blur(2px);
        }
        .btn:active { background: rgba(0, 255, 255, 0.3); }

        /* D-Pad Layout */
        .d-pad-zone { position: absolute; bottom: 20px; left: 20px; width: 160px; height: 160px; }
        .d-btn { width: 50px; height: 50px; }
        .d-up { top: 0; left: 55px; } 
        .d-down { bottom: 0; left: 55px; } 
        .d-left { top: 55px; left: 0; } 
        .d-right { top: 55px; right: 0; }

        /* Action Buttons */
        .act-zone { position: absolute; bottom: 30px; right: 20px; display: flex; gap: 15px; }
        .a-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #0ff; }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud">SCORE: <span id="score">0</span></div>
        <div id="debug-log">System Initializing...<br></div>
        
        <div id="controls">
            <div class="d-pad-zone">
                <div class="btn d-btn d-up" data-key="ArrowUp"></div>
                <div class="btn d-btn d-down" data-key="ArrowDown"></div>
                <div class="btn d-btn d-left" data-key="ArrowLeft"></div>
                <div class="btn d-btn d-right" data-key="ArrowRight"></div>
            </div>
            <div class="act-zone">
                <div class="btn a-btn" data-key="x">FLY</div>
                <div class="btn a-btn" data-key="z">SHT</div>
                <div class="btn a-btn" data-key=" ">JMP</div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * NEON HOLLOW: HYBRID ENGINE
 * Robust asset loading with procedural fallbacks.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const debugEl = document.getElementById('debug-log');
const scoreEl = document.getElementById('score');

function log(msg) {
    debugEl.innerHTML += msg + "\n";
    console.log(msg);
}

// Resolution
const GW = 640;
const GH = 360;

function resize() {
    canvas.width = GW;
    canvas.height = GH;
}
window.addEventListener('resize', resize);
resize();

// --- ASSET SYSTEM ---
const ASSET_FILES = {
    // Filenames you provided
    sky: '1.png',
    bg1: '2 (6).png',
    bg2: '2 (7).png',
    player: '1000661405.png',
    car: '1000661399.png',
    ground: 'Test_city_1.png',
    bullet: 'Shot-Sheet.png'
};

const images = {};
let loaded = false;

// Procedural Generators (The Fallback Plan)
function createFallback(type) {
    const c = document.createElement('canvas');
    const x = c.getContext('2d');
    
    if (type === 'car') {
        c.width = 40; c.height = 60;
        x.fillStyle = '#f0f'; x.fillRect(5,5,30,50);
        x.fillStyle = '#0ff'; x.fillRect(10,20,20,10);
    } else if (type === 'player') {
        c.width = 30; c.height = 40;
        x.fillStyle = '#0f0'; x.fillRect(5,5,20,30);
        x.fillStyle = '#000'; x.fillRect(5,5,20,5); // Hat
    } else if (type === 'ground') {
        c.width = 100; c.height = 100;
        x.fillStyle = '#222'; x.fillRect(0,0,100,100);
        x.strokeStyle = '#444'; x.strokeRect(0,0,100,100);
    } else {
        // Generic Gradient for backgrounds
        c.width = GW; c.height = GH;
        const g = x.createLinearGradient(0,0,0,GH);
        g.addColorStop(0, '#000'); 
        g.addColorStop(1, (type==='sky'?'#202':'#111'));
        x.fillStyle = g; x.fillRect(0,0,GW,GH);
    }
    return c;
}

// The "Safety Net" Loader
function startLoading() {
    let pending = Object.keys(ASSET_FILES).length;
    
    // Safety Timeout: Force start after 2 seconds
    setTimeout(() => {
        if (!loaded) {
            log("TIMEOUT: Force starting with what we have...");
            finalizeLoading();
        }
    }, 2000);

    for (let key in ASSET_FILES) {
        const img = new Image();
        img.src = ASSET_FILES[key];
        
        img.onload = () => {
            log("✔ Loaded: " + key);
            images[key] = img;
            pending--;
            if(pending <= 0) finalizeLoading();
        };
        
        img.onerror = () => {
            log("✖ Failed: " + key + " (Using Gen)");
            images[key] = createFallback(key); // Assign fallback immediately
            pending--;
            if(pending <= 0) finalizeLoading();
        };
    }
}

function finalizeLoading() {
    if (loaded) return;
    loaded = true;
    log("SYSTEM READY. GAME START.");
    
    // Fill in any gaps with fallbacks just in case
    for(let key in ASSET_FILES) {
        if(!images[key]) images[key] = createFallback(key);
    }
    
    requestAnimationFrame(loop);
}

// --- INPUT ---
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, " ": false, z: false, x: false };

if('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('controls').style.display = 'block';
}

const btns = document.querySelectorAll('.btn');
btns.forEach(b => {
    b.addEventListener('touchstart', e => {
        e.preventDefault();
        const k = b.dataset.key;
        keys[k] = true;
        if(k==='x' && currentState===0) car.flying = !car.flying;
    });
    b.addEventListener('touchend', e => {
        e.preventDefault();
        keys[b.dataset.key] = false;
    });
});

window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
window.addEventListener('keyup', e => { 
    if(keys.hasOwnProperty(e.key)) keys[e.key] = false; 
    if(e.key === 'x' && currentState === 0) car.flying = !car.flying;
});

// --- GAME LOGIC ---
const STATE = { OVERWORLD: 0, PLATFORM: 1 };
let currentState = STATE.OVERWORLD;

const car = { x: 0, y: 0, speed: 0, angle: 0, flying: false, height: 0 };
const player = { x: 100, y: 100, vx: 0, vy: 0, facingRight: true };
const zones = [{x: 200, y: 200, w: 100, h: 100}]; // Test zone

// Parallax offsets
let camX = 0;

function update() {
    if (currentState === STATE.OVERWORLD) {
        // Car
        if(keys.ArrowUp) car.speed += 0.2;
        if(keys.ArrowDown) car.speed -= 0.2;
        car.speed *= 0.95;
        if(Math.abs(car.speed)>0.1) {
            if(keys.ArrowLeft) car.angle -= 0.07;
            if(keys.ArrowRight) car.angle += 0.07;
        }
        car.x += Math.sin(car.angle) * car.speed;
        car.y -= Math.cos(car.angle) * car.speed;

        if(car.flying) {
            if(car.height < 50) car.height++;
        } else {
            if(car.height > 0) car.height--;
            // Zone Check
            zones.forEach(z => {
                if(Math.abs(car.x - z.x) < 50 && Math.abs(car.y - z.y) < 50) {
                    currentState = STATE.PLATFORM;
                    log("Entering Zone...");
                    player.x = 100; player.y = 100;
                }
            });
        }
    } else {
        // Player
        if(keys.ArrowLeft) { player.vx = -4; player.facingRight = false; }
        else if(keys.ArrowRight) { player.vx = 4; player.facingRight = true; }
        else player.vx = 0;

        if(keys[' ']) player.vy = -5; // Fly mode for test if gravity issues

        player.vy += 0.5;
        player.x += player.vx;
        player.y += player.vy;
        
        // Ground Floor
        if(player.y > 280) { player.y = 280; player.vy = 0; }
        
        camX = player.x - GW/2;
    }
}

// --- RENDER ---
function draw() {
    // Clear
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, GW, GH);

    if (currentState === STATE.OVERWORLD) {
        ctx.save();
        ctx.translate(GW/2, GH/2);
        
        // Draw Tiled Background (using Mid layer)
        ctx.save();
        ctx.rotate(-car.angle);
        ctx.translate(-car.x, -car.y);
        
        // Grid
        ctx.strokeStyle = '#333';
        const g = 100;
        for(let i=Math.floor((car.x-400)/g)*g; i<car.x+400; i+=g) {
            ctx.strokeRect(i, car.y-400, 1, 800);
            ctx.strokeRect(car.x-400, i, 800, 1); // rough grid
        }
        
        // Zone
        ctx.fillStyle = 'rgba(0,255,0,0.3)';
        zones.forEach(z => ctx.fillRect(z.x, z.y, z.w, z.h));
        
        ctx.restore();

        // Car
        ctx.translate(0, -car.height);
        // Draw Car Image
        // Note: For top down, if the car sprite is vertical (pointing up), we don't rotate context again
        // because we rotated the world.
        if(images.car) ctx.drawImage(images.car, -20, -30, 40, 60);

        ctx.restore();
        
        if(car.flying) {
            ctx.fillStyle = '#0ff'; ctx.fillText("ALT: " + car.height, 10, GH-10);
        }

    } else {
        // Platformer
        
        // Parallax Layers
        const drawL = (img, spd) => {
            if(!img) return;
            let off = -(camX * spd) % GW;
            if(off > 0) off -= GW;
            ctx.drawImage(img, off, 0, GW, GH);
            ctx.drawImage(img, off+GW, 0, GW, GH);
        };
        
        // Safe Draw
        if(images.sky) ctx.drawImage(images.sky, 0, 0, GW, GH); // Static Sky
        if(images.bg1) drawL(images.bg1, 0.2);
        if(images.bg2) drawL(images.bg2, 0.5);

        // Ground
        if(images.ground) {
             for(let i=0; i<GW; i+=100) ctx.drawImage(images.ground, i, 310);
        } else {
             ctx.fillStyle = '#333'; ctx.fillRect(0, 310, GW, 50);
        }

        // Player
        ctx.save();
        ctx.translate(player.x - camX, player.y); // Relative to camera
        if(!player.facingRight) ctx.scale(-1, 1);
        
        if(images.player) ctx.drawImage(images.player, -15, 0, 30, 40);
        
        ctx.restore();
    }
}

// --- BOOT ---
log("Starting Engine...");
startLoading();

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
