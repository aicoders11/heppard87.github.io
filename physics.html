<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Sandbox | Cyberpunk Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5d4;
            --neon-magenta: #ff00f5;
            --neon-amber: #ffaa00;
            --neon-lime: #ccff00;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(10, 10, 15, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'Share Tech Mono', monospace; }
        
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        .nav-link {
            position: relative;
            transition: all 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            transition: width 0.3s;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.1);
        }
        
        .neon-btn {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .neon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 212, 0.5);
        }
        
        .shape-btn {
            border: 1px solid rgba(0, 245, 212, 0.3);
            background: rgba(0, 245, 212, 0.1);
            color: var(--neon-cyan);
            transition: all 0.3s;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .shape-btn:hover, .shape-btn.active {
            background: rgba(0, 245, 212, 0.3);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }
        
        #canvas-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            height: calc(100vh - 80px);
            z-index: 5;
        }
        
        .ui-overlay {
            position: fixed;
            top: 100px;
            left: 20px;
            z-index: 10;
            max-width: 280px;
        }
        
        .stats-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
        }
    
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00f5d4;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px; left: 0; width: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 245, 212, 0.3);
            backdrop-filter: blur(15px);
            z-index: 999;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #888;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            transition: all 0.3s;
        }
        .mobile-menu a:hover {
            color: #00f5d4;
            padding-left: 10px;
        }
        @media (max-width: 1024px) {
            .cyber-nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }

        /* Footer */
        .cyber-footer {
            border-top: 1px solid rgba(0, 245, 212, 0.3);
            text-align: center;
        }
        .cyber-footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .cyber-footer-links a {
            color: #666;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .cyber-footer-links a:hover { color: #00f5d4; }
        .cyber-footer-text {
            font-family: 'Share Tech Mono', monospace;
            color: #555;
        }

    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <nav class="fixed top-0 left-0 w-full z-50 glass-panel border-b border-cyan-500/30">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="index.html" class="font-orbitron text-2xl font-bold bg-gradient-to-r from-cyan-400 to-fuchsia-500 bg-clip-text text-transparent">
                    CYBER<span class="text-cyan-400">MATRIX</span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="nav-link text-gray-300 font-mono text-sm">[HOME]</a>
                    <a href="portfolio.html" class="nav-link text-gray-300 font-mono text-sm">[ARSENAL]</a>
                    <a href="voxel.html" class="nav-link text-gray-300 font-mono text-sm">[VOXEL]</a>
                    <a href="physics.html" class="nav-link text-cyan-400 font-mono text-sm">[PHYSICS]</a>
                    <a href="billiards.html" class="nav-link text-gray-300 font-mono text-sm">[BILLIARDS]</a>
                    <a href="zengarden.html" class="nav-link text-gray-300 font-mono text-sm">[ZEN]</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-cyan-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden glass-panel border-t border-cyan-500/30">
            <div class="px-4 py-2 space-y-2">
                <a href="index.html" class="block py-2 text-gray-300 font-mono text-sm">[HOME]</a>
                <a href="portfolio.html" class="block py-2 text-gray-300 font-mono text-sm">[ARSENAL]</a>
                <a href="voxel.html" class="block py-2 text-gray-300 font-mono text-sm">[VOXEL]</a>
                <a href="physics.html" class="block py-2 text-cyan-400 font-mono text-sm">[PHYSICS]</a>
            </div>
        </div>
    </nav>
    
    <div class="ui-overlay glass-panel rounded-lg p-4">
        <h2 class="font-orbitron text-xl text-cyan-400 mb-2">PHYSICS SANDBOX</h2>
        <p class="text-gray-400 text-xs mb-4 font-mono">Cannon.js Physics Playground</p>
        
        <div class="stats-display mb-4 text-cyan-400">
            <span id="objectCount">OBJECTS: 0</span>
        </div>
        
        <div class="mb-4">
            <p class="text-gray-400 text-xs font-mono mb-2">SPAWN SHAPE</p>
            <div class="grid grid-cols-2 gap-2">
                <button class="shape-btn active font-mono" data-shape="box">CUBE</button>
                <button class="shape-btn font-mono" data-shape="sphere">SPHERE</button>
                <button class="shape-btn font-mono" data-shape="cylinder">CYLINDER</button>
                <button class="shape-btn font-mono" data-shape="tetra">TETRA</button>
            </div>
        </div>
        
        <div class="space-y-2">
            <button id="spawnBtn" class="neon-btn w-full py-2 rounded text-sm font-mono">SPAWN OBJECT</button>
            <button id="gravityBtn" class="w-full py-2 rounded text-sm font-mono border border-cyan-500/50 text-cyan-400 hover:bg-cyan-500/20 transition-all">INVERT GRAVITY</button>
            <button id="clearBtn" class="w-full py-2 rounded text-sm font-mono border border-red-500/50 text-red-400 hover:bg-red-500/20 transition-all">CLEAR ALL</button>
        </div>
        
        <div class="mt-4 text-xs text-gray-500 font-mono">
            <p>Click + drag to throw</p>
            <p>Right click to rotate</p>
            <p>Scroll to zoom</p>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <script>
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });
        
        // THREE.JS + CANNON.JS Physics Sandbox
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 20, 60);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 80), 0.1, 1000);
        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight - 80);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // Physics world
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.NaiveBroadphase();
        world.solver.iterations = 10;
        
        // Materials
        const physicsMaterial = new CANNON.Material('physics');
        const physicsContactMaterial = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, {
            friction: 0.3,
            restitution: 0.7
        });
        world.addContactMaterial(physicsContactMaterial);
        
        // Ground
        const groundShape = new CANNON.Plane();
        const groundBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
        groundBody.addShape(groundShape);
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);
        
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e, 
            roughness: 0.8,
            metalness: 0.2
        });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);
        
        // Grid
        const gridHelper = new THREE.GridHelper(50, 50, 0x00f5d4, 0x0a0a0f);
        scene.add(gridHelper);
        
        // Objects array
        const objects = [];
        let currentShape = 'box';
        
        const colors = [0x00f5d4, 0xff00f5, 0xffaa00, 0xccff00, 0xff4444, 0x4444ff];
        
        function createObject(shape, position) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            let mesh, body, shape3D;
            
            switch(shape) {
                case 'box':
                    const size = 1 + Math.random();
                    shape3D = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
                    const boxGeo = new THREE.BoxGeometry(size, size, size);
                    const boxMat = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        roughness: 0.3, 
                        metalness: 0.5,
                        emissive: color,
                        emissiveIntensity: 0.2
                    });
                    mesh = new THREE.Mesh(boxGeo, boxMat);
                    break;
                    
                case 'sphere':
                    const radius = 0.5 + Math.random() * 0.5;
                    shape3D = new CANNON.Sphere(radius);
                    const sphereGeo = new THREE.SphereGeometry(radius, 32, 32);
                    const sphereMat = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        roughness: 0.2, 
                        metalness: 0.6,
                        emissive: color,
                        emissiveIntensity: 0.2
                    });
                    mesh = new THREE.Mesh(sphereGeo, sphereMat);
                    break;
                    
                case 'cylinder':
                    const cylRadius = 0.5 + Math.random() * 0.3;
                    const cylHeight = 1 + Math.random();
                    shape3D = new CANNON.Cylinder(cylRadius, cylRadius, cylHeight, 16);
                    const cylGeo = new THREE.CylinderGeometry(cylRadius, cylRadius, cylHeight, 16);
                    const cylMat = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        roughness: 0.3, 
                        metalness: 0.5,
                        emissive: color,
                        emissiveIntensity: 0.2
                    });
                    mesh = new THREE.Mesh(cylGeo, cylMat);
                    break;
                    
                case 'tetra':
                    const tetraRadius = 0.8 + Math.random() * 0.4;
                    shape3D = new CANNON.Box(new CANNON.Vec3(tetraRadius/2, tetraRadius/2, tetraRadius/2));
                    const tetraGeo = new THREE.TetrahedronGeometry(tetraRadius, 0);
                    const tetraMat = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        roughness: 0.3, 
                        metalness: 0.5,
                        emissive: color,
                        emissiveIntensity: 0.2
                    });
                    mesh = new THREE.Mesh(tetraGeo, tetraMat);
                    break;
            }
            
            body = new CANNON.Body({ mass: 1, material: physicsMaterial });
            body.addShape(shape3D);
            body.position.copy(position);
            body.angularVelocity.set(Math.random(), Math.random(), Math.random());
            
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            world.addBody(body);
            scene.add(mesh);
            objects.push({ mesh, body });
            
            updateObjectCount();
        }
        
        function updateObjectCount() {
            document.getElementById('objectCount').textContent = `OBJECTS: ${objects.length}`;
        }
        
        // Mouse interaction for throwing
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let dragStart = new THREE.Vector3();
        let draggedObject = null;
        
        renderer.domElement.addEventListener('mousedown', (event) => {
            if (event.button !== 0) return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects.map(o => o.mesh));
            
            if (intersects.length > 0) {
                isDragging = true;
                draggedObject = objects.find(o => o.mesh === intersects[0].object);
                dragStart.set(event.clientX, event.clientY, 0);
            }
        });
        
        renderer.domElement.addEventListener('mouseup', (event) => {
            if (isDragging && draggedObject) {
                const dragEnd = new THREE.Vector3(event.clientX, event.clientY, 0);
                const force = dragEnd.sub(dragStart).multiplyScalar(0.5);
                draggedObject.body.velocity.set(force.x * 0.1, Math.abs(force.y) * 0.1, 0);
            }
            isDragging = false;
            draggedObject = null;
        });
        
        // Camera controls
        let isRightMouseDown = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        renderer.domElement.addEventListener('mousedown', (event) => {
            if (event.button === 2) {
                isRightMouseDown = true;
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        });
        
        renderer.domElement.addEventListener('mouseup', () => {
            isRightMouseDown = false;
        });
        
        renderer.domElement.addEventListener('mousemove', (event) => {
            if (isRightMouseDown) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                spherical.theta -= deltaX * 0.01;
                spherical.phi += deltaY * 0.01;
                spherical.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, spherical.phi));
                
                camera.position.setFromSpherical(spherical);
                camera.lookAt(0, 0, 0);
                
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        });
        
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        
        renderer.domElement.addEventListener('wheel', (event) => {
            const scale = event.deltaY > 0 ? 1.1 : 0.9;
            camera.position.multiplyScalar(scale);
        });
        
        // UI handlers
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentShape = this.dataset.shape;
            });
        });
        
        document.getElementById('spawnBtn').addEventListener('click', () => {
            const x = (Math.random() - 0.5) * 10;
            const z = (Math.random() - 0.5) * 10;
            createObject(currentShape, new CANNON.Vec3(x, 10, z));
        });
        
        let gravityInverted = false;
        document.getElementById('gravityBtn').addEventListener('click', function() {
            gravityInverted = !gravityInverted;
            world.gravity.set(0, gravityInverted ? 9.82 : -9.82, 0);
            this.textContent = gravityInverted ? 'NORMAL GRAVITY' : 'INVERT GRAVITY';
        });
        
        document.getElementById('clearBtn').addEventListener('click', () => {
            objects.forEach(obj => {
                world.removeBody(obj.body);
                scene.remove(obj.mesh);
            });
            objects.length = 0;
            updateObjectCount();
        });
        
        // Animation loop
        const timeStep = 1 / 60;
        
        function animate() {
            requestAnimationFrame(animate);
            
            world.step(timeStep);
            
            objects.forEach(obj => {
                obj.mesh.position.copy(obj.body.position);
                obj.mesh.quaternion.copy(obj.body.quaternion);
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight - 80);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 80);
        });
    
        // Mobile Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.querySelector('.mobile-menu-btn');
            if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

    </script>
</body>
</html>
