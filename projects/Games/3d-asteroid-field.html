<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Heppard's 3D Asteroid Field | CyberSolutionsOhio</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; }
        canvas { display: block; }
        
        #score-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f5d4; /* Cyan */
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 245, 212, 0.5);
            z-index: 10;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            z-index: 20;
        }

        h1 { color: #ff00f5; font-size: 3rem; margin-bottom: 1rem; text-shadow: 0 0 10px #ff00f5; }
        p { font-size: 1.5rem; margin-bottom: 2rem; }
        
        .cta-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: #00f5d4;
            border: 2px solid #00f5d4;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .cta-button:hover {
            background: #00f5d4;
            color: #000;
            box-shadow: 0 0 20px #00f5d4;
        }
    </style>
</head>
<body>
    <div id="score-container">
        Score: <span id="score">0</span><br>
        High Score: <span id="high-score">0</span>
    </div>

    <div id="game-over-screen">
        <h1>SYSTEM FAILURE</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-button" class="cta-button">Reboot System</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="js/theme.js"></script>

            scene.add(stars);

            scene.add(pLight);
