<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIDDEN SECRETS: Blood Edition</title>
    <style>
        :root {
            --horror-red: #8b0000;
            --glass-bg: rgba(10, 10, 12, 0.98);
            --text-glow: 0 0 10px rgba(139, 0, 0, 0.8);
        }

        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* START MENU - Explicitly visible on load */
        #start-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; opacity: 1; transition: opacity 0.8s ease;
        }

        .menu-title { font-size: 3rem; letter-spacing: 12px; color: var(--horror-red); text-shadow: var(--text-glow); margin-bottom: 5px; text-align: center; }
        .menu-credit { font-size: 0.75rem; color: #555; letter-spacing: 4px; margin-bottom: 40px; text-transform: uppercase; }

        .menu-btn {
            background: rgba(40, 0, 0, 0.2); border: 1px solid rgba(139, 0, 0, 0.4);
            color: #999; padding: 15px 30px; font-size: 1rem; cursor: pointer;
            font-family: inherit; transition: 0.3s; width: 280px; margin: 8px;
        }
        .menu-btn:hover { background: rgba(139, 0, 0, 0.3); color: #fff; border-color: var(--horror-red); }

        /* GAME WINDOW - Hidden until Start */
        #game-window {
            width: 95%; max-width: 800px;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(139, 0, 0, 0.3);
            padding: 35px; position: relative; display: none;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.75rem; color: #444; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #story-text { font-size: 1.1rem; line-height: 1.7; min-height: 180px; margin-bottom: 30px; }
        .choices { display: grid; gap: 10px; }

        .choice-btn {
            background: rgba(20, 0, 0, 0.4); border: 1px solid #331111;
            color: #888; padding: 16px; cursor: pointer; text-align: left;
            font-family: inherit; transition: 0.2s;
        }
        .choice-btn:hover { color: #fff; border-color: var(--horror-red); background: rgba(80, 0, 0, 0.2); }

        #scare-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

    <div id="scare-overlay"><h1 style="color:red; font-size:4rem;">I SEE YOU</h1></div>

    <div id="start-menu">
        <h1 class="menu-title">HIDDEN SECRETS</h1>
        <div class="menu-credit">Created by Chris Heppard</div>
        <button class="menu-btn" onclick="game.begin()">ENTER THE VOID</button>
        <button class="menu-btn" onclick="game.loadGame()">CONTINUE SOUL</button>
        <div style="margin-top:20px; font-size:0.6rem; color:#333;">V.FINAL_STABLE</div>
    </div>

    <div id="game-window">
        <div class="stats">
            <div>Vitals: <span id="sanity-val">100</span>%</div>
            <div>Distance: <span id="dist-val">10</span>m</div>
            <div>Inventory: <span id="inv-val">None</span></div>
        </div>
        <header style="text-align:center; margin-bottom:20px;">
            <h2 id="room-title" style="color:var(--horror-red); margin:0;">THE FOYER</h2>
            <button class="btn-mini" onclick="game.saveGame()" style="background:none; border:none; color:#333; cursor:pointer;">[Save Progress]</button>
        </header>
        <div id="story-text">...</div>
        <div class="choices" id="choices-container"></div>
    </div>

    <script>
        class HorrorEngine {
            constructor() {
                this.state = { sanity: 100, location: 'entrance', inventory: [], dist: 10, running: false };
                this.rooms = {
                    entrance: { title: "THE FOYER", text: "The wallpaper is peeling. You hear heavy, wet footsteps in the Kitchen. A staircase leads up to a Nursery.", actions: [
                        { text: "Go to the Kitchen", target: "kitchen", move: true },
                        { text: "Go to the Nursery", target: "nursery", move: true },
                        { text: "Check the drawer", item: "Old Key" }
                    ]},
                    kitchen: { title: "THE KITCHEN", text: "A cleaver is buried in a rotting pig carcass on the table. The basement door is bolted shut.", actions: [
                        { text: "Take the Cleaver", item: "Cleaver" },
                        { text: "Unlock Basement", target: "basement", require: "Old Key", move: true },
                        { text: "Return to Foyer", target: "entrance", move: true }
                    ]},
                    nursery: { title: "THE NURSERY", text: "A music box plays a distorted lullaby. A rocking chair moves on its own.", actions: [
                        { text: "Search the crib", item: "Glass Eye" },
                        { text: "Hide in the closet", recover: 10 },
                        { text: "Back to hallway", target: "entrance", move: true }
                    ]},
                    basement: { title: "THE BASEMENT", text: "The Caretaker stands by a ritual circle. An escape hatch is behind him.", actions: [
                        { text: "Use Cleaver on hatch", action: "win", require: "Cleaver" },
                        { text: "Throw Glass Eye to distract", action: "distract", require: "Glass Eye" },
                        { text: "Run back up!", target: "kitchen", move: true }
                    ]}
                };
            }

            begin() {
                this.state.running = true;
                document.getElementById('start-menu').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('start-menu').style.display = 'none';
                    document.getElementById('game-window').style.display = 'block';
                    this.initAudio();
                    this.updateUI();
                }, 800);
            }

            initAudio() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.heartbeat();
            }

            heartbeat() {
                if (!this.state.running) return;
                const bpm = Math.max(300, this.state.dist * 180);
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.frequency.setValueAtTime(50, this.audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.start(); osc.stop(this.audioCtx.currentTime + 0.1);
                setTimeout(() => this.heartbeat(), bpm);
            }

            saveGame() { localStorage.setItem('ch_save', JSON.stringify(this.state)); alert("SOUL SAVED."); }
            loadGame() {
                const save = localStorage.getItem('ch_save');
                if (save) { this.state = JSON.parse(save); this.begin(); }
                else { alert("NO SOUL FOUND."); }
            }

            takeAction(a) {
                if (a.move) this.state.dist--;
                if (a.recover) this.state.sanity = Math.min(100, this.state.sanity + a.recover);
                if (a.item && !this.state.inventory.includes(a.item)) this.state.inventory.push(a.item);
                if (a.target) this.state.location = a.target;
                
                if (a.action === 'distract') { this.state.dist = 10; alert("He is distracted..."); }
                if (a.action === 'win') { alert("YOU ESCAPED CHRIS HEPPARD'S NIGHTMARE."); location.reload(); }

                if (this.state.dist <= 1) {
                    document.getElementById('scare-overlay').style.opacity = '1';
                    setTimeout(() => location.reload(), 1200);
                    return;
                }
                this.updateUI();
            }

            updateUI() {
                const room = this.rooms[this.state.location];
                document.getElementById('room-title').innerText = room.title;
                document.getElementById('story-text').innerText = room.text;
                document.getElementById('sanity-val').innerText = this.state.sanity;
                document.getElementById('dist-val').innerText = this.state.dist;
                document.getElementById('inv-val').innerText = this.state.inventory.join(', ') || 'None';

                const container = document.getElementById('choices-container');
                container.innerHTML = '';
                room.actions.forEach(a => {
                    if (a.require && !this.state.inventory.includes(a.require)) return;
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = a.text;
                    btn.onclick = () => this.takeAction(a);
                    container.appendChild(btn);
                });
            }
        }
        const game = new HorrorEngine();
    </script>
</body>
</html>
