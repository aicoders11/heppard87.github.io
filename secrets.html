<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Secrets | Chris Heppard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --horror-red: #8b0000;
            --blood-red: #ff0000;
            --cyan: #00f5d4;
            --dark: #050505;
            --panel: rgba(10, 5, 5, 0.98);
            --font-main: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--dark);
            color: #d1d1d1;
            font-family: var(--font-mono);
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* CRT Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 1000;
        }
        
        /* Start Menu */
        #start-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; opacity: 1; transition: opacity 1s ease;
        }
        
        .menu-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 15px;
            color: var(--horror-red);
            text-shadow: 0 0 30px rgba(139, 0, 0, 0.8);
            margin-bottom: 10px;
            text-align: center;
            animation: flicker 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
            75% { opacity: 0.95; }
        }
        
        .menu-credit {
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 5px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }
        
        .menu-btn {
            background: rgba(40, 0, 0, 0.3);
            border: 1px solid rgba(139, 0, 0, 0.5);
            color: #888;
            padding: 18px 50px;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: var(--font-mono);
            transition: all 0.3s;
            width: 320px;
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .menu-btn:hover {
            background: rgba(139, 0, 0, 0.4);
            color: #fff;
            border-color: var(--horror-red);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
        }
        
        .version {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 2px;
        }
        
        /* Game Window */
        #game-window {
            width: 95%;
            max-width: 900px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 0, 0, 0.4);
            border-radius: 10px;
            padding: 40px;
            position: relative;
            display: none;
            margin: 40px auto;
            box-shadow: 0 0 60px rgba(139, 0, 0, 0.2);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: #555;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            font-family: var(--font-mono);
        }
        
        .stat-value {
            color: var(--horror-red);
            font-weight: bold;
        }
        
        #story-text {
            font-size: 1.2rem;
            line-height: 2;
            min-height: 200px;
            margin-bottom: 40px;
            color: #aaa;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .choices {
            display: grid;
            gap: 15px;
        }
        
        .choice-btn {
            background: rgba(20, 0, 0, 0.4);
            border: 1px solid #331111;
            color: #888;
            padding: 20px 25px;
            cursor: pointer;
            text-align: left;
            font-family: var(--font-mono);
            transition: all 0.3s;
            font-size: 1rem;
            border-radius: 5px;
        }
        
        .choice-btn:hover {
            color: #fff;
            border-color: var(--horror-red);
            background: rgba(80, 0, 0, 0.3);
            padding-left: 35px;
        }
        
        #room-title {
            color: var(--horror-red);
            margin: 0 0 20px 0;
            font-family: var(--font-display);
            font-size: 1.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        .save-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            transition: color 0.3s;
        }
        
        .save-btn:hover { color: var(--horror-red); }
        
        /* Scare Overlay */
        #scare-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.1s;
        }
        
        #scare-overlay.active { opacity: 1; }
        
        .scare-text {
            color: var(--blood-red);
            font-size: clamp(3rem, 10vw, 8rem);
            font-family: var(--font-display);
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.8);
            animation: shake 0.1s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(-2px, -2px); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, -2px); }
        }
        
        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--panel); border-bottom: 1px solid rgba(139, 0, 0, 0.3);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 100; backdrop-filter: blur(15px);
        }
        
        .logo {
            font-family: var(--font-display); font-size: 1.2rem;
            color: var(--horror-red); text-decoration: none;
        }
        
        .nav-links { display: flex; gap: 25px; }
        .nav-links a {
            color: #555; text-decoration: none; font-family: var(--font-mono);
            font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--horror-red); }
        
        /* Audio indicator */
        .audio-indicator {
            position: fixed; bottom: 20px; right: 20px;
            padding: 10px 20px;
            background: rgba(139, 0, 0, 0.2);
            border: 1px solid rgba(139, 0, 0, 0.4);
            border-radius: 5px;
            font-size: 0.7rem;
            color: #555;
            font-family: var(--font-mono);
        }
        
        @media (max-width: 768px) {
            .menu-btn { width: 280px; padding: 15px 30px; }
            #game-window { padding: 25px; margin: 20px auto; }
            .stats { flex-direction: column; gap: 10px; }
        }
    
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00f5d4;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px; left: 0; width: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 245, 212, 0.3);
            backdrop-filter: blur(15px);
            z-index: 999;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #888;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            transition: all 0.3s;
        }
        .mobile-menu a:hover {
            color: #00f5d4;
            padding-left: 10px;
        }
        @media (max-width: 1024px) {
            .cyber-nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }

        /* Footer */
        .cyber-footer {
            border-top: 1px solid rgba(0, 245, 212, 0.3);
            text-align: center;
        }
        .cyber-footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .cyber-footer-links a {
            color: #666;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .cyber-footer-links a:hover { color: #00f5d4; }
        .cyber-footer-text {
            font-family: 'Share Tech Mono', monospace;
            color: #555;
        }

    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">HIDDEN SECRETS</a>
        <div class="nav-links">
            <a href="index.html">Exit</a>
        </div>
    </nav>

    <div id="scare-overlay">
        <h1 class="scare-text">I SEE YOU</h1>
    </div>

    <div id="start-menu">
        <h1 class="menu-title">HIDDEN SECRETS</h1>
        <div class="menu-credit">Created by Chris Heppard</div>
        <button class="menu-btn" onclick="game.begin()">ENTER THE VOID</button>
        <button class="menu-btn" onclick="game.loadGame()">CONTINUE SOUL</button>
        <div class="version">V.FINAL_STABLE // AGE 13+</div>
    </div>

    <div id="game-window">
        <div class="stats">
            <div>SANITY: <span id="sanity-val" class="stat-value">100</span>%</div>
            <div>DISTANCE: <span id="dist-val" class="stat-value">10</span>m</div>
            <div>INVENTORY: <span id="inv-val" class="stat-value">None</span></div>
        </div>
        <header style="text-align: center; margin-bottom: 30px;">
            <h2 id="room-title">THE FOYER</h2>
            <button class="save-btn" onclick="game.saveGame()">[SAVE PROGRESS]</button>
        </header>
        <div id="story-text">...</div>
        <div class="choices" id="choices-container"></div>
    </div>

    <div class="audio-indicator">Audio: Heartbeat Active</div>

    <script>
        class HorrorEngine {
            constructor() {
                this.state = { 
                    sanity: 100, 
                    location: 'entrance', 
                    inventory: [], 
                    dist: 10, 
                    running: false 
                };
                this.rooms = {
                    entrance: { 
                        title: "THE FOYER", 
                        text: "The wallpaper is peeling, revealing something dark beneath. You hear heavy, wet footsteps echoing from the Kitchen. A creaking staircase leads up to a Nursery. The air smells of decay.", 
                        actions: [
                            { text: "Go to the Kitchen", target: "kitchen", move: true },
                            { text: "Go to the Nursery", target: "nursery", move: true },
                            { text: "Check the drawer", item: "Old Key" },
                            { text: "Examine the wallpaper", action: "examine" }
                        ]
                    },
                    kitchen: { 
                        title: "THE KITCHEN", 
                        text: "A rusty cleaver is buried in a rotting pig carcass on the table. Flies swarm around. The basement door is bolted shut with a heavy chain. Something drips from the ceiling.", 
                        actions: [
                            { text: "Take the Cleaver", item: "Cleaver" },
                            { text: "Unlock Basement", target: "basement", require: "Old Key", move: true },
                            { text: "Look under the table", action: "search" },
                            { text: "Return to Foyer", target: "entrance", move: true }
                        ]
                    },
                    nursery: { 
                        title: "THE NURSERY", 
                        text: "A music box plays a distorted, slowed-down lullaby. A rocking chair moves on its own, creaking rhythmically. Dolls with missing eyes line the shelves. The closet door is slightly ajar.", 
                        actions: [
                            { text: "Search the crib", item: "Glass Eye" },
                            { text: "Hide in the closet", recover: 15 },
                            { text: "Close the music box", action: "music" },
                            { text: "Back to hallway", target: "entrance", move: true }
                        ]
                    },
                    basement: { 
                        title: "THE BASEMENT", 
                        text: "The Caretaker stands by a ritual circle drawn in chalk. His back is to you. An escape hatch is behind him, barely visible in the dim candlelight. The air is freezing.", 
                        actions: [
                            { text: "Use Cleaver on hatch", action: "win", require: "Cleaver" },
                            { text: "Throw Glass Eye to distract", action: "distract", require: "Glass Eye" },
                            { text: "Sneak past", action: "sneak" },
                            { text: "Run back up!", target: "kitchen", move: true }
                        ]
                    }
                };
            }

            begin() {
                this.state.running = true;
                document.getElementById('start-menu').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('start-menu').style.display = 'none';
                    document.getElementById('game-window').style.display = 'block';
                    this.initAudio();
                    this.updateUI();
                }, 1000);
            }

            initAudio() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.heartbeat();
            }

            heartbeat() {
                if (!this.state.running) return;
                const bpm = Math.max(200, this.state.dist * 80);
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.frequency.setValueAtTime(40, this.audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.08);
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.start(); osc.stop(this.audioCtx.currentTime + 0.08);
                setTimeout(() => this.heartbeat(), bpm);
            }

            saveGame() { 
                localStorage.setItem('ch_secrets_save', JSON.stringify(this.state)); 
                this.showMessage("SOUL SAVED TO VOID");
            }
            
            loadGame() {
                const save = localStorage.getItem('ch_secrets_save');
                if (save) { 
                    this.state = JSON.parse(save); 
                    this.begin(); 
                } else { 
                    alert("NO SOUL FOUND IN THE VOID"); 
                }
            }

            takeAction(a) {
                if (a.move) {
                    this.state.dist--;
                    this.state.sanity = Math.max(0, this.state.sanity - 5);
                }
                if (a.recover) {
                    this.state.sanity = Math.min(100, this.state.sanity + a.recover);
                    this.showMessage("You feel a moment of peace...");
                }
                if (a.item && !this.state.inventory.includes(a.item)) {
                    this.state.inventory.push(a.item);
                    this.showMessage("Acquired: " + a.item);
                }
                if (a.target) this.state.location = a.target;
                
                if (a.action === 'distract') { 
                    this.state.dist = 12; 
                    this.showMessage("The Caretaker is distracted... RUN!");
                }
                if (a.action === 'win') { 
                    alert("YOU ESCAPED CHRIS HEPPARD'S NIGHTMARE.\n\nFinal Sanity: " + this.state.sanity + "%\nDistance Traveled: " + (20-this.state.dist) + "m"); 
                    location.reload(); 
                }
                if (a.action === 'examine') {
                    this.showMessage("There's something written under the wallpaper... 'HE IS COMING'");
                    this.state.sanity -= 10;
                }
                if (a.action === 'search') {
                    this.showMessage("You find a child's drawing... of you.");
                    this.state.sanity -= 5;
                }
                if (a.action === 'music') {
                    this.showMessage("The silence is worse than the music...");
                    this.state.sanity -= 10;
                }
                if (a.action === 'sneak') {
                    this.showMessage("He heard you...");
                    this.state.dist -= 3;
                }

                if (this.state.dist <= 0) {
                    document.getElementById('scare-overlay').classList.add('active');
                    setTimeout(() => location.reload(), 2000);
                    return;
                }
                this.updateUI();
            }

            showMessage(msg) {
                const story = document.getElementById('story-text');
                const original = story.innerText;
                story.innerText = msg;
                setTimeout(() => { if(story.innerText === msg) story.innerText = original; }, 2000);
            }

            updateUI() {
                const room = this.rooms[this.state.location];
                document.getElementById('room-title').innerText = room.title;
                document.getElementById('story-text').innerText = room.text;
                document.getElementById('sanity-val').innerText = this.state.sanity;
                document.getElementById('dist-val').innerText = this.state.dist;
                document.getElementById('inv-val').innerText = this.state.inventory.join(', ') || 'None';

                const container = document.getElementById('choices-container');
                container.innerHTML = '';
                room.actions.forEach(a => {
                    if (a.require && !this.state.inventory.includes(a.require)) return;
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = a.text;
                    btn.onclick = () => this.takeAction(a);
                    container.appendChild(btn);
                });
            }
        }
        
        const game = new HorrorEngine();
    
        // Mobile Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.querySelector('.mobile-menu-btn');
            if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

    </script>
</body>
</html>
