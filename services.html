<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICES | CYBERCHRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-bg"></div>
    <div class="particles"></div>

    <nav class="cyber-nav">
        <a href="index.html" class="cyber-logo">CYBERCHRIS</a>
        <div class="cyber-nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html" class="active">Services</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main style="position: relative; z-index: 2; padding-top: 120px; max-width: 1000px; margin: 0 auto; padding-inline: 20px;">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 class="glitch font-orbitron" data-text="UTILITY MODULES" style="color: var(--neon-cyan);">UTILITY MODULES</h1>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
            <div class="glass-panel">
                <h3 class="font-orbitron" style="color: var(--neon-magenta);">GAME DEV</h3>
                <p class="font-mono" style="font-size: 0.85rem; margin-top: 10px;">Custom HTML5/JS game engineering and physics simulation.</p>
            </div>
            <div class="glass-panel">
                <h3 class="font-orbitron" style="color: var(--neon-cyan);">UI/UX DESIGN</h3>
                <p class="font-mono" style="font-size: 0.85rem; margin-top: 10px;">Cyberpunk aesthetics and immersive terminal interfaces.</p>
            </div>
            <div class="glass-panel">
                <h3 class="font-orbitron" style="color: var(--neon-amber);">DATA ARCHIVING</h3>
                <p class="font-mono" style="font-size: 0.85rem; margin-top: 10px;">Secure repository management and web hosting solutions.</p>
            </div>
        </div>
    </main>

    <script>
        function createParticles() {
            const container = document.querySelector('.particles');
            for(let i=0; i<30; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        window.onload = createParticles;
    </script>
</body>
</html>
