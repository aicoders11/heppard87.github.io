<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waka Heppard Arcade | Chris Heppard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5d4; --magenta: #ff00f5; --blue: #3b82f6;
            --dark: #0a0a0f; --panel: rgba(10, 10, 15, 0.95);
            --border: rgba(0, 245, 212, 0.3); --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.5);
            --font-main: 'Rajdhani', sans-serif; --font-mono: 'Share Tech Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main); background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0; overflow-x: hidden; min-height: 100vh;
        }
        
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .bg-animation span {
            position: absolute; display: block; width: 20px; height: 20px;
            background: rgba(255,255,255,0.03); animation: float 25s infinite linear;
            border-radius: 50%;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 1000; backdrop-filter: blur(15px);
        }
        .logo {
            font-family: var(--font-display); font-size: 1.3rem; font-weight: 900;
            background: linear-gradient(45deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a {
            color: #888; text-decoration: none; font-family: var(--font-mono);
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--cyan); }
        
        .main-header {
            text-align: center; padding: 120px 20px 50px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0,245,212,0.3);
        }
        .logo-main {
            font-family: var(--font-display); font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--cyan), var(--magenta), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,245,212,0.3); letter-spacing: 3px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0,245,212,0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(255,0,245,0.3)); }
        }
        .subtitle { color: #888; margin-top: 15px; font-size: 1.1rem; letter-spacing: 5px; font-family: var(--font-mono); }

        .menu-container { max-width: 1600px; margin: 50px auto; padding: 20px; }
        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .game-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 30px 20px; text-align: center; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .game-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,245,212,0.1) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s;
        }
        .game-card:hover::before { opacity: 1; }
        .game-card:hover {
            transform: translateY(-10px) scale(1.02); background: rgba(255,255,255,0.06);
            border-color: var(--cyan); box-shadow: 0 20px 40px rgba(0,0,0,0.4), var(--glow-cyan);
        }
        .game-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; transition: transform 0.3s; }
        .game-card:hover .game-icon { transform: scale(1.2) rotate(5deg); }
        .game-title {
            font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
            color: #fff; margin-bottom: 8px; letter-spacing: 1px;
        }
        .game-desc { font-size: 0.85rem; color: #888; line-height: 1.4; }
        .author-tag {
            display: inline-block; margin-top: 15px; padding: 5px 15px;
            background: linear-gradient(45deg, var(--cyan), var(--blue));
            border-radius: 20px; font-size: 0.65rem; font-weight: bold;
            letter-spacing: 1px; font-family: var(--font-mono);
        }

        .game-area {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 10000; flex-direction: column;
        }
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0,245,212,0.3);
        }
        .game-info { display: flex; align-items: center; gap: 30px; }
        .game-title-display {
            font-family: var(--font-display); font-size: 1.6rem;
            color: var(--cyan); text-shadow: var(--glow-cyan);
        }
        .score-box {
            background: rgba(0,245,212,0.1); padding: 10px 25px;
            border-radius: 30px; border: 2px solid var(--cyan);
            font-family: var(--font-display); font-size: 1.2rem; color: #fff;
        }
        .back-btn {
            background: linear-gradient(45deg, var(--cyan), var(--blue)); border: none;
            color: var(--dark); padding: 12px 30px; border-radius: 30px; cursor: pointer;
            font-family: var(--font-display); font-weight: bold; font-size: 0.9rem;
            transition: all 0.3s;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan); }
        .game-canvas-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; position: relative;
        }
        canvas { border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); background: #000; }
        .controls-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 12px 35px; border-radius: 30px;
            font-size: 0.9rem; color: #888; border: 1px solid rgba(255,255,255,0.1);
            font-family: var(--font-mono);
        }

        .footer {
            text-align: center; padding: 40px; color: #555; font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1); margin-top: 50px;
        }
        .footer strong { color: var(--cyan); font-family: var(--font-display); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .game-card { padding: 20px 15px; }
            .game-icon { font-size: 2.5rem; }
            .game-title { font-size: 0.9rem; }
        }
    
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00f5d4;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px; left: 0; width: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 245, 212, 0.3);
            backdrop-filter: blur(15px);
            z-index: 999;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #888;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            transition: all 0.3s;
        }
        .mobile-menu a:hover {
            color: #00f5d4;
            padding-left: 10px;
        }
        @media (max-width: 1024px) {
            .cyber-nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }

        /* Footer */
        .cyber-footer {
            border-top: 1px solid rgba(0, 245, 212, 0.3);
            text-align: center;
        }
        .cyber-footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .cyber-footer-links a {
            color: #666;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .cyber-footer-links a:hover { color: #00f5d4; }
        .cyber-footer-text {
            font-family: 'Share Tech Mono', monospace;
            color: #555;
        }

    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <nav>
        <a href="index.html" class="logo">CYBERSOLUTIONSOHIO</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="arcade.html">Arcade</a>
        </div>
    </nav>

    <div class="main-header">
        <h1 class="logo-main">WAKA HEPPARD</h1>
        <p class="subtitle">CLASSIC ARCADE COLLECTION</p>
    </div>

    <div class="menu-container" id="menu">
        <div class="game-grid" id="gameGrid"></div>
    </div>

    <div class="game-area" id="gameArea">
        <div class="game-header">
            <div class="game-info">
                <div class="game-title-display" id="gameTitle">Game Title</div>
                <div class="score-box">Score: <span id="score">0</span></div>
            </div>
            <button class="back-btn" onclick="backToMenu()">BACK TO ARCADE</button>
        </div>
        <div class="game-canvas-container" id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div class="controls-hint" id="controlsHint">Use Arrow Keys to Play</div>
        </div>
    </div>

    <div class="footer">
        <p>2024 <strong>WAKA HEPPARD</strong> Arcade | All Rights Reserved</p>
        <p style="margin-top: 10px; font-size: 0.8rem;">Created with passion by Chris Heppard</p>
    </div>

    <script>
        // Background Animation
        const bgAnim = document.getElementById('bgAnimation');
        for (let i = 0; i < 50; i++) {
            const span = document.createElement('span');
            span.style.left = Math.random() * 100 + '%';
            span.style.animationDelay = Math.random() * 25 + 's';
            span.style.width = Math.random() * 30 + 10 + 'px';
            span.style.height = span.style.width;
            bgAnim.appendChild(span);
        }

        // Game Data - 25 Games
        const games = [
            { id: 'ocean', name: "Heppard's Ocean", icon: '🐋', desc: 'Eat smaller fish to grow bigger', author: 'CHRIS' },
            { id: 'mystery', name: "Mr Heppard's Mystery", icon: '🔐', desc: 'Solve puzzles to escape the room', author: 'HEPPARD' },
            { id: 'cafe', name: "Chris's Cafe", icon: '🍽️', desc: 'Serve hungry animal customers', author: 'MR H' },
            { id: 'snack', name: "Heppard's Snack Time", icon: '🍪', desc: 'Catch falling treats for animals', author: 'CHRIS' },
            { id: 'snake', name: 'Heppard Snake X', icon: '🐍', desc: 'Classic snake with neon graphics', author: 'HEPPARD' },
            { id: 'space', name: 'Chris Space Defender', icon: '🚀', desc: 'Blast alien invaders', author: 'MR H' },
            { id: 'jump', name: 'Heppard Jump', icon: '🏃', desc: 'Jump through challenging levels', author: 'CHRIS' },
            { id: 'memory', name: "Mr H's Memory", icon: '🧠', desc: 'Match pairs of cards', author: 'HEPPARD' },
            { id: 'defense', name: 'Heppard Defense', icon: '🏰', desc: 'Defend against waves of enemies', author: 'CHRIS' },
            { id: 'racer', name: 'Chris Speed Racer', icon: '🏎️', desc: 'High-speed racing action', author: 'MR H' },
            { id: 'bubbles', name: 'Heppard Bubbles', icon: '🔮', desc: 'Shoot and match colored bubbles', author: 'HEPPARD' },
            { id: 'whack', name: 'Whack-a-Heppard', icon: '🔨', desc: 'Catch the moles quickly', author: 'CHRIS' },
            { id: 'fly', name: 'Heppard Fly', icon: '🐦', desc: 'Navigate through pipes', author: 'MR H' },
            { id: 'breakout', name: 'Chris Breakout', icon: '🧱', desc: 'Destroy all bricks', author: 'HEPPARD' },
            { id: 'blocks', name: 'Heppard Blocks', icon: '🎲', desc: 'Classic block stacking', author: 'CHRIS' },
            { id: 'puzzle2048', name: '2048 Heppard', icon: '🔢', desc: 'Merge numbers to reach 2048', author: 'MR H' },
            { id: 'sudoku', name: 'Heppard Sudoku', icon: '📝', desc: 'Solve the number puzzle', author: 'CHRIS' },
            { id: 'tictactoe', name: 'Tic Tac H', icon: '⭕', desc: 'Get three in a row', author: 'HEPPARD' },
            { id: 'pong', name: 'Heppard Pong', icon: '🏓', desc: 'Classic table tennis', author: 'CHRIS' },
            { id: 'clicker', name: 'Chris Clicker', icon: '👆', desc: 'Click to earn points', author: 'MR H' },
            { id: 'maze', name: 'Heppard Maze', icon: '🌀', desc: 'Find the exit in time', author: 'HEPPARD' },
            { id: 'doodle', name: 'Doodle Chris', icon: '🦘', desc: 'Jump higher and higher', author: 'CHRIS' },
            { id: 'slice', name: 'Heppard Slice', icon: '🥷', desc: 'Slice the fruits', author: 'MR H' },
            { id: 'beats', name: 'Chris Beats', icon: '🎵', desc: 'Tap to the rhythm', author: 'HEPPARD' },
            { id: 'quiz', name: 'Heppard Quiz', icon: '❓', desc: 'Test your knowledge', author: 'CHRIS' }
        ];

        // Create Menu
        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => startGame(game.id, game.name);
            card.innerHTML = `
                <span class="game-icon">${game.icon}</span>
                <div class="game-title">${game.name}</div>
                <div class="game-desc">${game.desc}</div>
                <div class="author-tag">${game.author}'S GAME</div>
            `;
            grid.appendChild(card);
        });

        let currentGame = null, score = 0, animationId = null;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = Math.min(900, container.clientWidth - 40);
            canvas.height = Math.min(650, window.innerHeight - 200);
        }

        function startGame(gameId, gameName) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('gameTitle').textContent = gameName;
            resizeCanvas(); score = 0; updateScore();
            if (animationId) cancelAnimationFrame(animationId);
            
            switch(gameId) {
                case 'ocean': initOcean(); break;
                case 'mystery': initMystery(); break;
                case 'cafe': initCafe(); break;
                case 'snack': initSnack(); break;
                case 'snake': initSnake(); break;
                case 'space': initSpace(); break;
                case 'jump': initJump(); break;
                case 'memory': initMemory(); break;
                case 'defense': initDefense(); break;
                case 'racer': initRacer(); break;
                case 'bubbles': initBubbles(); break;
                case 'whack': initWhack(); break;
                case 'fly': initFly(); break;
                case 'breakout': initBreakout(); break;
                case 'blocks': initBlocks(); break;
                case 'puzzle2048': init2048(); break;
                case 'sudoku': initSudoku(); break;
                case 'tictactoe': initTicTacToe(); break;
                case 'pong': initPong(); break;
                case 'clicker': initClicker(); break;
                case 'maze': initMaze(); break;
                case 'doodle': initDoodle(); break;
                case 'slice': initSlice(); break;
                case 'beats': initBeats(); break;
                case 'quiz': initQuiz(); break;
            }
        }

        function backToMenu() {
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            currentGame = null;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // Game Implementations (simplified versions)
        function initOcean() {
            document.getElementById('controlsHint').textContent = 'Arrow Keys to Swim | Eat smaller fish';
            let player = { x: canvas.width/2, y: canvas.height/2, size: 25, speed: 5 };
            let fishes = [], keys = {};
            for (let i = 0; i < 20; i++) fishes.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                size: Math.random()*30+10, speedX: (Math.random()-0.5)*3, speedY: (Math.random()-0.5)*3,
                color: `hsl(${Math.random()*60+180},80%,60%)`
            });
            document.onkeydown = (e) => keys[e.key] = true;
            document.onkeyup = (e) => keys[e.key] = false;
            function gameLoop() {
                const grad = ctx.createLinearGradient(0,0,0,canvas.height);
                grad.addColorStop(0,'#0066cc'); grad.addColorStop(1,'#001a33');
                ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);
                if(keys['ArrowUp']) player.y -= player.speed;
                if(keys['ArrowDown']) player.y += player.speed;
                if(keys['ArrowLeft']) player.x -= player.speed;
                if(keys['ArrowRight']) player.x += player.speed;
                player.x = Math.max(player.size, Math.min(canvas.width-player.size, player.x));
                player.y = Math.max(player.size, Math.min(canvas.height-player.size, player.y));
                ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
                fishes.forEach((fish, i) => {
                    fish.x += fish.speedX; fish.y += fish.speedY;
                    if(fish.x<-50) fish.x=canvas.width+50; if(fish.x>canvas.width+50) fish.x=-50;
                    if(fish.y<-50) fish.y=canvas.height+50; if(fish.y>canvas.height+50) fish.y=-50;
                    const dist = Math.hypot(player.x-fish.x, player.y-fish.y);
                    if(dist < player.size+fish.size) {
                        if(player.size > fish.size) { player.size += fish.size*0.08; score += Math.floor(fish.size); updateScore(); fishes.splice(i,1); fishes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*30+10,speedX:(Math.random()-0.5)*3,speedY:(Math.random()-0.5)*3,color:`hsl(${Math.random()*60+180},80%,60%)`}); }
                        else { alert('Game Over! Eaten! Score: '+score); backToMenu(); return; }
                    }
                    ctx.fillStyle = fish.color; ctx.beginPath(); ctx.arc(fish.x,fish.y,fish.size,0,Math.PI*2); ctx.fill();
                });
                animationId = requestAnimationFrame(gameLoop);
            }
            gameLoop();
        }

        function initMystery() {
            document.getElementById('controlsHint').textContent = 'Click objects to inspect | Find the key';
            let hasKey = false, keyLocation = Math.floor(Math.random()*5);
            let message = 'Find the hidden key to escape!';
            let objects = [
                {x: canvas.width*0.15, y: canvas.height*0.3, icon: '📦', name: 'chest', id: 0},
                {x: canvas.width*0.4, y: canvas.height*0.2, icon: '🖼️', name: 'painting', id: 1},
                {x: canvas.width*0.65, y: canvas.height*0.35, icon: '🪴', name: 'plant', id: 2},
                {x: canvas.width*0.8, y: canvas.height*0.6, icon: '🚪', name: 'door', id: 'door'},
                {x: canvas.width*0.08, y: canvas.height*0.6, icon: '📚', name: 'books', id: 3},
                {x: canvas.width*0.45, y: canvas.height*0.55, icon: '🛋️', name: 'sofa', id: 4}
            ];
            function draw() {
                ctx.fillStyle = '#2c2416'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font = '60px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                objects.forEach(obj => { ctx.fillText(obj.icon, obj.x, obj.y); });
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(50, canvas.height-100, canvas.width-100, 60);
                ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 2; ctx.strokeRect(50, canvas.height-100, canvas.width-100, 60);
                ctx.fillStyle = 'white'; ctx.font = '18px Rajdhani'; ctx.textAlign = 'center';
                ctx.fillText(message, canvas.width/2, canvas.height-70);
                animationId = requestAnimationFrame(draw);
            }
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                objects.forEach(obj => {
                    const dist = Math.hypot(x-obj.x, y-obj.y);
                    if(dist < 50) {
                        if(obj.id === 'door') { if(hasKey) { score += 100; updateScore(); alert('Escaped! Score: '+score); backToMenu(); } else message = 'The door is locked. Find the key!'; }
                        else if(obj.id === keyLocation && !hasKey) { hasKey = true; message = 'Found the key in the '+obj.name+'!'; }
                        else if(!hasKey) message = 'Nothing in the '+obj.name+'. Keep searching!';
                    }
                });
            };
            draw();
        }

        function initCafe() {
            document.getElementById('controlsHint').textContent = 'Click the correct food to serve';
            const foods = [{icon:'🍔',name:'Burger'},{icon:'🍕',name:'Pizza'},{icon:'🍣',name:'Sushi'},{icon:'🥗',name:'Salad'},{icon:'🍰',name:'Cake'},{icon:'🍩',name:'Donut'}];
            let customer = {animal:'🐰',want:foods[0],patience:100}, lastTime=Date.now();
            const animals = ['🐰','🐻','🐼','🐨','🐯','🦁','🐷','🐸'];
            function spawnCustomer() { customer = {animal:animals[Math.floor(Math.random()*animals.length)],want:foods[Math.floor(Math.random()*foods.length)],patience:100}; }
            spawnCustomer();
            function draw() {
                const grad = ctx.createLinearGradient(0,0,0,canvas.height);
                grad.addColorStop(0,'#ffeaa7'); grad.addColorStop(1,'#fdcb6e');
                ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.fillText(customer.animal, canvas.width/2, canvas.height/3);
                ctx.fillStyle = '#333'; ctx.fillRect(canvas.width/2-60, canvas.height/3+20, 120, 15);

                for(let r=0; r<rows; r++) for(let c=0; c<cols; c++) if(grid[r][c]) { ctx.fillStyle = `hsl(${grid[r][c]*50}, 70%, 50%)`; ctx.fillRect(c*gs+50, r*gs+20, gs-2, gs-2); }
                ctx.fillStyle = `hsl(${current.color*50}, 70%, 50%)`;
                current.shape.forEach((row, dy) => row.forEach((cell, dx) => { if(cell) ctx.fillRect((current.x+dx)*gs+50, (current.y+dy)*gs+20, gs-2, gs-2); }));
                setTimeout(() => {
                    current.y++;
                    if(collision()) { current.y--; lockPiece(); clearLines(); current = {shape: pieces[Math.floor(Math.random()*pieces.length)], x: 4, y: 0, color: Math.floor(Math.random()*6)+1}; if(collision()) { alert('Game Over! Score: '+score); backToMenu(); return; } }
                    animationId = requestAnimationFrame(draw);
                }, 500);
            }
            function collision() { return current.shape.some((row, dy) => row.some((cell, dx) => cell && (current.y+dy >= rows || current.x+dx < 0 || current.x+dx >= cols || grid[current.y+dy]?.[current.x+dx]))); }
            function lockPiece() { current.shape.forEach((row, dy) => row.forEach((cell, dx) => { if(cell) grid[current.y+dy][current.x+dx] = current.color; })); }
            function clearLines() { for(let r=rows-1; r>=0; r--) if(grid[r].every(c => c)) { grid.splice(r, 1); grid.unshift(Array(cols).fill(0)); score += 100; updateScore(); r++; } }
            document.onkeydown = (e) => {
                if(e.key === 'ArrowLeft') { current.x--; if(collision()) current.x++; }
                if(e.key === 'ArrowRight') { current.x++; if(collision()) current.x--; }
                if(e.key === 'ArrowUp') { const rotated = current.shape[0].map((_, i) => current.shape.map(r => r[i]).reverse()); const old = current.shape; current.shape = rotated; if(collision()) current.shape = old; }
                if(e.key === 'ArrowDown') { current.y++; if(collision()) current.y--; }
            };
            draw();
        }

        function init2048() {
            document.getElementById('controlsHint').textContent = 'Arrows to move tiles';
            let grid = Array(4).fill(null).map(() => Array(4).fill(0));
            function addTile() { const empty = []; for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(!grid[r][c]) empty.push({r,c}); if(empty.length) { const {r,c} = empty[Math.floor(Math.random()*empty.length)]; grid[r][c] = Math.random()<0.9?2:4; } }
            addTile(); addTile();
            function draw() {
                ctx.fillStyle = '#bbada0'; ctx.fillRect(0,0,canvas.width,canvas.height);
                const ts = 100, gap = 15, startX = (canvas.width - (4*ts+3*gap))/2, startY = (canvas.height - (4*ts+3*gap))/2;
                for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
                    const x = startX+c*(ts+gap), y = startY+r*(ts+gap), val = grid[r][c];
                    ctx.fillStyle = val ? `hsl(${Math.log2(val)*30}, 70%, ${50+Math.log2(val)*3}%)` : '#cdc1b4';
                    ctx.fillRect(x, y, ts, ts);
                    if(val) { ctx.fillStyle = val<8?'#776e65':'#f9f6f2'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center'; ctx.fillText(val, x+ts/2, y+ts/2+12); }
                }
                animationId = requestAnimationFrame(draw);
            }
            document.onkeydown = (e) => {
                let moved = false;
                if(e.key === 'ArrowLeft') moved = moveLeft();
                if(e.key === 'ArrowRight') moved = moveRight();
                if(e.key === 'ArrowUp') moved = moveUp();
                if(e.key === 'ArrowDown') moved = moveDown();
                if(moved) { addTile(); score += 10; updateScore(); }
            };
            function moveLeft() { let moved = false; for(let r=0; r<4; r++) { const row = grid[r].filter(v=>v); for(let i=0; i<row.length-1; i++) if(row[i]===row[i+1]) { row[i]*=2; score+=row[i]; row.splice(i+1,1); } while(row.length<4) row.push(0); if(row.some((v,i)=>v!==grid[r][i])) moved = true; grid[r] = row; } return moved; }
            function moveRight() { let moved = false; for(let r=0; r<4; r++) { const row = grid[r].filter(v=>v).reverse(); for(let i=0; i<row.length-1; i++) if(row[i]===row[i+1]) { row[i]*=2; score+=row[i]; row.splice(i+1,1); } while(row.length<4) row.push(0); row.reverse(); if(row.some((v,i)=>v!==grid[r][i])) moved = true; grid[r] = row; } return moved; }
            function moveUp() { let moved = false; for(let c=0; c<4; c++) { const col = [grid[0][c],grid[1][c],grid[2][c],grid[3][c]].filter(v=>v); for(let i=0; i<col.length-1; i++) if(col[i]===col[i+1]) { col[i]*=2; score+=col[i]; col.splice(i+1,1); } while(col.length<4) col.push(0); col.forEach((v,r)=>{if(v!==grid[r][c])moved=true;grid[r][c]=v;}); } return moved; }
            function moveDown() { let moved = false; for(let c=0; c<4; c++) { const col = [grid[0][c],grid[1][c],grid[2][c],grid[3][c]].filter(v=>v).reverse(); for(let i=0; i<col.length-1; i++) if(col[i]===col[i+1]) { col[i]*=2; score+=col[i]; col.splice(i+1,1); } while(col.length<4) col.push(0); col.reverse().forEach((v,r)=>{if(v!==grid[r][c])moved=true;grid[r][c]=v;}); } return moved; }
            draw();
        }

        function initSudoku() {

        function initTicTacToe() {
            document.getElementById('controlsHint').textContent = 'Click to place X';
            let board = Array(9).fill(''), current = 'X', gameOver = false;
            function draw() {
                ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,canvas.width,canvas.height);
                const cs = 120, startX = (canvas.width-3*cs)/2, startY = (canvas.height-3*cs)/2;
                ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 4;
                for(let i=1; i<3; i++) { ctx.beginPath(); ctx.moveTo(startX+i*cs, startY); ctx.lineTo(startX+i*cs, startY+3*cs); ctx.stroke(); ctx.beginPath(); ctx.moveTo(startX, startY+i*cs); ctx.lineTo(startX+3*cs, startY+i*cs); ctx.stroke(); }
                board.forEach((cell, i) => {
                    const x = startX+(i%3)*cs+cs/2, y = startY+Math.floor(i/3)*cs+cs/2;
                    if(cell === 'X') { ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(x-30, y-30); ctx.lineTo(x+30, y+30); ctx.moveTo(x+30, y-30); ctx.lineTo(x-30, y+30); ctx.stroke(); }
                    else if(cell === 'O') { ctx.strokeStyle = '#ff00f5'; ctx.lineWidth = 8; ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI*2); ctx.stroke(); }
                });
                animationId = requestAnimationFrame(draw);
            }
            canvas.onclick = (e) => {
                if(gameOver) return;
                const rect = canvas.getBoundingClientRect();
                const cs = 120, startX = (canvas.width-3*cs)/2, startY = (canvas.height-3*cs)/2;
                const c = Math.floor((e.clientX-rect.left-startX)/cs), r = Math.floor((e.clientY-rect.top-startY)/cs);
                const i = r*3+c;
                if(i>=0 && i<9 && !board[i]) {
                    board[i] = current;
                    if(checkWin(current)) { score += current==='X'?100:0; updateScore(); setTimeout(()=>{alert(current+' wins!');backToMenu();},100); gameOver=true; return; }
                    if(board.every(c=>c)) { setTimeout(()=>{alert('Draw!');backToMenu();},100); gameOver=true; return; }
                    current = current==='X'?'O':'X';
                    if(current==='O') { setTimeout(()=>{const empty=board.map((c,i)=>c?-1:i).filter(i=>i!==-1); if(empty.length) { const move=empty[Math.floor(Math.random()*empty.length)]; board[move]='O'; if(checkWin('O')) { setTimeout(()=>{alert('O wins!');backToMenu();},100); gameOver=true; return; } current='X'; } },500); }
                }
            };
            function checkWin(p) { const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return wins.some(w=>w.every(i=>board[i]===p)); }
            draw();
        }

        function initPong() {

                ctx.fillStyle = '#00f5d4'; ctx.fillRect(20, paddleY-40, 15, 80);

        function initMaze() {
            document.getElementById('controlsHint').textContent = 'Arrows to navigate';
            let maze = [], player = {x: 1, y: 1}, exit = {x: 19, y: 19}, cs = 25, keys = {};
            for(let y=0; y<21; y++) { maze[y] = []; for(let x=0; x<21; x++) maze[y][x] = (x%2===0 || y%2===0) ? 1 : 0; }
            function carve(x, y) { const dirs = [[0,-2],[2,0],[0,2],[-2,0]].sort(()=>Math.random()-0.5); dirs.forEach(([dx,dy])=>{const nx=x+dx, ny=y+dy; if(nx>0 && nx<20 && ny>0 && ny<20 && maze[ny][nx]){maze[ny][nx]=0; maze[y+dy/2][x+dx/2]=0; carve(nx,ny);}}); }
            carve(1, 1);
            document.onkeydown = (e) => {
                if(e.key==='ArrowUp' && !maze[player.y-1][player.x]) player.y--;
                if(e.key==='ArrowDown' && !maze[player.y+1][player.x]) player.y++;
                if(e.key==='ArrowLeft' && !maze[player.y][player.x-1]) player.x--;
                if(e.key==='ArrowRight' && !maze[player.y][player.x+1]) player.x++;
                if(player.x===exit.x && player.y===exit.y) { alert('Escaped! Score: '+score); backToMenu(); }
            };
            function gameLoop() {
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
                const startX = (canvas.width-21*cs)/2, startY = (canvas.height-21*cs)/2;
                for(let y=0; y<21; y++) for(let x=0; x<21; x++) {
                    if(maze[y][x]) { ctx.fillStyle = '#00f5d4'; ctx.fillRect(startX+x*cs, startY+y*cs, cs, cs); }
                }
                ctx.fillStyle = '#ff00f5'; ctx.fillRect(startX+exit.x*cs+2, startY+exit.y*cs+2, cs-4, cs-4);
                ctx.fillStyle = '#feca57'; ctx.beginPath(); ctx.arc(startX+player.x*cs+cs/2, startY+player.y*cs+cs/2, cs/3, 0, Math.PI*2); ctx.fill();
                animationId = requestAnimationFrame(gameLoop);
            }
            gameLoop();
        }

        // Mobile Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.querySelector('.mobile-menu-btn');
            if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

    </script>
</body>
</html>
