            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left - 50) / 50);
                const y = Math.floor((e.clientY - rect.top - 50) / 50);
                if (x >= 0 && x < 9 && y >= 0 && y < 9) selected = { x, y };
            };
            
            document.onkeydown = (e) => {
                if (selected && e.key >= '1' && e.key <= '9') {
                    grid[selected.y][selected.x] = parseInt(e.key);
                    score += 10;
                    updateScore();
                }
            };
            
            function draw() {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const cellSize = 50;
                
                // Grid
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                
                for (let i = 0; i <= 9; i++) {
                    ctx.lineWidth = i % 3 === 0 ? 3 : 1;
                    ctx.beginPath();
                    ctx.moveTo(50 + i * cellSize, 50);
                    ctx.lineTo(50 + i * cellSize, 500);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(50, 50 + i * cellSize);
                    ctx.lineTo(500, 50 + i * cellSize);
                    ctx.stroke();
                }
                
                // Numbers
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                grid.forEach((row, y) => {
                    row.forEach((cell, x) => {
                        if (selected && selected.x === x && selected.y === y) {
                            ctx.fillStyle = '#bbdefb';
                            ctx.fillRect(50 + x * cellSize, 50 + y * cellSize, cellSize, cellSize);
                        }
                        if (cell) {
                            ctx.fillStyle = '#000';
                            ctx.fillText(cell, 50 + x * cellSize + cellSize/2, 50 + y * cellSize + cellSize/2);
                        }
                    });
                });
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        // Game 18: Tic Tac Toe
        function initTicTacToe() {
            document.getElementById('controlsHint').textContent = 'Click to place X | Computer plays O';
            
            let board = Array(9).fill('');
            let player = 'X';
            
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left - 200) / 133);
                const y = Math.floor((e.clientY - rect.top - 100) / 133);
                const idx = y * 3 + x;
                
                if (board[idx] === '' && player === 'X') {
                    board[idx] = 'X';
                    if (checkWin('X')) {
                        score += 100;
                        updateScore();
                        setTimeout(() => {
                            alert('You win!');
                            backToMenu();
                        }, 100);
                    } else if (!board.includes('')) {
                        setTimeout(() => {
                            alert('Draw!');
                            backToMenu();
                        }, 100);
                    } else {
                        player = 'O';
                        setTimeout(computerMove, 500);
                    }
                }
            };
            
            function computerMove() {
                let empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
                let move = empty[Math.floor(Math.random() * empty.length)];
                board[move] = 'O';
                
                if (checkWin('O')) {
                    setTimeout(() => {
                        alert('Computer wins!');
                        backToMenu();
                    }, 100);
                } else {
                    player = 'X';
                }
            }
            
            function checkWin(p) {
                const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                return wins.some(w => w.every(i => board[i] === p));
            }
            
            function draw() {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 5;
                
                // Grid
                for (let i = 1; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(200 + i * 133, 100);
                    ctx.lineTo(200 + i * 133, 500);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(200, 100 + i * 133);
                    ctx.lineTo(600, 100 + i * 133);
                    ctx.stroke();
                }
                
                // Marks
                ctx.font = '80px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                board.forEach((cell, i) => {
                    const x = i % 3;
                    const y = Math.floor(i / 3);
                    if (cell) {
                        ctx.fillStyle = cell === 'X' ? '#0984e3' : '#e84393';
                        ctx.fillText(cell, 200 + x * 133 + 66, 100 + y * 133 + 66);
                    }
                });
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        // Game 19: Pong
        function initPong() {
            document.getElementById('controlsHint').textContent = 'Mouse to move paddle';
            
            let paddleY = canvas.height/2;
            let ball = { x: canvas.width/2, y: canvas.height/2, dx: 5, dy: 5 };
            let computerY = canvas.height/2;
            
            canvas.onmousemove = (e) => {
                const rect = canvas.getBoundingClientRect();
                paddleY = e.clientY - rect.top;
            };
            
            function gameLoop() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Center line
                ctx.strokeStyle = '#fff';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(canvas.width/2, 0);
                ctx.lineTo(canvas.width/2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Paddles
                ctx.fillStyle = '#fff';
                ctx.fillRect(20, paddleY - 50, 10, 100);
                ctx.fillRect(canvas.width - 30, computerY - 50, 10, 100);
                
                // Ball
                ball.x += ball.dx;
                ball.y += ball.dy;
                
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Walls
                if (ball.y < 10 || ball.y > canvas.height - 10) ball.dy *= -1;
                
                // Paddle collision
                if (ball.x < 40 && ball.y > paddleY - 50 && ball.y < paddleY + 50) {
                    ball.dx = Math.abs(ball.dx) * 1.1;
                    score += 10;
                    updateScore();
                }
                if (ball.x > canvas.width - 40 && ball.y > computerY - 50 && ball.y < computerY + 50) {
                    ball.dx = -Math.abs(ball.dx) * 1.1;
                }
                
                // Computer AI
                computerY += (ball.y - computerY) * 0.1;
                
                // Score/Reset
                if (ball.x < 0 || ball.x > canvas.width) {
                    ball.x = canvas.width/2;
                    ball.y = canvas.height/2;
                    ball.dx = ball.x < 0 ? -5 : 5;
                }
                
                animationId = requestAnimationFrame(gameLoop);
            }
            
            gameLoop();
        }

        // Game 20: Clicker
        function initClicker() {
            document.getElementById('controlsHint').textContent = 'Click the button to earn points | Buy upgrades';
            
            let clicks = 0;
            let autoClickers = 0;
            let multiplier = 1;
            
            function draw() {
                ctx.fillStyle = '#2d3436';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Main button
                const btnX = canvas.width/2;
                const btnY = 200;
                const btnRadius = 80;
                
                const grad = ctx.createRadialGradient(btnX, btnY, 0, btnX, btnY, btnRadius);
                grad.addColorStop(0, '#ff6b6b');
                grad.addColorStop(1, '#c0392b');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(btnX, btnY, btnRadius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('CLICK!', btnX, btnY);
                ctx.font = '18px Arial';
                ctx.fillText('+' + multiplier, btnX, btn.y + 30);
                
                // Stats
                ctx.font = '30px Arial';
                ctx.fillText('Points: ' + Math.floor(score), canvas.width/2, 100);
                
                // Upgrades
                ctx.fillStyle = '#0984e3';
                ctx.fillRect(100, 350, 200, 60);
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.fillText('Auto Clicker', 200, 380);
                ctx.fillText('Cost: 50', 200, 405);
                ctx.fillText('Owned: ' + autoClickers, 200, 430);
                
                ctx.fillStyle = '#00b894';
                ctx.fillRect(500, 350, 200, 60);
                ctx.fillStyle = 'white';
                ctx.fillText('Multiplier x2', 600, 380);
                ctx.fillText('Cost: 200', 600, 405);
                
                animationId = requestAnimationFrame(draw);
            }
            
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Main button
                if (Math.hypot(x - canvas.width/2, y - 200) < 80) {
                    score += multiplier;
                    updateScore();
                    createParticles(x, y, '#ff6b6b');
                }
                
                // Auto clicker
                if (x > 100 && x < 300 && y > 350 && y < 410 && score >= 50) {
                    score -= 50;
                    autoClickers++;
                    updateScore();
                }
                
                // Multiplier
                if (x > 500 && x < 700 && y > 350 && y < 410 && score >= 200) {
                    score -= 200;
                    multiplier *= 2;
                    updateScore();
                }
            };
            
            setInterval(() => {
                if (autoClickers) {
                    score += autoClickers;
                    updateScore();
                }
            }, 1000);
            
            draw();
        }

        // Game 21: Maze
        function initMaze() {
            document.getElementById('controlsHint').textContent = 'Arrow keys to navigate to the green exit';
            
            const cols = 15;
            const rows = 15;
            const cellSize = 40;
            let maze = [];
            let player = { x: 0, y: 0 };
            let exit = { x: cols-1, y: rows-1 };
            
            // Generate simple maze
            for (let y = 0; y < rows; y++) {
                maze[y] = [];
                for (let x = 0; x < cols; x++) {
                    maze[y][x] = Math.random() > 0.7 && !(x === 0 && y === 0) && !(x === cols-1 && y === rows-1) ? 1 : 0;
                }
            }
            
            document.onkeydown = (e) => {
                let nx = player.x;
                let ny = player.y;
                
                if (e.key === 'ArrowUp') ny--;
                if (e.key === 'ArrowDown') ny++;
                if (e.key === 'ArrowLeft') nx--;
                if (e.key === 'ArrowRight') nx++;
                
                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !maze[ny][nx]) {
                    player.x = nx;
                    player.y = ny;
                    
                    if (player.x === exit.x && player.y === exit.y) {
                        score += 500;
                        updateScore();
                        alert('You escaped the maze! Score: ' + score);
                        backToMenu();
                    }
                }
            };
            
            function draw() {
                ctx.fillStyle = '#2d3436';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const offsetX = (canvas.width - cols * cellSize) / 2;
                const offsetY = (canvas.height - rows * cellSize) / 2;
                
                maze.forEach((row, y) => {
                    row.forEach((cell, x) => {
                        if (cell) {
                            ctx.fillStyle = '#636e72';
                            ctx.fillRect(offsetX + x * cellSize, offsetY + y * cellSize, cellSize, cellSize);
                        } else {
                            ctx.fillStyle = '#dfe6e9';
                            ctx.fillRect(offsetX + x * cellSize, offsetY + y * cellSize, cellSize - 2, cellSize - 2);
                        }
                    });
                });
                
                // Exit
                ctx.fillStyle = '#00b894';
                ctx.fillRect(offsetX + exit.x * cellSize, offsetY + exit.y * cellSize, cellSize - 2, cellSize - 2);
                
                // Player
                ctx.fillStyle = '#e84393';
                ctx.beginPath();
                ctx.arc(offsetX + player.x * cellSize + cellSize/2, offsetY + player.y * cellSize + cellSize/2, cellSize/3, 0, Math.PI * 2);
                ctx.fill();
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        // Game 22: Doodle Jump
        function initDoodle() {
            document.getElementById('controlsHint').textContent = 'Arrow keys to move | Auto jump on platforms';
            
            let player = { x: canvas.width/2, y: canvas.height/2, vy: 0 };
            let platforms = [];
            let camera = 0;
            
            for (let i = 0; i < 10; i++) {
                platforms.push({
                    x: Math.random() * (canvas.width - 80),
                    y: canvas.height - i * 80,
                    w: 80,
                    h: 15
                });
            }
            
            document.onkeydown = (e) => {
                if (e.key === 'ArrowLeft') player.x -= 5;
                if (e.key === 'ArrowRight') player.x += 5;
            };
            
            function gameLoop() {
                // Sky gradient
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#74b9ff');
                grad.addColorStop(1, '#81ecec');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Physics
                player.vy += 0.5;
                player.y += player.vy;
                
                // Platform collision
                platforms.forEach(plat => {
                    if (player.vy > 0 &&
                        player.x > plat.x - 20 && player.x < plat.x + plat.w + 20 &&
                        player.y > plat.y - 30 && player.y < plat.y + 10) {
                        player.vy = -12;
                    }
                });
                
                // Move up
                if (player.y < canvas.height/2) {
                    camera = canvas.height/2 - player.y;
                    player.y = canvas.height/2;
                    platforms.forEach(p => {
                        p.y += camera;
                        if (p.y > canvas.height) {
                            p.y = 0;
                            p.x = Math.random() * (canvas.width - 80);
                            score += 10;
                            updateScore();
                        }
                    });
                }
                
                // Draw platforms
                ctx.fillStyle = '#00b894';
                platforms.forEach(plat => {
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.fillStyle = '#00a383';
                    ctx.fillRect(plat.x, plat.y, plat.w, 5);
                    ctx.fillStyle = '#00b894';
                });
                
                // Draw player
                ctx.fillStyle = '#e84393';
                ctx.fillRect(player.x - 20, player.y - 40, 40, 40);
                
                // Face
                ctx.fillStyle = 'white';
                ctx.fillRect(player.x - 15, player.y - 35, 10, 10);
                ctx.fillRect(player.x + 5, player.y - 35, 10, 10);
                
                if (player.y > canvas.height) {
                    alert('Game Over! Score: ' + score);
                    backToMenu();
                }
                
                animationId = requestAnimationFrame(gameLoop);
            }
            
            gameLoop();
        }

        // Game 23: Fruit Ninja
        function initFruitNinja() {
            document.getElementById('controlsHint').textContent = 'Slice the fruits! Avoid bombs';
            
            let fruits = [];
            let particles = [];
            let lastSpawn = 0;
            
            function spawnFruit() {
                const isBomb = Math.random() < 0.2;
                fruits.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + 50,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 10 - 10,
                    emoji: isBomb ? '💣' : ['🍎', '🍊', '🍋', '🍉', '🍇'][Math.floor(Math.random() * 5)],
                    isBomb: isBomb,
                    rotation: 0
                });
            }
            
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                fruits.forEach((fruit, i) => {
                    if (Math.hypot(x - fruit.x, y - fruit.y) < 40) {
                        if (fruit.isBomb) {
                            alert('Boom! Game Over! Score: ' + score);
                            backToMenu();
                        } else {
                            score += 10;
                            updateScore();
                            createParticles(fruit.x, fruit.y, '#ff6b6b');
                            fruits.splice(i, 1);
                        }
                    }
                });
            };
            
            function gameLoop() {
                // Background
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Spawn
                if (Date.now() - lastSpawn > 1000) {
                    spawnFruit();
                    lastSpawn = Date.now();
                }
                
                // Update fruits
                fruits.forEach((fruit, i) => {
                    fruit.x += fruit.vx;
                    fruit.y += fruit.vy;
                    fruit.vy += 0.3;
                    fruit.rotation += 0.05;
                    
                    ctx.save();
                    ctx.translate(fruit.x, fruit.y);
                    ctx.rotate(fruit.rotation);
                    ctx.font = '50px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(fruit.emoji, 0, 0);
                    ctx.restore();
                    
                    if (fruit.y > canvas.height + 100) fruits.splice(i, 1);
                });
                
                animationId = requestAnimationFrame(gameLoop);
            }
            
            gameLoop();
        }

        // Game 24: Rhythm
        function initRhythm() {
            document.getElementById('controlsHint').textContent = 'Press ASDF when notes hit the line';
            
            let notes = [];
            let keys = { 'a': 100, 's': 250, 'd': 400, 'f': 550 };
            let scoreAdd = 0;
            
            function spawnNote() {
                const key = Object.keys(keys)[Math.floor(Math.random() * 4)];
                notes.push({ key: key, y: 0 });
            }
            
            setInterval(spawnNote, 800);
            
            document.onkeydown = (e) => {
                const key = e.key.toLowerCase();
                if (keys[key]) {
                    notes.forEach((note, i) => {
                        if (note.key === key && Math.abs(note.y - 400) < 50) {
                            score += Math.floor(50 - Math.abs(note.y - 400));
                            updateScore();
                            notes.splice(i, 1);
                            scoreAdd = 20;
                        }
                    });
                }
            };
            
            function gameLoop() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Tracks
                Object.keys(keys).forEach(key => {
                    ctx.fillStyle = '#2d3436';
                    ctx.fillRect(keys[key] - 50, 0, 100, canvas.height);
                    
                    // Hit line
                    ctx.fillStyle = scoreAdd > 0 ? '#00b894' : '#dfe6e9';
                    ctx.fillRect(keys[key] - 50, 400, 100, 10);
                    
                    // Key label
                    ctx.fillStyle = 'white';
                    ctx.font = '30px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(key.toUpperCase(), keys[key], 450);
                });
                
                if (scoreAdd > 0) scoreAdd--;
                
                // Notes
                ctx.fillStyle = '#e84393';
                notes.forEach((note, i) => {
                    note.y += 5;
                    ctx.beginPath();
                    ctx.arc(keys[note.key], note.y, 30, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (note.y > canvas.height) notes.splice(i, 1);
                });
                
                animationId = requestAnimationFrame(gameLoop);
            }
            
            gameLoop();
        }

        // Game 25: Quiz
        function initQuiz() {
            document.getElementById('controlsHint').textContent = 'Click the correct answer';
            
            const questions = [
                { q: 'Who created this game collection?', a: ['Chris Heppard', 'Someone else', 'A robot', 'Unknown'], correct: 0 },
                { q: 'What is 2 + 2?', a: ['3', '4', '5', '22'], correct: 1 },
                { q: 'What color is the sky?', a: ['Green', 'Red', 'Blue', 'Yellow'], correct: 2 },
                { q: 'Best programming language?', a: ['Python', 'JavaScript', 'C++', 'All of them'], correct: 3 }
            ];
            
            let current = 0;
            
            function draw() {
                ctx.fillStyle = '#2d3436';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (current >= questions.length) {
                    ctx.fillStyle = '#00b894';
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('Quiz Complete!', canvas.width/2, 200);
                    ctx.fillText('Final Score: ' + score, canvas.width/2, 300);
                    return;
                }
                
                const q = questions[current];
                
                // Question
                ctx.fillStyle = 'white';
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(q.q, canvas.width/2, 150);
                
                // Answers
                q.a.forEach((ans, i) => {
                    const y = 250 + i * 80;
                    ctx.fillStyle = '#0984e3';
                    ctx.fillRect(200, y, 400, 60);
                    ctx.fillStyle = 'white';
                    ctx.font = '24px Arial';
                    ctx.fillText(ans, canvas.width/2, y + 40);
                });
                
                animationId = requestAnimationFrame(draw);
            }
            
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const y = e.clientY - rect.top;
                
                for (let i = 0; i < 4; i++) {
                    if (y > 250 + i * 80 && y < 310 + i * 80) {
                        if (i === questions[current].correct) {
                            score += 100;
                            createParticles(canvas.width/2, 250 + i * 80, '#00b894');
                        } else {
                            score = Math.max(0, score - 50);
                        }
                        updateScore();
                        current++;
                    }
                }
            };
            
            draw();
        }

        // Prevent context menu on canvas
        canvas.addEventListener('contextmenu', e => e.preventDefault());
    </script>
