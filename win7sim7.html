<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Heppards Windows - Lightning Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { overflow: hidden; background: #000; }
        
        /* Boot */
        #boot { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; }
        .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        .loader { width: 300px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 20px; }
        .loader-bar { height: 100%; background: #0078d7; width: 0%; animation: load 2s forwards; }
        @keyframes load { to { width: 100%; } }
        
        /* Desktop */
        #desktop { width: 100vw; height: 100vh; background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=1920&q=80') center/cover; position: relative; display: none; }
        
        /* Icons */
        .icon { position: absolute; width: 80px; text-align: center; color: white; cursor: pointer; padding: 5px; border: 1px solid transparent; border-radius: 3px; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .icon:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
        .icon .img { font-size: 40px; margin-bottom: 5px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.6)); }
        .icon .txt { font-size: 12px; word-wrap: break-word; }
        
        /* Taskbar */
        #taskbar { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to bottom, rgba(30,87,153,0.9), rgba(20,60,120,0.9)); border-top: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; padding: 0 5px; z-index: 9999; }
        #start-btn { width: 40px; height: 35px; background: linear-gradient(to bottom, #4db56a, #2e8b47); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; color: white; font-size: 20px; cursor: pointer; margin-right: 10px; display: flex; align-items: center; justify-content: center; }
        #start-btn:hover { transform: scale(1.05); }
        #tasks { display: flex; flex: 1; gap: 5px; }
        .task { height: 35px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; padding: 0 10px; display: flex; align-items: center; color: white; font-size: 12px; cursor: pointer; max-width: 150px; }
        .task.active { background: rgba(255,255,255,0.4); }
        #tray { display: flex; align-items: center; color: white; font-size: 12px; gap: 10px; padding: 0 10px; }
        
        /* Start Menu */
        #start-menu { position: absolute; bottom: 40px; left: 0; width: 400px; height: 500px; background: rgba(30,87,153,0.95); border: 1px solid rgba(255,255,255,0.3); border-radius: 0 8px 0 0; display: none; flex-direction: column; z-index: 10000; backdrop-filter: blur(10px); }
        #start-menu.open { display: flex; }
        .start-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .start-header input { width: 100%; padding: 8px; border-radius: 15px; border: none; outline: none; }
        .start-body { flex: 1; display: flex; overflow: hidden; }
        .start-left { flex: 1; padding: 10px; overflow-y: auto; }
        .start-right { width: 150px; background: rgba(0,0,0,0.2); padding: 10px; border-left: 1px solid rgba(255,255,255,0.1); }
        .start-item { padding: 8px; margin: 2px 0; color: white; cursor: pointer; border-radius: 3px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .start-item:hover { background: rgba(255,255,255,0.2); }
        
        /* Windows */
        .window { position: absolute; background: rgba(240,240,240,0.98); border: 1px solid #666; border-radius: 6px 6px 0 0; box-shadow: 0 10px 30px rgba(0,0,0,0.4); min-width: 300px; min-height: 200px; display: flex; flex-direction: column; }
        .win-header { height: 32px; background: linear-gradient(to bottom, #7db9e8, #1e5799); display: flex; align-items: center; padding: 0 8px; color: white; cursor: default; border-radius: 5px 5px 0 0; }
        .win-title { flex: 1; font-weight: 600; font-size: 13px; margin-left: 8px; }
        .win-btns { display: flex; gap: 2px; }
        .win-btn { width: 25px; height: 20px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.2); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 2px; }
        .win-btn:hover { background: rgba(255,255,255,0.4); }
        .win-btn.close { background: #e81123; }
        .win-content { flex: 1; overflow: auto; background: white; position: relative; }
        
        /* Apps */
        .calc { padding: 10px; background: #f0f0f0; }
        .calc-display { background: white; border: 2px inset #ccc; padding: 10px; font-size: 24px; text-align: right; margin-bottom: 10px; font-family: Consolas; }
        .calc-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .calc-btns button { padding: 15px; font-size: 16px; cursor: pointer; border: 1px outset #fff; background: linear-gradient(to bottom, #fff, #e0e0e0); }
        .calc-btns button:active { border: 1px inset #fff; }
        
        .notepad { width: 100%; height: 100%; border: none; padding: 5px; font-family: Consolas; font-size: 14px; resize: none; outline: none; }
        
        .cmd { background: #000; color: #ccc; font-family: Consolas; font-size: 14px; padding: 10px; height: 100%; overflow-y: auto; }
        .cmd-line { display: flex; margin-top: 5px; }
        .cmd-prompt { color: #0f0; margin-right: 5px; }
        .cmd-input { background: transparent; border: none; color: #ccc; font-family: Consolas; font-size: 14px; flex: 1; outline: none; }
        
        .paint-canvas { cursor: crosshair; background: white; }
        
        /* Context Menu */
        .ctx { position: absolute; background: white; border: 1px solid #999; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); z-index: 99999; display: none; min-width: 150px; padding: 3px; }
        .ctx-item { padding: 6px 25px; cursor: pointer; font-size: 13px; position: relative; }
        .ctx-item:hover { background: #e5f3ff; }
    </style>
<base target="_blank">
</head>
<body>

<div id="boot">
    <div class="logo">🪟</div>
    <div style="font-size: 20px; letter-spacing: 2px;">Mr Heppards Windows</div>
    <div class="loader"><div class="loader-bar"></div></div>
</div>

<div id="desktop">
    <!-- Icons -->
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('notepad', '📝', 'Notepad')">
        <div class="img">📝</div>
        <div class="txt">Notepad</div>
    </div>
    <div class="icon" style="top: 110px; left: 20px;" onclick="openWin('calc', '🧮', 'Calculator')">
        <div class="img">🧮</div>
        <div class="txt">Calculator</div>
    </div>
    <div class="icon" style="top: 200px; left: 20px;" onclick="openWin('paint', '🎨', 'Paint')">
        <div class="img">🎨</div>
        <div class="txt">Paint</div>
    </div>
    <div class="icon" style="top: 290px; left: 20px;" onclick="openWin('cmd', '⌨', 'CMD')">
        <div class="img">⌨</div>
        <div class="txt">Command</div>
    </div>
    <div class="icon" style="top: 20px; left: 120px;" onclick="openWin('camera', '📷', 'Camera')">
        <div class="img">📷</div>
        <div class="txt">Camera</div>
    </div>
    <div class="icon" style="top: 110px; left: 120px;" onclick="openWin('ie', '🌐', 'Internet')">
        <div class="img">🌐</div>
        <div class="txt">Internet</div>
    </div>

    <!-- Context Menu -->
    <div class="ctx" id="ctx">
        <div class="ctx-item" onclick="openWin('personalize', '🎨', 'Personalize'); hideCtx()">Personalize</div>
        <div class="ctx-item" onclick="openWin('cmd', '⌨', 'CMD'); hideCtx()">Command Prompt</div>
        <div class="ctx-item" onclick="alert('Refresh'); hideCtx()">Refresh</div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="start-header">
            <input type="text" placeholder="Search..." id="search" oninput="doSearch(this.value)">
        </div>
        <div class="start-body">
            <div class="start-left">
                <div style="color: rgba(255,255,255,0.6); font-size: 11px; margin-bottom: 5px;">PROGRAMS</div>
                <div class="start-item" onclick="openWin('notepad', '📝', 'Notepad'); toggleStart()">📝 Notepad</div>
                <div class="start-item" onclick="openWin('calc', '🧮', 'Calculator'); toggleStart()">🧮 Calculator</div>
                <div class="start-item" onclick="openWin('paint', '🎨', 'Paint'); toggleStart()">🎨 Paint</div>
                <div class="start-item" onclick="openWin('cmd', '⌨', 'CMD'); toggleStart()">⌨ Command Prompt</div>
                <div class="start-item" onclick="openWin('camera', '📷', 'Camera'); toggleStart()">📷 Camera</div>
                <div class="start-item" onclick="openWin('ie', '🌐', 'Internet'); toggleStart()">🌐 Internet Explorer</div>
            </div>
            <div class="start-right">
                <div class="start-item" onclick="shutdown()">⏻ Shut Down</div>
                <div class="start-item" onclick="location.reload()">↻ Restart</div>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-btn" onclick="toggleStart()">🪟</div>
        <div id="tasks"></div>
        <div id="tray">
            <span id="time">12:00 PM</span>
        </div>
    </div>

    <!-- Windows Container -->
    <div id="windows"></div>
</div>

<script>
let zIndex = 100;
let wins = {};
let winCount = 0;

// Boot
setTimeout(() => {
    document.getElementById('boot').style.display = 'none';
    document.getElementById('desktop').style.display = 'block';
    setInterval(updateClock, 1000);
}, 2000);

function updateClock() {
    const now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

function toggleStart() {
    document.getElementById('start-menu').classList.toggle('open');
}

function doSearch(q) {
    const items = document.querySelectorAll('.start-item');
    items.forEach(i => {
        i.style.display = i.textContent.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none';
    });
}

function openWin(type, icon, title) {
    winCount++;
    const id = 'win' + winCount;
    const container = document.getElementById('windows');
    
    let content = '';
    switch(type) {
        case 'calc':
            content = `<div class="calc">
                <div class="calc-display" id="disp-${id}">0</div>
                <div class="calc-btns">
                    <button onclick="calc('${id}', 'C')">C</button><button onclick="calc('${id}', '/')">/</button><button onclick="calc('${id}', '*')">×</button><button onclick="calc('${id}', '←')">←</button>
                    <button onclick="calc('${id}', '7')">7</button><button onclick="calc('${id}', '8')">8</button><button onclick="calc('${id}', '9')">9</button><button onclick="calc('${id}', '-')">-</button>
                    <button onclick="calc('${id}', '4')">4</button><button onclick="calc('${id}', '5')">5</button><button onclick="calc('${id}', '6')">6</button><button onclick="calc('${id}', '+')">+</button>
                    <button onclick="calc('${id}', '1')">1</button><button onclick="calc('${id}', '2')">2</button><button onclick="calc('${id}', '3')">3</button><button onclick="calc('${id}', '=')" style="grid-row: span 2">=</button>
                    <button onclick="calc('${id}', '0')" style="grid-column: span 2">0</button><button onclick="calc('${id}', '.')">.</button>
                </div>
            </div>`;
            break;
        case 'notepad':
            content = `<textarea class="notepad" placeholder="Type here..."></textarea>`;
            break;
        case 'cmd':
            content = `<div class="cmd" id="cmd-${id}" onclick="this.querySelector('input').focus()">
                <div>Microsoft Windows [Version 6.1.7601]</div>
                <div>Copyright (c) 2009 Microsoft Corporation. All rights reserved.</div>
                <div style="margin-top: 10px;" id="out-${id}"></div>
                <div class="cmd-line"><span class="cmd-prompt">C:\\></span><input type="text" class="cmd-input" onkeydown="if(event.key==='Enter')doCmd('${id}', this)"></div>
            </div>`;
            break;
        case 'paint':
            content = `<div style="display: flex; flex-direction: column; height: 100%;">
                <div style="background: #f0f0f0; padding: 5px; border-bottom: 1px solid #ccc;">
                    <button onclick="clearPaint('${id}')">Clear</button>
                    <button onclick="savePaint('${id}')">Save</button>
                    <input type="color" id="col-${id}" value="#000000" style="margin-left: 10px;">
                    <select id="size-${id}"><option>1</option><option selected>3</option><option>5</option><option>10</option></select>
                </div>
                <div style="flex: 1; background: #808080; overflow: auto; padding: 10px;">
                    <canvas id="canvas-${id}" width="600" height="400" class="paint-canvas"></canvas>
                </div>
            </div>`;
            break;
        case 'camera':
            content = `<div style="display: flex; flex-direction: column; height: 100%; background: #1a1a1a;">
                <div style="padding: 10px; color: white; text-align: center; background: #333;">
                    <button onclick="initCam('${id}')" style="padding: 5px 15px; cursor: pointer;">📷 Start Camera</button>
                    <button onclick="snap('${id}')" style="padding: 5px 15px; cursor: pointer; margin-left: 10px;">Take Photo</button>
                </div>
                <div style="flex: 1; display: flex; justify-content: center; align-items: center; position: relative;">
                    <video id="vid-${id}" autoplay style="max-width: 100%; max-height: 100%; border: 2px solid #333;"></video>
                    <div id="gal-${id}" style="position: absolute; right: 10px; top: 10px; bottom: 10px; width: 120px; background: rgba(0,0,0,0.8); overflow-y: auto; padding: 5px; display: none;"></div>
                </div>
            </div>`;
            break;
        case 'ie':
            content = `<div style="display: flex; flex-direction: column; height: 100%;">
                <div style="background: #f0f0f0; padding: 5px; border-bottom: 1px solid #ccc;">
                    <input type="text" id="url-${id}" placeholder="Enter URL (https://...)" style="width: 80%; padding: 5px;" onkeydown="if(event.key==='Enter')browse('${id}')">
                    <button onclick="browse('${id}')">Go</button>
                </div>
                <iframe id="frame-${id}" style="flex: 1; border: none; width: 100%;" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
            </div>`;
            break;
        case 'personalize':
            content = `<div style="padding: 20px;">
                <h3>Change Wallpaper</h3>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
                    <div onclick="document.getElementById('desktop').style.backgroundImage='url(https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=1920&q=80)'" style="height: 100px; background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=300&q=80') center/cover; cursor: pointer; border: 2px solid #0078d7;"></div>
                    <div onclick="document.getElementById('desktop').style.backgroundImage='url(https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80)'" style="height: 100px; background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&q=80') center/cover; cursor: pointer; border: 2px solid transparent;"></div>
                    <div onclick="document.getElementById('desktop').style.backgroundImage='url(https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1920&q=80)'" style="height: 100px; background: url('https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=300&q=80') center/cover; cursor: pointer; border: 2px solid transparent;"></div>
                </div>
            </div>`;
            break;
    }
    
    const win = document.createElement('div');
    win.className = 'window';
    win.id = id;
    win.style.width = '600px';
    win.style.height = '400px';
    win.style.left = (50 + winCount * 20) + 'px';
    win.style.top = (50 + winCount * 20) + 'px';
    win.style.zIndex = ++zIndex;
    win.innerHTML = `
        <div class="win-header" onmousedown="startDrag(event, '${id}')">
            <span>${icon}</span>
            <span class="win-title">${title}</span>
            <div class="win-btns">
                <button class="win-btn" onclick="minWin('${id}')">_</button>
                <button class="win-btn" onclick="maxWin('${id}')">□</button>
                <button class="win-btn close" onclick="closeWin('${id}')">×</button>
            </div>
        </div>
        <div class="win-content">${content}</div>
    `;
    
    container.appendChild(win);
    wins[id] = {el: win, min: false, task: 'task-'+id};
    
    // Taskbar
    const task = document.createElement('div');
    task.className = 'task active';
    task.id = 'task-'+id;
    task.innerHTML = `${icon} ${title}`;
    task.onclick = () => toggleWin(id);
    document.getElementById('tasks').appendChild(task);
    
    bringToFront(id);
    
    // Init special
    if(type === 'paint') setTimeout(() => initPaint(id), 10);
}

function bringToFront(id) {
    document.getElementById(id).style.zIndex = ++zIndex;
    document.querySelectorAll('.window').forEach(w => w.style.boxShadow = '0 10px 30px rgba(0,0,0,0.4)');
    document.getElementById(id).style.boxShadow = '0 15px 40px rgba(0,0,0,0.6)';
    document.querySelectorAll('.task').forEach(t => t.classList.remove('active'));
    if(document.getElementById('task-'+id)) document.getElementById('task-'+id).classList.add('active');
}

function toggleWin(id) {
    const w = wins[id];
    if(w.min) {
        w.el.style.display = 'flex';
        w.min = false;
        bringToFront(id);
    } else if(w.el.style.zIndex == zIndex) {
        w.el.style.display = 'none';
        w.min = true;
        document.getElementById('task-'+id).classList.remove('active');
    } else {
        bringToFront(id);
    }
}

function minWin(id) {
    wins[id].el.style.display = 'none';
    wins[id].min = true;
    document.getElementById('task-'+id).classList.remove('active');
}

function maxWin(id) {
    const w = wins[id].el;
    if(w.dataset.max) {
        w.style.width = '600px'; w.style.height = '400px'; w.style.left = '100px'; w.style.top = '100px';
        w.dataset.max = '';
    } else {
        w.style.width = '100%'; w.style.height = 'calc(100% - 40px)'; w.style.left = '0'; w.style.top = '0';
        w.dataset.max = '1';
    }
}

function closeWin(id) {
    wins[id].el.remove();
    document.getElementById('task-'+id).remove();
    delete wins[id];
    if(window.camStream) {
        window.camStream.getTracks().forEach(t => t.stop());
        window.camStream = null;
    }
}

// Drag
let dragWin = null;
let dragOff = {x:0, y:0};
function startDrag(e, id) {
    if(e.target.closest('.win-btns')) return;
    dragWin = document.getElementById(id);
    bringToFront(id);
    dragOff.x = e.clientX - dragWin.offsetLeft;
    dragOff.y = e.clientY - dragWin.offsetTop;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
}
function onDrag(e) {
    if(!dragWin) return;
    dragWin.style.left = (e.clientX - dragOff.x) + 'px';
    dragWin.style.top = (e.clientY - dragOff.y) + 'px';
}
function stopDrag() {
    dragWin = null;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
}

// Calculator
let calcVal = '0', calcPrev = null, calcOp = null;
function calc(id, key) {
    const disp = document.getElementById('disp-'+id);
    if(key === 'C') { calcVal = '0'; calcPrev = null; calcOp = null; }
    else if(key === '←') { calcVal = calcVal.slice(0,-1) || '0'; }
    else if(key === '=') {
        if(calcOp && calcPrev !== null) {
            const c = parseFloat(calcVal);
            const p = calcPrev;
            calcVal = String(calcOp === '+' ? p+c : calcOp === '-' ? p-c : calcOp === '*' ? p*c : calcOp === '/' ? p/c : c);
            calcOp = null; calcPrev = null;
        }
    }
    else if(['+','-','*','/'].includes(key)) {
        calcPrev = parseFloat(calcVal);
        calcOp = key;
        calcVal = '0';
    }
    else {
        if(calcVal === '0' && key !== '.') calcVal = key;
        else if(!(key === '.' && calcVal.includes('.'))) calcVal += key;
    }
    disp.textContent = calcVal;
}

// CMD
function doCmd(id, inp) {
    const cmd = inp.value.trim();
    const out = document.getElementById('out-'+id);
    out.innerHTML += `<div><span style="color:#0f0">C:\\></span> ${cmd}</div>`;
    
    let resp = '';
    if(cmd === 'help') resp = 'Commands: help, cls, date, time, calc, notepad, echo';
    else if(cmd === 'cls') out.innerHTML = '';
    else if(cmd === 'date') resp = new Date().toDateString();
    else if(cmd === 'time') resp = new Date().toLocaleTimeString();
    else if(cmd === 'calc') { openWin('calc', '🧮', 'Calculator'); resp = 'Opening...'; }
    else if(cmd === 'notepad') { openWin('notepad', '📝', 'Notepad'); resp = 'Opening...'; }
    else if(cmd.startsWith('echo ')) resp = cmd.slice(5);
    else if(cmd) resp = `Bad command or file name: ${cmd}`;
    
    if(resp) out.innerHTML += `<div>${resp}</div>`;
    inp.value = '';
    document.getElementById('cmd-'+id).scrollTop = 99999;
}

// Paint
function initPaint(id) {
    const c = document.getElementById('canvas-'+id);
    const ctx = c.getContext('2d');
    let d = false;
    let lx, ly;
    
    c.onmousedown = e => {
        d = true;
        const r = c.getBoundingClientRect();
        lx = e.clientX - r.left;
        ly = e.clientY - r.top;
    };
    c.onmousemove = e => {
        if(!d) return;
        const r = c.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;
        ctx.strokeStyle = document.getElementById('col-'+id).value;
        ctx.lineWidth = document.getElementById('size-'+id).value;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(x, y);
        ctx.stroke();
        lx = x; ly = y;
    };
    c.onmouseup = () => d = false;
    c.onmouseleave = () => d = false;
}
function clearPaint(id) {
    const c = document.getElementById('canvas-'+id);
    c.getContext('2d').fillStyle = 'white';
    c.getContext('2d').fillRect(0,0,c.width,c.height);
}
function savePaint(id) {
    const link = document.createElement('a');
    link.download = 'paint.png';
    link.href = document.getElementById('canvas-'+id).toDataURL();
    link.click();
}

// Camera
async function initCam(id) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        window.camStream = stream;
        document.getElementById('vid-'+id).srcObject = stream;
    } catch(e) {
        alert('Camera requires HTTPS permission. Click "Allow" if prompted, or use localhost.');
    }
}
function snap(id) {
    const v = document.getElementById('vid-'+id);
    if(!v.srcObject) { alert('Start camera first!'); return; }
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    const url = c.toDataURL();
    
    const gal = document.getElementById('gal-'+id);
    gal.style.display = 'block';
    const img = document.createElement('img');
    img.src = url;
    img.style.width = '100%';
    img.style.marginBottom = '5px';
    img.style.cursor = 'pointer';
    img.onclick = () => {
        const a = document.createElement('a');
        a.href = url; a.download = 'photo.png'; a.click();
    };
    gal.appendChild(img);
}

// Internet
function browse(id) {
    const url = document.getElementById('url-'+id).value;
    if(!url) return;
    // Use textise dot iitty or similar for safety, or direct
    document.getElementById('frame-'+id).src = url.startsWith('http') ? url : 'https://' + url;
}

// Context
document.getElementById('desktop').oncontextmenu = e => {
    if(e.target.id === 'desktop' || e.target.id === '') {
        e.preventDefault();
        const m = document.getElementById('ctx');
        m.style.left = e.pageX + 'px';
        m.style.top = e.pageY + 'px';
        m.style.display = 'block';
    }
};
function hideCtx() { document.getElementById('ctx').style.display = 'none'; }
document.onclick = e => { if(!e.target.closest('.ctx')) hideCtx(); };

function shutdown() {
    document.body.innerHTML = '<div style="background:black;color:white;height:100vh;display:flex;align-items:center;justify-content:center;font-size:24px;">Shutting down...</div>';
    setTimeout(() => location.reload(), 2000);
}
