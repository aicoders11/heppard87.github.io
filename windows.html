<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Simulator | Chris Heppard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5d4; --magenta: #ff00f5; --blue: #3b82f6;
            --dark: #0a0a0f; --panel: rgba(10, 10, 15, 0.95);
            --border: rgba(0, 245, 212, 0.3); --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.5);
            --font-main: 'Rajdhani', sans-serif; --font-mono: 'Share Tech Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: var(--font-main); }
        
        /* Boot Screen */
        #boot {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #000 0%, #0a0a1a 100%);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 99999; color: white;
        }
        .boot-logo {
            font-family: var(--font-display); font-size: 80px;
            background: linear-gradient(45deg, var(--cyan), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        .boot-text { font-family: var(--font-mono); font-size: 18px; letter-spacing: 3px; color: var(--cyan); }
        .loader { width: 400px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-top: 40px; }
        .loader-bar { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--blue)); width: 0%; animation: load 3s forwards; }
        @keyframes load { to { width: 100%; } }
        .boot-info { margin-top: 30px; font-family: var(--font-mono); font-size: 12px; color: #555; }
        
        /* Desktop */
        #desktop {
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            position: relative; display: none; overflow: hidden;
        }
        .desktop-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(0,245,212,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,212,0.03) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none;
        }
        
        /* Icons */
        .icon {
            position: absolute; width: 90px; text-align: center;
            color: white; cursor: pointer; padding: 10px;
            border: 1px solid transparent; border-radius: 8px;
            transition: all 0.2s;
        }
        .icon:hover { background: rgba(0,245,212,0.1); border-color: var(--border); }
        .icon .img { font-size: 45px; margin-bottom: 8px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)); }
        .icon .txt { font-size: 12px; font-family: var(--font-mono); text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        
        /* Taskbar */
        #taskbar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
            background: var(--panel); border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; z-index: 9999;
            backdrop-filter: blur(15px);
        }
        #start-btn {
            width: 50px; height: 40px;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            border: none; border-radius: 5px; color: var(--dark);
            font-size: 24px; cursor: pointer; margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: var(--font-display);
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: var(--glow-cyan); }
        #tasks { display: flex; flex: 1; gap: 8px; }
        .task {
            height: 38px; background: rgba(0,245,212,0.1);
            border: 1px solid var(--border); border-radius: 5px;
            padding: 0 15px; display: flex; align-items: center;
            color: white; font-size: 12px; cursor: pointer; max-width: 160px;
            font-family: var(--font-mono); transition: all 0.2s;
        }
        .task:hover, .task.active { background: rgba(0,245,212,0.2); border-color: var(--cyan); }
        #tray {
            display: flex; align-items: center; color: white;
            font-size: 13px; gap: 15px; padding: 0 15px;
            font-family: var(--font-mono);
        }
        
        /* Start Menu */
        #start-menu {
            position: absolute; bottom: 55px; left: 10px; width: 450px; height: 550px;
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 10px; display: none; flex-direction: column;
            z-index: 10000; backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        #start-menu.open { display: flex; }
        .start-header {
            padding: 20px; border-bottom: 1px solid var(--border);
        }
        .start-header input {
            width: 100%; padding: 12px 20px; border-radius: 25px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.3);
            color: white; outline: none; font-family: var(--font-mono);
        }
        .start-header input::placeholder { color: #666; }
        .start-body { flex: 1; display: flex; overflow: hidden; }
        .start-left { flex: 1; padding: 15px; overflow-y: auto; }
        .start-right { width: 160px; background: rgba(0,0,0,0.2); padding: 15px; border-left: 1px solid var(--border); }
        .start-item {
            padding: 12px; margin: 4px 0; color: white; cursor: pointer;
            border-radius: 8px; display: flex; align-items: center;
            gap: 15px; font-size: 14px; transition: all 0.2s;
        }
        .start-item:hover { background: rgba(0,245,212,0.1); }
        .start-item .icon-emoji { font-size: 24px; }
        
        /* Windows */
        .window {
            position: absolute; background: rgba(20, 20, 30, 0.98);
            border: 1px solid var(--border); border-radius: 10px 10px 0 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); min-width: 350px;
            min-height: 250px; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .win-header {
            height: 40px; background: linear-gradient(90deg, rgba(0,245,212,0.2), rgba(59,130,246,0.2));
            display: flex; align-items: center; padding: 0 15px;
            color: white; cursor: default; border-radius: 10px 10px 0 0;
            border-bottom: 1px solid var(--border);
        }
        .win-title { flex: 1; font-weight: 600; font-size: 13px; margin-left: 10px; font-family: var(--font-mono); }
        .win-btns { display: flex; gap: 8px; }
        .win-btn {
            width: 14px; height: 14px; border-radius: 50%; border: none;
            cursor: pointer; transition: all 0.2s;
        }
        .win-btn.min { background: #feca57; }
        .win-btn.max { background: #4cd964; }
        .win-btn.close { background: #ff6b6b; }
        .win-btn:hover { transform: scale(1.2); }
        .win-content { flex: 1; overflow: auto; background: rgba(10,10,15,0.8); position: relative; }
        
        /* App Styles */
        .calc { padding: 20px; }
        .calc-display {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            padding: 20px; font-size: 32px; text-align: right;
            margin-bottom: 20px; font-family: var(--font-mono);
            color: var(--cyan); border-radius: 8px;
        }
        .calc-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .calc-btns button {
            padding: 20px; font-size: 20px; cursor: pointer;
            border: 1px solid var(--border); background: rgba(0,245,212,0.05);
            color: white; border-radius: 8px; transition: all 0.2s;
            font-family: var(--font-mono);
        }
        .calc-btns button:hover { background: rgba(0,245,212,0.2); border-color: var(--cyan); }
        .calc-btns button.op { background: rgba(255,0,245,0.1); border-color: var(--magenta); color: var(--magenta); }
        .calc-btns button.eq { background: linear-gradient(135deg, var(--cyan), var(--blue)); color: var(--dark); }
        
        .notepad {
            width: 100%; height: 100%; border: none; padding: 15px;
            font-family: var(--font-mono); font-size: 14px;
            background: rgba(10,10,15,0.8); color: #e0e0e0; resize: none; outline: none;
        }
        
        .cmd {
            background: #000; color: #0f0; font-family: var(--font-mono);
            font-size: 14px; padding: 15px; height: 100%; overflow-y: auto;
        }
        .cmd-line { display: flex; margin-top: 8px; }
        .cmd-prompt { color: var(--cyan); margin-right: 8px; }
        .cmd-input {
            background: transparent; border: none; color: #0f0;
            font-family: var(--font-mono); font-size: 14px; flex: 1; outline: none;
        }
        
        .paint-toolbar {
            display: flex; gap: 15px; padding: 15px; background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border);
        }
        .paint-toolbar button {
            padding: 8px 20px; background: rgba(0,245,212,0.1);
            border: 1px solid var(--border); color: var(--cyan);
            border-radius: 5px; cursor: pointer; font-family: var(--font-mono);
        }
        .paint-toolbar button:hover { background: rgba(0,245,212,0.2); }
        .paint-canvas { cursor: crosshair; background: #111; }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        .browser-bar {
            display: flex; gap: 10px; padding: 15px;
            background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);
        }
        .browser-bar input {
            flex: 1; padding: 10px 15px; border-radius: 5px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.5);
            color: white; outline: none;
        }
        .browser-bar button {
            padding: 10px 25px; background: linear-gradient(135deg, var(--cyan), var(--blue));
            border: none; border-radius: 5px; color: var(--dark); cursor: pointer;
            font-family: var(--font-mono); font-weight: bold;
        }
        iframe { width: 100%; height: calc(100% - 60px); border: none; background: white; }
        
        /* Context Menu */
        .ctx {
            position: absolute; background: var(--panel);
            border: 1px solid var(--border); border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 99999;
            display: none; min-width: 180px; padding: 8px; backdrop-filter: blur(15px);
        }
        .ctx-item {
            padding: 10px 20px; cursor: pointer; font-size: 13px;
            color: #e0e0e0; border-radius: 5px; transition: all 0.2s;
        }
        .ctx-item:hover { background: rgba(0,245,212,0.1); color: var(--cyan); }
        
        .wallpaper-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px;
        }
        .wallpaper-option {
            height: 120px; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.2s;
        }
        .wallpaper-option:hover { border-color: var(--cyan); transform: scale(1.02); }
    
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #00f5d4;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px; left: 0; width: 100%;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 245, 212, 0.3);
            backdrop-filter: blur(15px);
            z-index: 999;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #888;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            transition: all 0.3s;
        }
        .mobile-menu a:hover {
            color: #00f5d4;
            padding-left: 10px;
        }
        @media (max-width: 1024px) {
            .cyber-nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }

        /* Footer */
        .cyber-footer {
            border-top: 1px solid rgba(0, 245, 212, 0.3);
            text-align: center;
        }
        .cyber-footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .cyber-footer-links a {
            color: #666;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .cyber-footer-links a:hover { color: #00f5d4; }
        .cyber-footer-text {
            font-family: 'Share Tech Mono', monospace;
            color: #555;
        }

    </style>
</head>
<body>
    <div id="boot">
        <div class="boot-logo">W</div>
        <div class="boot-text">CYBER WINDOWS OS</div>
        <div class="loader"><div class="loader-bar"></div></div>
        <div class="boot-info">Loading system modules...</div>
    </div>

    <div id="desktop">
        <div class="desktop-grid"></div>
        
        <div class="icon" style="top: 25px; left: 25px;" onclick="openWin('notepad', '📝', 'Notepad')">
            <div class="img">📝</div>
            <div class="txt">Notepad</div>
        </div>
        <div class="icon" style="top: 130px; left: 25px;" onclick="openWin('calc', '🧮', 'Calculator')">
            <div class="img">🧮</div>
            <div class="txt">Calculator</div>
        </div>
        <div class="icon" style="top: 235px; left: 25px;" onclick="openWin('paint', '🎨', 'Paint')">
            <div class="img">🎨</div>
            <div class="txt">Paint</div>
        </div>
        <div class="icon" style="top: 340px; left: 25px;" onclick="openWin('cmd', '⌨', 'Terminal')">
            <div class="img">⌨</div>
            <div class="txt">Terminal</div>
        </div>
        <div class="icon" style="top: 25px; left: 130px;" onclick="openWin('camera', '📷', 'Camera')">
            <div class="img">📷</div>
            <div class="txt">Camera</div>
        </div>
        <div class="icon" style="top: 130px; left: 130px;" onclick="openWin('browser', '🌐', 'CyberBrowser')">
            <div class="img">🌐</div>
            <div class="txt">Browser</div>
        </div>
        <div class="icon" style="top: 235px; left: 130px;" onclick="openWin('settings', '⚙️', 'Settings')">
            <div class="img">⚙️</div>
            <div class="txt">Settings</div>
        </div>

        <div class="ctx" id="ctx">
            <div class="ctx-item" onclick="openWin('personalize', '🎨', 'Personalize'); hideCtx()">Personalize</div>
            <div class="ctx-item" onclick="openWin('cmd', '⌨', 'Terminal'); hideCtx()">Open Terminal</div>
            <div class="ctx-item" onclick="location.reload(); hideCtx()">Refresh</div>
        </div>

        <div id="start-menu">
            <div class="start-header">
                <input type="text" placeholder="Search apps..." id="search" oninput="doSearch(this.value)">
            </div>
            <div class="start-body">
                <div class="start-left">
                    <div style="color: #666; font-size: 11px; margin-bottom: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 2px;">Applications</div>
                    <div class="start-item" onclick="openWin('notepad', '📝', 'Notepad'); toggleStart()">
                        <span class="icon-emoji">📝</span> Notepad
                    </div>
                    <div class="start-item" onclick="openWin('calc', '🧮', 'Calculator'); toggleStart()">
                        <span class="icon-emoji">🧮</span> Calculator
                    </div>
                    <div class="start-item" onclick="openWin('paint', '🎨', 'Paint'); toggleStart()">
                        <span class="icon-emoji">🎨</span> Paint
                    </div>
                    <div class="start-item" onclick="openWin('cmd', '⌨', 'Terminal'); toggleStart()">
                        <span class="icon-emoji">⌨</span> Terminal
                    </div>
                    <div class="start-item" onclick="openWin('camera', '📷', 'Camera'); toggleStart()">
                        <span class="icon-emoji">📷</span> Camera
                    </div>
                    <div class="start-item" onclick="openWin('browser', '🌐', 'CyberBrowser'); toggleStart()">
                        <span class="icon-emoji">🌐</span> Browser
                    </div>
                </div>
                <div class="start-right">
                    <div class="start-item" onclick="shutdown()">
                        <span class="icon-emoji">⏻</span> Shut Down
                    </div>
                    <div class="start-item" onclick="location.reload()">
                        <span class="icon-emoji">↻</span> Restart
                    </div>
                </div>
            </div>
        </div>

        <div id="taskbar">
            <button id="start-btn" onclick="toggleStart()">W</button>
            <div id="tasks"></div>
            <div id="tray">
                <span id="time">12:00 PM</span>
            </div>
        </div>

        <div id="windows"></div>
    </div>

    <script>
        let zIndex = 100, wins = {}, winCount = 0;

        setTimeout(() => {
            document.getElementById('boot').style.display = 'none';
            document.getElementById('desktop').style.display = 'block';
            setInterval(updateClock, 1000);
        }, 3000);

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
        }

        function toggleStart() {
            document.getElementById('start-menu').classList.toggle('open');
        }

        function doSearch(q) {
            document.querySelectorAll('.start-item').forEach(i => {
                i.style.display = i.textContent.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none';
            });
        }

        function openWin(type, icon, title) {
            winCount++;
            const id = 'win' + winCount;
            const container = document.getElementById('windows');
            
            let content = '';
            switch(type) {
                case 'calc':
                    content = `<div class="calc">
                        <div class="calc-display" id="disp-${id}">0</div>
                        <div class="calc-btns">
                            <button onclick="calc('${id}', 'C')">C</button><button onclick="calc('${id}', '/')" class="op">/</button><button onclick="calc('${id}', '*')" class="op">×</button><button onclick="calc('${id}', '←')">←</button>
                            <button onclick="calc('${id}', '7')">7</button><button onclick="calc('${id}', '8')">8</button><button onclick="calc('${id}', '9')">9</button><button onclick="calc('${id}', '-')" class="op">-</button>
                            <button onclick="calc('${id}', '4')">4</button><button onclick="calc('${id}', '5')">5</button><button onclick="calc('${id}', '6')">6</button><button onclick="calc('${id}', '+')" class="op">+</button>
                            <button onclick="calc('${id}', '1')">1</button><button onclick="calc('${id}', '2')">2</button><button onclick="calc('${id}', '3')">3</button><button onclick="calc('${id}', '=')" class="eq" style="grid-row: span 2">=</button>
                            <button onclick="calc('${id}', '0')" style="grid-column: span 2">0</button><button onclick="calc('${id}', '.')">.</button>
                        </div>
                    </div>`;
                    break;
                case 'notepad':
                    content = `<textarea class="notepad" placeholder="Type your notes here..."></textarea>`;
                    break;
                case 'cmd':
                    content = `<div class="cmd" id="cmd-${id}" onclick="this.querySelector('input').focus()">
                        <div style="color: var(--cyan);">CyberOS [Version 2024.1]</div>
                        <div style="color: #555;">(c) 2024 CyberSolutionsOhio. All rights reserved.</div>
                        <div style="margin-top: 15px;" id="out-${id}"></div>
                        <div class="cmd-line"><span class="cmd-prompt">C:\\></span><input type="text" class="cmd-input" onkeydown="if(event.key==='Enter')doCmd('${id}', this)"></div>
                    </div>`;
                    break;
                case 'paint':
                    content = `<div style="display: flex; flex-direction: column; height: 100%;">
                        <div class="paint-toolbar">
                            <button onclick="clearPaint('${id}')">Clear</button>
                            <button onclick="savePaint('${id}')">Save</button>
                            <input type="color" id="col-${id}" value="#00f5d4" style="margin-left: 10px;">
                            <select id="size-${id}" style="padding: 5px; background: #222; color: white; border: 1px solid var(--border);"><option>1</option><option selected>3</option><option>5</option><option>10</option><option>20</option></select>
                        </div>
                        <div style="flex: 1; background: #111; overflow: auto; padding: 10px;">
                            <canvas id="canvas-${id}" width="800" height="500" class="paint-canvas"></canvas>
                        </div>
                    </div>`;
                    break;
                case 'camera':
                    content = `<div style="display: flex; flex-direction: column; height: 100%; background: #0a0a0f;">
                        <div style="padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);">
                            <button onclick="initCam('${id}')" style="padding: 10px 25px; cursor: pointer; background: linear-gradient(135deg, var(--cyan), var(--blue)); border: none; border-radius: 5px; color: var(--dark); font-family: var(--font-mono); font-weight: bold;">Start Camera</button>
                            <button onclick="snap('${id}')" style="padding: 10px 25px; cursor: pointer; background: var(--magenta); border: none; border-radius: 5px; color: white; font-family: var(--font-mono); font-weight: bold; margin-left: 10px;">Take Photo</button>
                        </div>
                        <div style="flex: 1; display: flex; justify-content: center; align-items: center; position: relative;">
                            <video id="vid-${id}" autoplay style="max-width: 100%; max-height: 100%; border: 2px solid var(--border); border-radius: 10px;"></video>
                        </div>
                    </div>`;
                    break;
                case 'browser':
                    content = `<div style="display: flex; flex-direction: column; height: 100%;">
                        <div class="browser-bar">
                            <input type="text" id="url-${id}" placeholder="Enter URL (https://...)" value="https://example.com" onkeydown="if(event.key==='Enter')browse('${id}')">
                            <button onclick="browse('${id}')">Go</button>
                        </div>
                        <iframe id="frame-${id}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                    </div>`;
                    break;
                case 'personalize':
                case 'settings':
                    content = `<div style="padding: 20px;">
                        <h3 style="color: var(--cyan); font-family: var(--font-display); margin-bottom: 20px;">Change Wallpaper</h3>
                        <div class="wallpaper-grid">
                            <div onclick="changeWallpaper('gradient1')" class="wallpaper-option" style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);"></div>
                            <div onclick="changeWallpaper('gradient2')" class="wallpaper-option" style="background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);"></div>
                            <div onclick="changeWallpaper('gradient3')" class="wallpaper-option" style="background: linear-gradient(135deg, #0a0a0f, #1a0a2e, #0a1a3e);"></div>
                            <div onclick="changeWallpaper('solid')" class="wallpaper-option" style="background: #0a0a0f;"></div>
                        </div>
                    </div>`;
                    break;
            }
            
            const win = document.createElement('div');
            win.className = 'window';
            win.id = id;
            win.style.width = '650px';
            win.style.height = '450px';
            win.style.left = (60 + winCount * 25) + 'px';
            win.style.top = (60 + winCount * 25) + 'px';
            win.style.zIndex = ++zIndex;
            win.innerHTML = `
                <div class="win-header" onmousedown="startDrag(event, '${id}')">
                    <span>${icon}</span>
                    <span class="win-title">${title}</span>
                    <div class="win-btns">
                        <button class="win-btn min" onclick="minWin('${id}')"></button>
                        <button class="win-btn max" onclick="maxWin('${id}')"></button>
                        <button class="win-btn close" onclick="closeWin('${id}')"></button>
                    </div>
                </div>
                <div class="win-content">${content}</div>
            `;
            
            container.appendChild(win);
            wins[id] = {el: win, min: false, task: 'task-'+id};
            
            const task = document.createElement('div');
            task.className = 'task active';
            task.id = 'task-'+id;
            task.innerHTML = `${icon} ${title}`;
            task.onclick = () => toggleWin(id);
            document.getElementById('tasks').appendChild(task);
            
            bringToFront(id);
            if(type === 'paint') setTimeout(() => initPaint(id), 10);
        }

        function bringToFront(id) {
            document.getElementById(id).style.zIndex = ++zIndex;
            document.querySelectorAll('.task').forEach(t => t.classList.remove('active'));
            if(document.getElementById('task-'+id)) document.getElementById('task-'+id).classList.add('active');
        }

        function toggleWin(id) {
            const w = wins[id];
            if(w.min) { w.el.style.display = 'flex'; w.min = false; bringToFront(id); }
            else if(w.el.style.zIndex == zIndex) { w.el.style.display = 'none'; w.min = true; document.getElementById('task-'+id).classList.remove('active'); }
            else bringToFront(id);
        }

        function minWin(id) {
            wins[id].el.style.display = 'none';
            wins[id].min = true;
            document.getElementById('task-'+id).classList.remove('active');
        }

        function maxWin(id) {
            const w = wins[id].el;
            if(w.dataset.max) {
                w.style.width = '650px'; w.style.height = '450px'; w.style.left = '100px'; w.style.top = '100px';
                w.dataset.max = '';
            } else {
                w.style.width = '100%'; w.style.height = 'calc(100% - 50px)'; w.style.left = '0'; w.style.top = '0';
                w.dataset.max = '1';
            }
        }

        function closeWin(id) {
            wins[id].el.remove();
            document.getElementById('task-'+id).remove();
            delete wins[id];
            if(window.camStream) { window.camStream.getTracks().forEach(t => t.stop()); window.camStream = null; }
        }

        let dragWin = null, dragOff = {x:0, y:0};
        function startDrag(e, id) {
            if(e.target.closest('.win-btns')) return;
            dragWin = document.getElementById(id);
            bringToFront(id);
            dragOff.x = e.clientX - dragWin.offsetLeft;
            dragOff.y = e.clientY - dragWin.offsetTop;
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }
        function onDrag(e) {
            if(!dragWin) return;
            dragWin.style.left = (e.clientX - dragOff.x) + 'px';
            dragWin.style.top = (e.clientY - dragOff.y) + 'px';
        }
        function stopDrag() {
            dragWin = null;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        let calcVal = '0', calcPrev = null, calcOp = null;
        function calc(id, key) {
            const disp = document.getElementById('disp-'+id);
            if(key === 'C') { calcVal = '0'; calcPrev = null; calcOp = null; }
            else if(key === '←') { calcVal = calcVal.slice(0,-1) || '0'; }
            else if(key === '=') {
                if(calcOp && calcPrev !== null) {
                    const c = parseFloat(calcVal), p = calcPrev;
                    calcVal = String(calcOp === '+' ? p+c : calcOp === '-' ? p-c : calcOp === '*' ? p*c : calcOp === '/' ? p/c : c);
                    calcOp = null; calcPrev = null;
                }
            }
            else if(['+','-','*','/'].includes(key)) { calcPrev = parseFloat(calcVal); calcOp = key; calcVal = '0'; }
            else { if(calcVal === '0' && key !== '.') calcVal = key; else if(!(key === '.' && calcVal.includes('.'))) calcVal += key; }
            disp.textContent = calcVal;
        }

        function doCmd(id, inp) {
            const cmd = inp.value.trim().toLowerCase();
            const out = document.getElementById('out-'+id);
            out.innerHTML += `<div><span style="color:var(--cyan)">C:\\></span> ${inp.value}</div>`;
            let resp = '';
            if(cmd === 'help') resp = 'Commands: help, cls, date, time, ver, echo, exit';
            else if(cmd === 'cls') out.innerHTML = '';
            else if(cmd === 'date') resp = new Date().toDateString();
            else if(cmd === 'time') resp = new Date().toLocaleTimeString();
            else if(cmd === 'ver') resp = 'CyberOS Version 2024.1';
            else if(cmd.startsWith('echo ')) resp = cmd.slice(5);
            else if(cmd === 'exit') closeWin('win-'+id);
            else if(cmd) resp = `Unknown command: ${cmd}`;
            if(resp) out.innerHTML += `<div style="color:#0f0">${resp}</div>`;
            inp.value = '';
            document.getElementById('cmd-'+id).scrollTop = 99999;
        }

        function initPaint(id) {
            const c = document.getElementById('canvas-'+id);
            const ctx = c.getContext('2d');
            let d = false, lx, ly;
            c.onmousedown = e => { d = true; const r = c.getBoundingClientRect(); lx = e.clientX - r.left; ly = e.clientY - r.top; };
            c.onmousemove = e => {
                if(!d) return;
                const r = c.getBoundingClientRect();
                const x = e.clientX - r.left, y = e.clientY - r.top;
                ctx.strokeStyle = document.getElementById('col-'+id).value;
                ctx.lineWidth = document.getElementById('size-'+id).value;
                ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(x, y); ctx.stroke();
                lx = x; ly = y;
            };
            c.onmouseup = () => d = false;
            c.onmouseleave = () => d = false;
        }
        function clearPaint(id) {
            const c = document.getElementById('canvas-'+id);
            c.getContext('2d').fillStyle = '#111';
            c.getContext('2d').fillRect(0,0,c.width,c.height);
        }
        function savePaint(id) {
            const link = document.createElement('a');
            link.download = 'cyber-paint.png';
            link.href = document.getElementById('canvas-'+id).toDataURL();
            link.click();
        }

        async function initCam(id) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video:true});
                window.camStream = stream;
                document.getElementById('vid-'+id).srcObject = stream;
            } catch(e) { alert('Camera access required. Please allow camera permissions.'); }
        }
        function snap(id) {
            const v = document.getElementById('vid-'+id);
            if(!v.srcObject) { alert('Start camera first!'); return; }
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const link = document.createElement('a');
            link.download = 'cyber-photo.png';
            link.href = c.toDataURL();
            link.click();
        }

        function browse(id) {
            const url = document.getElementById('url-'+id).value;
            if(!url) return;
            document.getElementById('frame-'+id).src = url.startsWith('http') ? url : 'https://' + url;
        }

        function changeWallpaper(type) {
            const desktop = document.getElementById('desktop');
            const wallpapers = {
                gradient1: 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)',
                gradient2: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
                gradient3: 'linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a1a3e 100%)',
                solid: '#0a0a0f'
            };
            desktop.style.background = wallpapers[type];
        }

        document.getElementById('desktop').oncontextmenu = e => {
            if(e.target.id === 'desktop' || e.target.classList.contains('desktop-grid')) {
                e.preventDefault();
                const m = document.getElementById('ctx');
                m.style.left = e.pageX + 'px';
                m.style.top = e.pageY + 'px';
                m.style.display = 'block';
            }
        };
        function hideCtx() { document.getElementById('ctx').style.display = 'none'; }
        document.onclick = e => { if(!e.target.closest('.ctx')) hideCtx(); };

        function shutdown() {
            document.body.innerHTML = '<div style="background:#000;color:var(--cyan);height:100vh;display:flex;align-items:center;justify-content:center;font-size:32px;font-family:var(--font-display);">Shutting down...</div>';
            setTimeout(() => location.reload(), 2000);
        }
    
        // Mobile Menu Toggle
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.querySelector('.mobile-menu-btn');
            if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

    </script>
</body>
</html>
