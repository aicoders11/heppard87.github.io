<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo-Earth Clock | CyberSolutionsOhio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #clock-overlay {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 20, 40, 0.8); border: 1px solid #00f5d4;
            padding: 1rem; color: #00f5d4; border-radius: 4px;
            pointer-events: none;
        }
        .time-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 5px; font-size: 1.1rem; }
        .time-label { color: #aaa; }
        h1 { position: absolute; top: 20px; left: 20px; color: white; margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h1>Global Time Dilation</h1>
    
    <div id="clock-overlay">
        <div class="time-row"><span class="time-label">UTC</span> <span id="t-utc">00:00:00</span></div>
        <div class="time-row"><span class="time-label">New York</span> <span id="t-ny">00:00:00</span></div>
        <div class="time-row"><span class="time-label">London</span> <span id="t-ldn">00:00:00</span></div>
        <div class="time-row"><span class="time-label">Tokyo</span> <span id="t-tok">00:00:00</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 35;

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- EARTH (Wireframe Style) ---
        const sphereGeo = new THREE.IcosahedronGeometry(10, 2);
        
        // 1. Solid Dark Core
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x001122 });
        const core = new THREE.Mesh(sphereGeo, coreMat);
        scene.add(core);

        // 2. Wireframe Overlay
        const wireGeo = new THREE.WireframeGeometry(sphereGeo);
        const wireMat = new THREE.LineBasicMaterial({ color: 0x0055ff, transparent: true, opacity: 0.3 });
        const wireframe = new THREE.LineSegments(wireGeo, wireMat);
        core.add(wireframe);

        // 3. Atmosphere Glow
        const glowGeo = new THREE.IcosahedronGeometry(10.2, 2);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0x00f5d4, transparent: true, opacity: 0.05, side: THREE.BackSide });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glow);

        // Stars
        const starsGeo = new THREE.BufferGeometry();
        const starCount = 2000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) {
            posArray[i] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMat = new THREE.PointsMaterial({size: 0.15, color: 0xffffff});
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- CLOCK LOGIC ---
        function updateTime() {
            const now = new Date();
            
            const format = (d) => d.toLocaleTimeString('en-US', {hour12: false});
            
            document.getElementById('t-utc').innerText = now.toLocaleTimeString('en-US', {timeZone: 'UTC', hour12: false});
            document.getElementById('t-ny').innerText = now.toLocaleTimeString('en-US', {timeZone: 'America/New_York', hour12: false});
            document.getElementById('t-ldn').innerText = now.toLocaleTimeString('en-US', {timeZone: 'Europe/London', hour12: false});
            document.getElementById('t-tok').innerText = now.toLocaleTimeString('en-US', {timeZone: 'Asia/Tokyo', hour12: false});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate Earth
            core.rotation.y += 0.002;
            
            // Subtle floating effect
            core.position.y = Math.sin(Date.now() * 0.001) * 0.5;
            
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
